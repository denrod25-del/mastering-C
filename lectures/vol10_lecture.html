{title:"Dynamic array -- O(1) amortized append",narration:"A dynamic array stores elements in a contiguous block of memory and doubles its capacity whenever it runs out of space. The internal representation is three words: a data pointer, the current length, and the allocated capacity. When an append would exceed capacity, realloc allocates a block twice as large, copies the old data, and frees the old block. This occasional O of n copy sounds expensive but the amortized cost per append is O of 1. Summing copies across n appends gives a geometric series totalling less than 2n, so the average cost is constant regardless of how many appends have been made. Dynamic arrays are the most cache-friendly collection because all elements are adjacent in memory, unlike linked lists whose nodes may be scattered across the heap.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Dynamic array -- O(1) amortized append by doubling capacity on overflow</text><rect x="20" y="24" width="800" height="34" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="35" text-anchor="middle" style="font-size:12px;fill:#1040a0">struct DynArr { void *data;  size_t len;  size_t cap; };  // 3 machine words</text><text x="420" y="50" text-anchor="middle" style="font-size:10px;fill:#1040a0">O(1) index  |  O(1) amortized push_back  |  O(n) insert/delete mid-array</text><text x="120" y="70" text-anchor="middle" style="font-size:11px;fill:#444">cap=4, len=4  (full)</text><rect x="26" y="78" width="66" height="32" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="1"/><text x="59" y="94" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;font-weight:700;fill:#1040a0">A</text><rect x="96" y="78" width="66" height="32" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="1"/><text x="129" y="94" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;font-weight:700;fill:#1040a0">B</text><rect x="166" y="78" width="66" height="32" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="1"/><text x="199" y="94" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;font-weight:700;fill:#1040a0">C</text><rect x="236" y="78" width="66" height="32" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="1"/><text x="269" y="94" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;font-weight:700;fill:#1040a0">D</text><text x="320" y="94" text-anchor="start" style="font-size:10px;fill:#c62828">[ full! ]</text><line x1="190" y1="116" x2="190" y2="136" stroke="#1040a0" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><text x="190" y="110" text-anchor="middle" style="font-size:10px;fill:#1040a0">push_back(E)</text><text x="180" y="144" text-anchor="middle" style="font-size:11px;fill:#444">cap=8, len=5  (doubled + element added)</text><rect x="26" y="152" width="92" height="32" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="1"/><text x="72" y="168" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;font-weight:700;fill:#1040a0">A</text><rect x="122" y="152" width="92" height="32" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="1"/><text x="168" y="168" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;font-weight:700;fill:#1040a0">B</text><rect x="218" y="152" width="92" height="32" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="1"/><text x="264" y="168" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;font-weight:700;fill:#1040a0">C</text><rect x="314" y="152" width="92" height="32" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="1"/><text x="360" y="168" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;font-weight:700;fill:#1040a0">D</text><rect x="410" y="152" width="92" height="32" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="1"/><text x="456" y="168" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;font-weight:700;fill:#1a7a40">E</text><rect x="506" y="152" width="92" height="32" rx="3" fill="#f2f2ee" stroke="#ccc" stroke-width="1"/><text x="552" y="168" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;font-weight:700;fill:#555">_</text><rect x="602" y="152" width="92" height="32" rx="3" fill="#f2f2ee" stroke="#ccc" stroke-width="1"/><text x="648" y="168" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;font-weight:700;fill:#555">_</text><rect x="698" y="152" width="92" height="32" rx="3" fill="#f2f2ee" stroke="#ccc" stroke-width="1"/><text x="744" y="168" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;font-weight:700;fill:#555">_</text><rect x="20" y="194" width="800" height="54" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="207" text-anchor="middle" style="font-size:12px;fill:#b26a00">Amortized O(1) analysis -- total copy cost for n pushes:</text><text x="420" y="221" text-anchor="middle" style="font-size:12px;fill:#b26a00">copies = 1+2+4+8+…+n/2  <  2n  →  O(n) total → O(1) per push amortized</text><text x="420" y="237" text-anchor="middle" style="font-size:12px;fill:#b26a00">Growth factor 2.0 is most common; Python uses ~1.125, many use 1.5 to trade RAM for fewer reallocs</text></svg>`},
{title:"Intrusive linked lists and list_head",narration:"An intrusive linked list embeds the link pointers directly inside the payload struct rather than wrapping the payload in a separate node struct. This eliminates one heap allocation per element and one pointer indirection per traversal. The Linux kernel uses a two-word list_head struct with prev and next pointers. Any struct that participates in a linked list simply embeds a list_head member. The container_of macro recovers the enclosing struct from a list_head pointer by subtracting the compile-time offset of the embedded member. This subtraction is zero-cost at runtime. The list uses a sentinel head node that is never treated as data, eliminating all special cases for empty lists and endpoint insertions.",svg:`<svg width="100%" viewBox="0 0 840 276"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Intrusive linked lists -- embed link pointers inside the payload struct, no wrapper node</text><rect x="20" y="24" width="390" height="90" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="215" y="36" text-anchor="middle" style="font-size:12px;fill:#c62828">Non-intrusive: wrapper node owns data</text><rect x="26" y="46" width="378" height="98" rx="4" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="33" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">struct Node {</text><text x="33" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    struct Node *next; // link</text><text x="33" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    int data;         // payload</text><text x="33" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">};</text><text x="33" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// 2 allocs per element: Node + data</text><text x="33" y="132" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// (or bloated if inline)</text><rect x="430" y="24" width="390" height="90" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="625" y="36" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Intrusive: link embedded in payload</text><rect x="436" y="46" width="378" height="98" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="443" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">struct list_head { list_head *prev,*next; };</text><text x="443" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">struct Task {</text><text x="443" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    int pid;  char name[16];</text><text x="443" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    list_head node;  // embedded link</text><text x="443" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">};</text><text x="443" y="132" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// 1 alloc per element -- faster, less RAM</text><rect x="20" y="148" width="800" height="60" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="160" text-anchor="middle" style="font-size:12px;fill:#1040a0">container_of -- navigate from list_head back to the enclosing struct:</text><rect x="26" y="170" width="780" height="53" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="33" y="181" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">#define container_of(ptr, type, member)  ((type*)((char*)(ptr) - offsetof(type, member)))</text><text x="33" y="196" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Usage: struct Task *t = container_of(node_ptr, struct Task, node);</text><text x="33" y="211" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Arithmetic: subtract compile-time offset of .node within Task from the pointer -- zero cost</text><rect x="20" y="216" width="800" height="26" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="229" text-anchor="middle" style="font-size:12px;fill:#b26a00">Linux kernel list_head: circular doubly-linked with a sentinel head node (never holds data)</text><rect x="26" y="242" width="780" height="24" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="33" y="254" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">list_for_each_entry(task, &task_list, node)  // iterates all Task* via their embedded .node</text></svg>`},
{title:"Stack, queue, and circular buffer",narration:"A stack implements last-in first-out access with an array and a top index. Push stores the value at the top index and increments it; pop decrements and returns the value. Both are O of 1 with no heap allocation. A queue implements first-in first-out access. The naive array shifts all elements on every dequeue, which is O of n. A circular buffer solves this: two indices, head and tail, chase each other around a fixed-capacity array. Enqueue writes at tail and advances it modulo capacity; dequeue reads at head and advances it. Both operations are O of 1. The buffer is empty when head equals tail, and full when advancing tail would make it equal head.",svg:`<svg width="100%" viewBox="0 0 840 361"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Stack (LIFO) and Queue (FIFO) -- two fundamental ordered-access patterns</text><rect x="20" y="24" width="380" height="110" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="210" y="36" text-anchor="middle" style="font-size:12px;fill:#0d6a6a">Stack -- Last In, First Out</text><rect x="80" y="48" width="140" height="14" rx="2" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="150" y="55" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#1a7a40">4</text><rect x="80" y="64" width="140" height="14" rx="2" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="150" y="71" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#0d6a6a">3</text><rect x="80" y="80" width="140" height="14" rx="2" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="150" y="87" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#0d6a6a">2</text><rect x="80" y="96" width="140" height="14" rx="2" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="150" y="103" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#0d6a6a">1</text><text x="81" y="124" text-anchor="start" style="font-size:10px;fill:#0d6a6a">↑ top</text><rect x="26" y="134" width="368" height="53" rx="4" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="33" y="145" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">push(x): stk[top++] = x;   // O(1)</text><text x="33" y="160" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">pop():  return stk[--top]; // O(1)</text><text x="33" y="175" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">peek(): return stk[top-1]; // O(1)</text><rect x="430" y="24" width="390" height="110" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="625" y="36" text-anchor="middle" style="font-size:12px;fill:#1040a0">Queue -- First In, First Out</text><rect x="440" y="70" width="84" height="22" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="482" y="81" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#1a7a40">1</text><rect x="528" y="70" width="84" height="22" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="570" y="81" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#1040a0">2</text><rect x="616" y="70" width="84" height="22" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="658" y="81" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#1040a0">3</text><rect x="704" y="70" width="84" height="22" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="746" y="81" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#1040a0">4</text><text x="440" y="58" text-anchor="start" style="font-size:10px;fill:#1a7a40">→ dequeue</text><text x="808" y="58" text-anchor="end" style="font-size:10px;fill:#1040a0">enqueue ←</text><rect x="436" y="100" width="378" height="53" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="443" y="111" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">head=(head+1)%cap;  // dequeue O(1)</text><text x="443" y="126" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">tail=(tail+1)%cap;  // enqueue O(1)</text><text x="443" y="141" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// circular: wrap index, no shifting</text><rect x="20" y="191" width="800" height="160" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="203" text-anchor="middle" style="font-size:12px;fill:#b26a00">Circular buffer visualised -- head and tail chase each other around the ring:</text><circle cx="420" cy="235" r="12" fill="#f2f2ee" stroke="#f5b942" stroke-width="1"/><text x="420" y="235" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:700;fill:#555">0</text><circle cx="448" cy="246" r="12" fill="#f2f2ee" stroke="#f5b942" stroke-width="1"/><text x="448" y="246" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:700;fill:#555">1</text><circle cx="460" cy="275" r="12" fill="#fff3e0" stroke="#f5b942" stroke-width="1"/><text x="460" y="275" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:700;fill:#b26a00">D</text><circle cx="448" cy="303" r="12" fill="#fff3e0" stroke="#f5b942" stroke-width="1"/><text x="448" y="303" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:700;fill:#b26a00">A</text><circle cx="420" cy="315" r="12" fill="#fff3e0" stroke="#f5b942" stroke-width="1"/><text x="420" y="315" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:700;fill:#b26a00">T</text><circle cx="391" cy="303" r="12" fill="#fff3e0" stroke="#f5b942" stroke-width="1"/><text x="391" y="303" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:700;fill:#b26a00">A</text><circle cx="380" cy="275" r="12" fill="#f2f2ee" stroke="#f5b942" stroke-width="1"/><text x="380" y="275" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:700;fill:#555">6</text><circle cx="391" cy="246" r="12" fill="#f2f2ee" stroke="#f5b942" stroke-width="1"/><text x="391" y="246" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:700;fill:#555">7</text><text x="360" y="275" text-anchor="end" style="font-size:10px;fill:#1a7a40">head→</text><text x="480" y="275" text-anchor="start" style="font-size:10px;fill:#1040a0">←tail</text><text x="420" y="341" text-anchor="middle" style="font-size:10px;fill:#b26a00">empty: head==tail  |  full: (tail+1)%cap==head  |  count: (tail-head+cap)%cap</text></svg>`},
{title:"Lock-free SPSC ring buffer",narration:"The single-producer single-consumer ring buffer is lock-free because only one thread ever writes the tail index and only one thread ever writes the head index. There is no shared write and therefore no race condition on the indices. However, memory ordering is still required: the producer must write the slot data before publishing the new tail pointer. This is achieved with a release store on the tail. The consumer must load the tail with an acquire load, which creates a happens-before relationship ensuring the slot data is visible. Making capacity a power of two enables wrapping the index with a bitmask operation rather than modulo division, which is substantially faster and avoids division instructions entirely.",svg:`<svg width="100%" viewBox="0 0 840 351"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">SPSC ring buffer -- lock-free because only ONE thread owns each pointer</text><rect x="20" y="24" width="800" height="28" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="34" text-anchor="middle" style="font-size:12px;fill:#1040a0">Safe without locks: producer solely writes tail, consumer solely writes head -- no shared write</text><text x="420" y="48" text-anchor="middle" style="font-size:10px;fill:#1040a0">Memory ordering ensures slot data is visible before the pointer update is observed</text><rect x="20" y="56" width="390" height="88" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="215" y="68" text-anchor="middle" style="font-size:12px;fill:#0d6a6a">Ring buffer struct:</text><rect x="26" y="78" width="378" height="98" rx="4" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="33" y="89" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">typedef struct {</text><text x="33" y="104" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    void   **buf;         // slot array</text><text x="33" y="119" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    size_t   cap;         // power of 2!</text><text x="33" y="134" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    _Atomic size_t head;  // consumer writes</text><text x="33" y="149" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    _Atomic size_t tail;  // producer writes</text><text x="33" y="164" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">} spsc_t;  // pad head/tail to diff cache lines</text><rect x="430" y="56" width="390" height="88" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="625" y="68" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Producer push:</text><rect x="436" y="78" width="378" height="113" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="443" y="89" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">bool spsc_push(spsc_t *q, void *v) {</text><text x="443" y="104" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  size_t t = atomic_load_explicit(</text><text x="443" y="119" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    &q->tail, memory_order_relaxed);</text><text x="443" y="134" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  q->buf[t & (q->cap-1)] = v; // write slot</text><text x="443" y="149" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  atomic_store_explicit(&q->tail, t+1,</text><text x="443" y="164" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    memory_order_release);  // PUBLISH</text><text x="443" y="179" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  return true; }</text><rect x="20" y="195" width="390" height="72" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="215" y="207" text-anchor="middle" style="font-size:12px;fill:#b26a00">Consumer pop:</text><rect x="26" y="217" width="378" height="98" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="33" y="228" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">void *spsc_pop(spsc_t *q) {</text><text x="33" y="243" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  size_t h = atomic_load_explicit(</text><text x="33" y="258" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    &q->head, memory_order_relaxed);</text><text x="33" y="273" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  void *v = q->buf[h & (q->cap-1)];</text><text x="33" y="288" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  atomic_store_explicit(&q->head, h+1,</text><text x="33" y="303" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    memory_order_release); return v; }</text><rect x="430" y="195" width="390" height="72" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="625" y="207" text-anchor="middle" style="font-size:12px;fill:#c62828">Memory ordering contract:</text><rect x="436" y="217" width="378" height="98" rx="4" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="443" y="228" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Producer:</text><text x="443" y="243" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">//   write slot BEFORE releasing tail</text><text x="443" y="258" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">//   consumer acquires tail → sees slot</text><text x="443" y="273" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Consumer:</text><text x="443" y="288" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">//   read slot BEFORE releasing head</text><text x="443" y="303" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">//   producer acquires head → sees space</text><rect x="20" y="319" width="800" height="22" rx="5" fill="#f0e8ff" stroke="#c39be8" stroke-width="0.8"/><text x="420" y="330" text-anchor="middle" style="font-size:12px;fill:#5c2d91">cap MUST be power-of-2: index = ptr & (cap-1) avoids costly % and handles wrap-around at full speed</text></svg>`},
{title:"Robin Hood hash table",narration:"Robin Hood hashing is an open addressing scheme that reduces variance in probe sequence lengths. Each slot stores a DIB, the distance from the element's ideal bucket. When inserting a key that collides with an occupied slot, we compare DIBs. If the inserting key has a larger DIB than the occupant, we evict the occupant and continue inserting it from that point, placing the newcomer here. This Robin Hood principle prevents any single element from having a dramatically long probe sequence while another has a short one. Lookup terminates not only at empty slots but also when the probe count exceeds the DIB of the current occupant, because the key being searched would have displaced that occupant if it were present.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Robin Hood hashing -- open addressing that balances probe lengths across all entries</text><rect x="20" y="24" width="800" height="30" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="35" text-anchor="middle" style="font-size:12px;fill:#1040a0">Each slot: [key | value | DIB]  DIB = Distance from Initial Bucket (ideal slot index)</text><text x="420" y="50" text-anchor="middle" style="font-size:10px;fill:#1040a0">Robin Hood rule: if inserting key has DIB > existing key DIB, swap them and continue inserting</text><rect x="24" y="62" width="76" height="20" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="62" y="72" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#555">Slot</text><rect x="104" y="62" width="116" height="20" rx="5" fill="#f2f2ee" stroke="#ccc" {title:"AVL tree -- self-balancing BST",narration:"An AVL tree is a binary search tree that maintains the invariant that the heights of the left and right subtrees of every node differ by at most one. This constraint bounds the height to O of log n, guaranteeing O of log n search, insert, and delete. Each node stores its balance factor, the right height minus the left height. When an operation makes a balance factor plus-two or minus-two, the tree restores balance with one or two rotations. A rotation is a constant-time pointer reassignment. The left-left and right-right cases each require one rotation; left-right and right-left cases each require two. Heights are updated bottom-up after each modification. The same approach with one extra colour bit per node yields a red-black tree, which is what most standard library ordered maps use.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">AVL tree -- height-balanced BST: |height(L) − height(R)| ≤ 1 at every node</text><rect x="20" y="24" width="380" height="166" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="210" y="36" text-anchor="middle" style="font-size:12px;fill:#c62828">Before: left-heavy at z  (bf = −2)</text><line x1="195" y1="72" x2="170" y2="90" stroke="#e08888" stroke-width="1.5"/><line x1="225" y1="72" x2="253" y2="90" stroke="#e08888" stroke-width="1.5"/><line x1="142" y1="113" x2="123" y2="131" stroke="#e08888" stroke-width="1.5"/><line x1="168" y1="113" x2="187" y2="131" stroke="#e08888" stroke-width="1.5"/><circle cx="210" cy="62" r="18" fill="#ffe0e0" stroke="#e08888" stroke-width="1.5"/><text x="210" y="62" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#c62828">z bf=-2</text><circle cx="155" cy="100" r="18" fill="#ffe0e0" stroke="#e08888" stroke-width="1.5"/><text x="155" y="100" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#c62828">y bf=-1</text><circle cx="268" cy="100" r="16" fill="#f2f2ee" stroke="#ccc" stroke-width="1.5"/><text x="268" y="100" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:700;fill:#555">T4</text><circle cx="112" cy="142" r="16" fill="#fff3e0" stroke="#f5b942" stroke-width="1.5"/><text x="112" y="142" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:700;fill:#b26a00">x</text><circle cx="198" cy="142" r="16" fill="#f2f2ee" stroke="#ccc" stroke-width="1.5"/><text x="198" y="142" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:700;fill:#555">T3</text><text x="210" y="174" text-anchor="middle" style="font-size:10px;fill:#c62828">x insertion caused imbalance at z</text><text x="210" y="186" text-anchor="middle" style="font-size:10px;fill:#c62828">fix: right-rotate at z  (LL case)</text><line x1="406" y1="106" x2="434" y2="106" stroke="#555" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><text x="420" y="88" text-anchor="middle" style="font-size:9px;fill:#555"><tspan x="420" dy="0">right</tspan><tspan x="420" dy="11">rotate</tspan><tspan x="420" dy="11">at z</tspan></text><rect x="440" y="24" width="380" height="166" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="630" y="36" text-anchor="middle" style="font-size:12px;fill:#1a7a40">After rotation: balanced</text><line x1="615" y1="72" x2="590" y2="90" stroke="#4caf79" stroke-width="1.5"/><line x1="645" y1="72" x2="673" y2="90" stroke="#4caf79" stroke-width="1.5"/><line x1="562" y1="113" x2="543" y2="131" stroke="#4caf79" stroke-width="1.5"/><line x1="588" y1="113" x2="607" y2="131" stroke="#4caf79" stroke-width="1.5"/><circle cx="630" cy="62" r="18" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.5"/><text x="630" y="62" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#1a7a40">y bf=0</text><circle cx="575" cy="100" r="18" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.5"/><text x="575" y="100" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#1a7a40">x bf=0</text><circle cx="688" cy="100" r="18" fill="#deeeff" stroke="#88aaf0" stroke-width="1.5"/><text x="688" y="100" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#1040a0">z bf=0</text><circle cx="532" cy="142" r="16" fill="#f2f2ee" stroke="#ccc" stroke-width="1.5"/><text x="532" y="142" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:700;fill:#555">T1</text><circle cx="618" cy="142" r="16" fill="#f2f2ee" stroke="#ccc" stroke-width="1.5"/><text x="618" y="142" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:700;fill:#555">T2</text><text x="630" y="174" text-anchor="middle" style="font-size:10px;fill:#1a7a40">y takes z's position</text><text x="630" y="186" text-anchor="middle" style="font-size:10px;fill:#1a7a40">z becomes y's right child</text><rect x="20" y="198" width="800" height="50" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="212" text-anchor="middle" style="font-size:11px;fill:#1040a0">Four cases: LL → right-rotate z  |  RR → left-rotate z  |  LR → left-rotate y then right-rotate z  |  RL → opposite</text><text x="420" y="228" text-anchor="middle" style="font-size:12px;fill:#1040a0">O(log n) search, insert, delete. Each rotation is O(1) pointer swaps. Height stored in each node.</text><text x="420" y="242" text-anchor="middle" style="font-size:12px;fill:#1040a0">Used in: language runtimes, database indices, kernel red-black trees (same idea, 1 extra colour bit)</text></svg>`},
{title:"Binary heap and priority queue",narration:"A binary heap is a complete binary tree that satisfies the heap property: every parent is less than or equal to both its children for a min-heap. Because the tree is always complete, it maps perfectly to a contiguous array with no wasted space or pointers. For an element at index i, its left child is at 2i plus 1, its right child at 2i plus 2, and its parent at integer floor of i minus 1 divided by 2. Insertion appends to the end and sifts up, swapping with the parent repeatedly while the element is smaller. Extraction removes the root, places the last element there, and sifts down, swapping with the smaller child. Floyd's O of n heapify algorithm builds a heap in linear time by calling sift-down on every non-leaf from the bottom up.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Binary heap -- complete binary tree in an array; parent ≤ children (min-heap)</text><text x="200" y="32" text-anchor="middle" style="font-size:11px;fill:#444">Min-heap as tree:</text><line x1="185" y1="68" x2="145" y2="92" stroke="#ccc" stroke-width="1.5"/><line x1="215" y1="68" x2="255" y2="92" stroke="#ccc" stroke-width="1.5"/><line x1="118" y1="115" x2="101" y2="134" stroke="#ccc" stroke-width="1.5"/><line x1="142" y1="115" x2="159" y2="134" stroke="#ccc" stroke-width="1.5"/><line x1="258" y1="115" x2="241" y2="134" stroke="#ccc" stroke-width="1.5"/><line x1="282" y1="115" x2="299" y2="134" stroke="#ccc" stroke-width="1.5"/><circle cx="200" cy="58" r="18" fill="#deeeff" stroke="#88aaf0" stroke-width="1.5"/><text x="200" y="58" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:700;fill:#1040a0">1</text><circle cx="130" cy="102" r="18" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1.5"/><text x="130" y="102" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:700;fill:#0d6a6a">3</text><circle cx="270" cy="102" r="18" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1.5"/><text x="270" y="102" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:700;fill:#0d6a6a">2</text><circle cx="90" cy="146" r="16" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.5"/><text x="90" y="146" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:700;fill:#1a7a40">7</text><circle cx="170" cy="146" r="16" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.5"/><text x="170" y="146" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:700;fill:#1a7a40">4</text><circle cx="230" cy="146" r="16" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.5"/><text x="230" y="146" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:700;fill:#1a7a40">5</text><circle cx="310" cy="146" r="16" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.5"/><text x="310" y="146" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:700;fill:#1a7a40">6</text><text x="200" y="174" text-anchor="middle" style="font-size:10px;fill:#555">parent(i) = (i−1)/2</text><text x="200" y="186" text-anchor="middle" style="font-size:10px;fill:#555">left(i) = 2i+1   right(i) = 2i+2</text><text x="590" y="32" text-anchor="middle" style="font-size:11px;fill:#444">Level-order array representation:</text><rect x="432" y="44" width="54" height="32" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="1"/><text x="459" y="60" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;font-weight:700;fill:#1040a0">1</text><text x="459" y="84" text-anchor="middle" style="font-size:10px;fill:#aaa">0</text><rect x="490" y="44" width="54" height="32" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1"/><text x="517" y="60" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;font-weight:700;fill:#0d6a6a">3</text><text x="517" y="84" text-anchor="middle" style="font-size:10px;fill:#aaa">1</text><rect x="548" y="44" width="54" height="32" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1"/><text x="575" y="60" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;font-weight:700;fill:#0d6a6a">2</text><text x="575" y="84" text-anchor="middle" style="font-size:10px;fill:#aaa">2</text><rect x="606" y="44" width="54" height="32" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="1"/><text x="633" y="60" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;font-weight:700;fill:#1a7a40">7</text><text x="633" y="84" text-anchor="middle" style="font-size:10px;fill:#aaa">3</text><rect x="664" y="44" width="54" height="32" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="1"/><text x="691" y="60" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;font-weight:700;fill:#1a7a40">4</text><text x="691" y="84" text-anchor="middle" style="font-size:10px;fill:#aaa">4</text><rect x="722" y="44" width="54" height="32" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="1"/><text x="749" y="60" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;font-weight:700;fill:#1a7a40">5</text><text x="749" y="84" text-anchor="middle" style="font-size:10px;fill:#aaa">5</text><rect x="780" y="44" width="54" height="32" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="1"/><text x="807" y="60" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;font-weight:700;fill:#1a7a40">6</text><text x="807" y="84" text-anchor="middle" style="font-size:10px;fill:#aaa">6</text><text x="432" y="98" text-anchor="start" style="font-size:9px;fill:#aaa">[0]</text><text x="807" y="98" text-anchor="middle" style="font-size:9px;fill:#aaa">[6]</text><rect x="430" y="108" width="390" height="58" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="625" y="120" text-anchor="middle" style="font-size:11px;fill:#b26a00">Sift-up (push): append at end,</text><text x="625" y="134" text-anchor="middle" style="font-size:11px;fill:#b26a00">swap with parent while smaller. O(log n)</text><text x="625" y="148" text-anchor="middle" style="font-size:11px;fill:#b26a00">Sift-down (extract-min): replace root with</text><text x="625" y="162" text-anchor="middle" style="font-size:11px;fill:#b26a00">last element, swap with smaller child. O(log n)</text><rect x="20" y="198" width="800" height="52" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="212" text-anchor="middle" style="font-size:12px;fill:#1a7a40">heap_push: append then sift_up  |  heap_pop: swap root↔last, shrink, sift_down</text><text x="420" y="228" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Floyd heapify: O(n) -- sift_down every non-leaf bottom-up (not n × sift_up which is O(n log n))</text><text x="420" y="244" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Uses: priority queue, k-largest, heap sort (in-place O(n log n)), Dijkstra's shortest path</text></svg>`},
{title:"Trie -- prefix tree",narration:"A trie is a tree where each edge represents one character and the path from the root to a node spells a prefix shared by all keys in that subtree. Insert and search are both O of m where m is the key length, completely independent of how many keys are stored. Each node holds an array or map of children indexed by character. The trade-off is memory: a fixed 256-way array per node uses two kilobytes of pointers even when most children are null. For sparse alphabets a hash map per node saves memory. Tries excel at prefix operations: autocomplete requires traversing to the prefix node then enumerating all descendants. A compressed trie merges single-child chains into single edges labeled with substrings and is used in IP routing tables.",svg:`<svg width="100%" viewBox="0 0 840 280"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Trie (prefix tree) -- O(m) lookup by key length m, independent of number of keys stored</text><circle cx="200" cy="46" r="22" fill="#f2f2ee" stroke="#ccc" stroke-width="1.5"/><text x="200" y="46" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#555">root</text><line x1="182" y1="58" x2="127" y2="96" stroke="#ccc" stroke-width="1.5"/><text x="148" y="77" text-anchor="middle" style="font-size:10px;fill:#ccc">t</text><circle cx="112" cy="106" r="18" fill="#deeeff" stroke="#88aaf0" stroke-width="1.5"/><text x="112" y="106" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:700;fill:#1040a0">t</text><line x1="103" y1="122" x2="88" y2="148" stroke="#88aaf0" stroke-width="1.5"/><text x="90" y="135" text-anchor="middle" style="font-size:10px;fill:#88aaf0" {title:"Introsort and radix sort",narration:"Introsort is the algorithm behind most standard library sort implementations including C++ std::sort. It begins with quicksort because quicksort is fast in practice and accesses memory in a cache-friendly pattern. When the recursion depth exceeds two times the base-two logarithm of the array size, quicksort's pathological O of n squared behaviour could occur, so introsort switches to heapsort which is guaranteed O of n log n at the cost of worse cache behaviour. For subarrays of sixteen elements or fewer, insertion sort outperforms both because its overhead is minimal and it avoids recursion entirely. Radix sort bypasses the comparison-based lower bound by sorting one digit position at a time using stable counting sort, achieving O of n times k where k is the number of digit positions.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Introsort and radix sort -- how std::sort works, and O(n) sorting for integers</text><rect x="20" y="24" width="390" height="174" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="215" y="36" text-anchor="middle" style="font-size:12px;fill:#1040a0">Introsort = quicksort + heapsort + insertion</text><rect x="55" y="50" width="310" height="22" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="1.2"/><text x="210" y="61" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:600;fill:#1040a0">sort(arr, n,  depth_limit = 2×log₂(n))</text><line x1="215" y1="74" x2="215" y2="92" stroke="#1040a0" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="55" y="94" width="144" height="22" rx="5" fill="#e6f4ee" {title:"Memory pool and generic containers",narration:"A memory pool pre-allocates a large block of memory and subdivides it into fixed-size slots. The free slots are linked together using a free list: the first bytes of each free slot store a pointer to the next free slot. Allocation in O of 1 pops the head of the free list. Deallocation in O of 1 pushes the freed slot back to the head. Because all slots are identical in size there is zero fragmentation. The slab allocator extends this pattern by maintaining per-type caches that keep freed objects initialised and ready for reuse, avoiding repeated constructor overhead. Generic containers in C use macros to provide type-safe push, pop, and index operations for any element type, avoiding the void pointer casting and indirection overhead of a generic void star implementation.",svg:`<svg width="100%" viewBox="0 0 840 313"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Memory pool / slab allocator -- O(1) alloc/free, zero fragmentation for fixed-size objects</text><rect x="20" y="24" width="800" height="24" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="36" text-anchor="middle" style="font-size:12px;fill:#c62828">Problem: malloc has 16-32 B header per block + fragmentation when making thousands of same-size allocs</text><rect x="20" y="52" width="800" height="70" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="65" text-anchor="middle" style="font-size:11px;fill:#1040a0">Slab: pre-allocated array of identical slots, free slots linked into a singly-linked list:</text><rect x="26" y="76" width="54" height="30" rx="2" fill="#e6f4ee" stroke="#4caf79" stroke-width="1"/><text x="53" y= ric containers via macros (type-safe, no void* casts):</text><rect x="26" y="283" width="780" height="20" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="33" y="293" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">#define VEC_PUSH(v,val)  (MAYBE_GROW(v), (v).data[(v).len++]=(val))  // works for any element type</text></svg>`},

// ── Text-to-Speech (Web Speech API) ──────────────────────────────────────────
let ttsOn = false, ttsUtter = null, ttsVoice = null;

function ttsPickVoice() {
  const vs = speechSynthesis.getVoices();
  if (!vs.length) return null;
  // Prefer a natural en-US/en-GB voice; fall back to any English, then first
  return vs.find(v => /en[-_](US|GB)/i.test(v.lang) && /natural|neural|premium/i.test(v.name))
      || vs.find(v => /en[-_](US|GB)/i.test(v.lang))
      || vs.find(v => v.lang.startsWith('en'))
      || vs[0];
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => { ttsVoice = ttsPickVoice(); };
  ttsVoice = ttsPickVoice();
}

function ttsSpeak(text, onEnd) {
  if (!ttsOn || !('speechSynthesis' in window)) { if (onEnd) onEnd(); return; }
  speechSynthesis.cancel();
  // Clean text for speech: strip code-ish punctuation that reads badly
  const clean = text
    .replace(/->/g, ' arrow ')
    .replace(/&/g, ' ampersand ')
    .replace(/\*p\b/g, 'star p')
    .replace(/`/g, '')
    .replace(/\s+/g, ' ').trim();
  ttsUtter = new SpeechSynthesisUtterance(clean);
  if (ttsVoice) ttsUtter.voice = ttsVoice;
  ttsUtter.rate = 0.95;
  ttsUtter.pitch = 1.0;
  if (onEnd) ttsUtter.onend = onEnd;
  speechSynthesis.speak(ttsUtter);
}

function ttsStop() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
}

function ttsToggle() {
  ttsOn = !ttsOn;
  const b = document.getElementById('ttsbtn');
  if (ttsOn) {
    b.textContent = '🔊 Voice On';
    b.style.background = '#e6f4ee';
    b.style.borderColor = '#4caf79';
    // Speak the current slide immediately so the user gets feedback
    ttsSpeak(SLIDES[vi].title + '. ' + SLIDES[vi].narration, null);
  } else {
    b.textContent = '🔇 Voice Off';
    b.style.background = '';
    b.style.borderColor = '';
    ttsStop();
  }
}
window.addEventListener('beforeunload', ttsStop);

let vi=0,playing=false,ticker=null,ctick=null;
function updateNav(){
  const prevBtn=document.getElementById('prevbtn'),nextBtn=document.getElementById('nextbtn');
  prevBtn.disabled=(vi===0);prevBtn.setAttribute('aria-disabled',String(vi===0));
  nextBtn.disabled=(vi===SLIDES.length-1);nextBtn.setAttribute('aria-disabled',String(vi===SLIDES.length-1));
}
function gt(n){
  vi=Math.max(0,Math.min(n,SLIDES.length-1));
  const s=SLIDES[vi];
  document.getElementById('st').textContent=s.title;
  document.getElementById('sc').textContent=(vi+1)+' / '+SLIDES.length;
  const d=document.getElementById('diag');
  d.style.opacity='0';d.innerHTML=s.svg;
  const svgEl=d.querySelector('svg');
  if(svgEl){svgEl.setAttribute('role','img');svgEl.setAttribute('aria-label',s.title+' diagram');}
  setTimeout(()=>d.style.opacity='1',30);
  document.getElementById('pf').style.width=(vi/(SLIDES.length-1)*100)+'%';
  const bar=document.getElementById('pbar');
  bar.setAttribute('aria-valuemax',String(SLIDES.length));
  bar.setAttribute('aria-valuenow',String(vi+1));
  bar.setAttribute('aria-valuetext',(vi+1)+' of '+SLIDES.length+': '+s.title);
  updateNav();
  document.getElementById('live-announce').textContent=s.title;
  clearInterval(ctick);let pos=0,full=s.narration;
  document.getElementById('narr').textContent='';
  ctick=setInterval(()=>{if(pos<full.length)document.getElementById('narr').textContent=full.slice(0,++pos);else clearInterval(ctick);},18);
  ttsStop();
  if(ttsOn){
    ttsSpeak(s.title+'. '+full,()=>{if(playing){clearTimeout(ticker);ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},1200);}});
    if(playing)clearTimeout(ticker);
  } else if(playing){clearTimeout(ticker);ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},Math.max(9000,full.length*56));}
}
function play(){playing=true;document.getElementById('pb2').textContent='⏸ Pause';
  if(ttsOn){ttsSpeak(SLIDES[vi].title+'. '+SLIDES[vi].narration,()=>{if(playing)ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},1200);});}
  else{ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},Math.max(9000,SLIDES[vi].narration.length*56));}}
function pause(){playing=false;clearTimeout(ticker);ttsStop();document.getElementById('pb2').textContent='▶ Play';}
function tg(){playing?pause():play();}
function gn(){if(vi>=SLIDES.length-1)return;clearTimeout(ticker);gt(vi+1);if(playing)play();}
function gp(){if(vi<=0)return;clearTimeout(ticker);gt(vi-1);if(playing)play();}
function pgc(e){const r=document.getElementById('pbar').getBoundingClientRect();clearTimeout(ticker);gt(Math.round((e.clientX-r.left)/r.width*(SLIDES.length-1)));if(playing)play();}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&document.getElementById('voice-panel').classList.contains('aai-open')){_vpClose();return;}
  if(['INPUT','TEXTAREA'].includes(e.target.tagName))return;
  if(e.key===' '){e.preventDefault();tg();}
  else if(e.key==='ArrowRight')gn();
  else if(e.key==='ArrowLeft')gp();
  else if(e.key==='v'||e.key==='V')ttsToggle();
});
gt(0);
</script>

<div id="voice-panel" role="region" aria-labelledby="vp-title">
  <div id="vp-bar">
    <span id="vp-title" class="sr-only">Voice input and Q&amp;A</span>
    <span id="vp-status" aria-live="polite">Ready</span>
    <button id="vp-close" onclick="_vpClose()" aria-label="Close voice panel">&#x2715;</button>
  </div>
  <form id="vp-form">
    <label for="vp-input" class="sr-only">Type a question about this lecture</label>
    <input id="vp-input" type="text" placeholder="Or type a question and press Enter…" autocomplete="off">
    <button type="submit">Ask</button>
  </form>
  <div id="vp-transcript" class="aai-empty" aria-live="polite"></div>
  <div id="vp-answer" aria-live="polite"></div>
  <div id="vp-footer">Mic audio streams live to AssemblyAI only while this panel is open, for transcription and Q&amp;A &middot; universal-3-5-pro</div>
</div>
<script>
/* ── AssemblyAI Voice Input + Q&A ────────────────────────────────────────── */
/* Set by the deploy step in README.md ("find-replace REPLACE_WITH_VERCEL_URL"). */
const _AAI='https://the-c.vercel.app';
const _aaiConfigured=()=>!!_AAI&&_AAI.indexOf('REPLACE_WITH')===-1;
const _TERMS=['pointer','malloc','undefined behaviour','mutex','deadlock','epoll',
  'mmap','fork','syscall','struct','volatile','restrict','pthread','semaphore',
  'spinlock','realloc','calloc','free list','stack frame','heap internals'];
/* AudioWorklet: capture Float32 mic audio → Int16 PCM at 16 kHz */
const _WL=`class P extends AudioWorkletProcessor{process(i){const c=i[0]?.[0];if(c){const b=new Int16Array(c.length);for(let j=0;j<c.length;j++){const s=Math.max(-1,Math.min(1,c[j]));b[j]=s<0?s*0x8000:s*0x7FFF;}this.port.postMessage(b.buffer,[b.buffer]);}return true;}}registerProcessor('aai-pcm',P);`;

let _ws=null,_ctx=null,_mic=null,_node=null,_buf=[],_on=false,_connecting=false,_asking=false;

const _$=id=>document.getElementById(id);
const _status=(t,live)=>{const e=_$('vp-status');if(e){e.textContent=t;e.className=live?'aai-live':'';}};
const _tx=t=>{const e=_$('vp-transcript');if(!e)return;e.textContent=t;e.className=t?'':'aai-empty';};
const _ans=h=>{const e=_$('vp-answer');if(!e)return;e.innerHTML=h;e.className=h?'aai-show':'';};
const _open=()=>_$('voice-panel')?.classList.add('aai-open');
function _vpClose(){_$('voice-panel')?.classList.remove('aai-open');if(_on)_stop();_$('micbtn')?.focus();}

function _micSupported(){
  return !!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia&&window.AudioContext&&window.AudioWorklet&&window.WebSocket);
}

async function _start(){
  if(_on||_connecting)return;
  if(!_aaiConfigured()){
    _open();_status('Backend not configured — see README setup guide');return;
  }
  if(!_micSupported()){
    _open();_status('Voice input isn’t supported in this browser — try typing a question instead');return;
  }
  if(location.protocol!=='https:'&&location.hostname!=='localhost'&&location.hostname!=='127.0.0.1'){
    _open();_status('Voice input requires HTTPS — try typing a question instead');return;
  }
  _connecting=true;
  _open();_status('Connecting\u2026');_tx('');_ans('');
  try{
    /* 1. Mint short-lived token (API key stays on server) */
    const tokCtl=new AbortController();
    const tokTimer=setTimeout(()=>tokCtl.abort(),10000);
    const tr=await fetch(_AAI+'/api/token',{signal:tokCtl.signal});
    clearTimeout(tokTimer);
    if(!tr.ok)throw new Error('Token failed ('+tr.status+')');
    const{token}=await tr.json();
    /* 2. Open WebSocket using token — no API key in browser */
    const p=new URLSearchParams({sample_rate:'16000',speech_model:'universal-3-5-pro',mode:'balanced',token});
    _TERMS.forEach(t=>p.append('keyterms_prompt',t));
    _ws=new WebSocket('wss://streaming.assemblyai.com/v3/ws?'+p);
    await new Promise((ok,fail)=>{
      _ws.onopen=ok;
      _ws.onerror=()=>fail(new Error('WebSocket failed'));
      setTimeout(()=>fail(new Error('Connection timed out')),10000);
    });
    _ws.onmessage=e=>{
      const m=JSON.parse(e.data);
      if(m.type!=='Turn')return;
      _tx(m.transcript);
      /* Auto-trigger Q&A when turn finalizes and ends with ? */
      if(m.end_of_turn&&m.transcript.trim().endsWith('?'))_ask(m.transcript.trim());
    };
    _ws.onclose=()=>{_on=false;_btn();_status('Disconnected');};
    /* 3. Capture mic → PCM16 via AudioWorklet → stream to AssemblyAI */
    _mic=await navigator.mediaDevices.getUserMedia({audio:{channelCount:1,echoCancellation:true,noiseSuppression:true}});
    _ctx=new AudioContext({sampleRate:16000});
    const bu=URL.createObjectURL(new Blob([_WL],{type:'application/javascript'}));
    await _ctx.audioWorklet.addModule(bu);URL.revokeObjectURL(bu);
    _node=new AudioWorkletNode(_ctx,'aai-pcm');
    _node.port.onmessage=ev=>{
      _buf.push(...new Int16Array(ev.data));
      /* Send ~200 ms chunks (3200 samples @ 16 kHz) — within AssemblyAI 50–1000 ms window */
      if(_buf.length>=3200&&_ws?.readyState===1)
        _ws.send(new Int16Array(_buf.splice(0,3200)).buffer);
    };
    _ctx.createMediaStreamSource(_mic).connect(_node);
    _on=true;_connecting=false;_btn();_status('Listening',true);
  }catch(err){
    _connecting=false;
    const msg=err.name==='AbortError'?'Token request timed out':err.name==='NotAllowedError'?'Microphone permission denied':err.message;
    _status('Error: '+msg);_clean();
  }
}

function _stop(){
  /* Always send Terminate — abandoned sessions stay billable until 3-hour cap */
  if(_ws?.readyState===1){_ws.send(JSON.stringify({type:'Terminate'}));_ws.close();}
  _clean();_status('Stopped');
}
function _clean(){_mic?.getTracks().forEach(t=>t.stop());_ctx?.close();_ws=_ctx=_mic=_node=null;_buf=[];_on=false;_connecting=false;_btn();}
function _btn(){const b=_$('micbtn');if(!b)return;b.textContent=_on?'\u23F9 Stop':'\uD83C\uDF99 Ask';b.className=_on?'aai-live':'';}
function _micToggle(){if(_connecting)return;_on?_stop():_start();}
window.addEventListener('beforeunload',()=>{if(_ws?.readyState===1)_ws.send(JSON.stringify({type:'Terminate'}));});

async function _ask(q){
  if(_asking)return;
  if(!_aaiConfigured()){
    _open();_status('Backend not configured \u2014 see README setup guide');return;
  }
  _asking=true;
  _open();_status('Answering\u2026');_ans('<em style="color:#8b949e">Thinking\u2026</em>');
  const ctl=new AbortController();
  const timer=setTimeout(()=>ctl.abort(),20000);
  try{
    const r=await fetch(_AAI+'/api/qa',{
      method:'POST',
      headers:{'content-type':'application/json'},
      body:JSON.stringify({question:q,volume:document.title}),
      signal:ctl.signal,
    });
    if(!r.ok)throw new Error('Q&A failed ('+r.status+')');
    const{answer}=await r.json();
    /* Minimal markdown: fenced code blocks + inline code. Escaped first, so this cannot inject HTML. */
    const h=answer
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```[\w]*\n?([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
    _ans('<p>'+h+'</p><p style="color:#8b949e;font-size:.75em">AI-generated \u2014 verify compiler/platform-specific details.</p>');
    _status(_on?'Listening':'Ready',_on);
  }catch(err){
    const msg=err.name==='AbortError'?'Request timed out \u2014 try again':err.message;
    _ans('<em style="color:#f85149">'+msg+'</em>');
    _status(_on?'Listening':'Ready',_on);
  }finally{
    clearTimeout(timer);_asking=false;
  }
}
document.getElementById('vp-form')?.addEventListener('submit',e=>{
  e.preventDefault();
  const input=document.getElementById('vp-input');
  const v=input.value.trim();
  if(!v)return;
  input.value='';
  _ask(v);
});

</script>
