{title:"The debugging mindset and methodology",narration:"Debugging is best approached as a scientific method: reproduce the bug reliably first, then isolate the failing component by binary search, form a single hypothesis, run an experiment to test it, and analyze the result. The cardinal rule is to change one thing at a time. Git bisect automates the binary search over commit history: mark a known-good commit and the current broken state, then bisect checks out the midpoint and you classify it as good or bad, halving the search space each time. Ten bisect steps cover a thousand commits. Rubber duck debugging, explaining the code aloud as if to a colleague, forces you to articulate every assumption and often reveals the bug before you finish the explanation.",svg:`<svg width="100%" viewBox="0 0 840 300"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Debugging is applied science -- form a hypothesis, design an experiment, interpret the evidence</text><rect x="20" y="26" width="156" height="72" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="1.2"/><text x="98" y="48" text-anchor="middle" style="font-size:13px;font-weight:700;fill:#1040a0">Reproduce</text><text x="98" y="64" text-anchor="middle" style="font-size:10px;fill:#1040a0">Get a minimal reproducible</text><text x="98" y="78" text-anchor="middle" style="font-size:10px;fill:#1040a0">example every single time</text><line x1="178" y1="62" x2="182" y2="62" stroke="#1040a0" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="182" y="26" width="156" height="72" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1.2"/><text x="260" y="48" text-anchor="middle" style="font-size:13px;font-weight:700;fill:#0d6a6a">Isolate</text><text x="260" y="64" text-anchor="middle" style="font-size:10px;fill:#0d6a6a">Binary search: which half</text><text x="260" y="78" text-anchor="middle" style="font-size:10px;fill:#0d6a6a">of the code has the bug?</text><line x1="340" y1="62" x2="344" y2="62" stroke="#0d6a6a" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="344" y="26" width="156" height="72" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="1.2"/><text x="422" y="48" text-anchor="middle" style="font-size:13px;font-weight:700;fill:#b26a00">Hypothesize</text><text x="422" y="64" text-anchor="middle" style="font-size:10px;fill:#b26a00">One theory at a time:</text><text x="422" y="78" text-anchor="middle" style="font-size:10px;fill:#b26a00">"I think the pointer is NULL here"</text><line x1="502" y1="62" x2="506" y2="62" stroke="#b26a00" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="506" y="26" width="156" height="72" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.2"/><text x="584" y="48" text-anchor="middle" style="font-size:13px;font-weight:700;fill:#1a7a40">Experiment</text><text x="584" y="64" text-anchor="middle" style="font-size:10px;fill:#1a7a40">Test it without changing</text><text x="584" y="78" text-anchor="middle" style="font-size:10px;fill:#1a7a40">multiple things at once</text><line x1="664" y1="62" x2="668" y2="62" stroke="#1a7a40" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="668" y="26" width="156" height="72" rx="5" fill="#f0e8ff" stroke="#c39be8" stroke-width="1.2"/><text x="746" y="48" text-anchor="middle" style="font-size:13px;font-weight:700;fill:#5c2d91">Fix + verify</text><text x="746" y="64" text-anchor="middle" style="font-size:10px;fill:#5c2d91">Confirm fix. Add a test.</text><text x="746" y="78" text-anchor="middle" style="font-size:10px;fill:#5c2d91">Make sure it cannot regress.</text><rect x="20" y="104" width="800" height="56" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="116" text-anchor="middle" style="font-size:12px;fill:#b26a00">git bisect -- binary search through commits to find which one introduced the bug:</text><rect x="26" y="126" width="780" height="78" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="33" y="137" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">git bisect start</text><text x="33" y="151" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">git bisect bad                  # current commit is broken</text><text x="33" y="165" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">git bisect good v1.2.3          # this tag was working</text><text x="33" y="179" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888"># git tests the midpoint commit, you say good/bad</text><text x="33" y="193" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">git bisect good  or  git bisect bad   # repeat ~10 times for 1000 commits</text><rect x="20" y="210" width="800" height="26" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="223" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Rubber duck debugging: explain the code aloud to an inanimate object -- forces you to articulate every assumption</text><rect x="20" y="242" width="800" height="48" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="255" text-anchor="middle" style="font-size:11px;fill:#1040a0">Heisenbugs: bugs that disappear when you add debug output -- almost always a race condition or UB</text><text x="420" y="269" text-anchor="middle" style="font-size:11px;fill:#1040a0">Mandelbugs: bugs with complex/chaotic sensitivity to irrelevant changes -- often stack overflow or UB</text><text x="420" y="283" text-anchor="middle" style="font-size:11px;fill:#1040a0">Schroedinbug: code that worked fine until someone read it -- logic was always wrong, never triggered</text></svg>`},
{title:"Compiler warnings -- free static analysis",narration:"Compiler warnings are the cheapest possible form of static analysis because they run at zero additional cost on every build. The -Wall flag enables the most commonly useful warnings. -Wextra adds additional checks including missing field initializers and unused parameters. -Wpedantic enforces strict standard compliance, flagging GNU extensions. -Wformat=2 catches format string security issues including user-controlled format strings. -Wconversion catches implicit narrowing conversions that silently truncate values. -Wshadow flags when a local variable hides an outer scope variable. Setting -Werror in CI ensures the codebase maintains zero warnings continuously. These flags collectively catch a large fraction of real bugs with no runtime cost.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Compiler warnings are free static analysis -- enable them all and treat them as errors</text><rect x="20" y="24" width="170" height="22" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="105" y="35" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#555">Flag</text><rect x="194" y="24" width="222" height="22" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="305" y="35" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#555">Catches</text><rect x="420" y="24" width="400" height="22" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="620" y="35" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#555">Example warning</text><rect x="20" y="48" width="170" height="18" rx="2" fill="#f2f2ee" stroke="#ccc" stroke-width="0.6"/><text x="105" y="57" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#555;font-family:monospace">-Wall</text><rect x="194" y="48" width="222" height="18" rx="2" fill="#f2f2ee" stroke="#ccc" stroke-width="0.6"/><text x="305" y="57" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#555">common mistakes</text><rect x="420" y="48" width="400" height="18" rx="2" fill="#f2f2ee" stroke="#ccc" stroke-width="0.6"/><text x="620" y="57" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#555">warning: unused variable 'x'</text><rect x="20" y="68" width="170" height="18" rx="2" fill="#deeeff" stroke="#88aaf0" stroke-width="0.6"/><text x="105" y="77" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#1040a0;font-family:monospace">-Wextra</text><rect x="194" y="68" width="222" height="18" rx="2" fill="#deeeff" stroke="#88aaf0" stroke-width="0.6"/><text x="305" y="77" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#1040a0">additional checks</text><rect x="420" y="68" width="400" height="18" rx="2" fill="#deeeff" stroke="#88aaf0" stroke-width="0.6"/><text x="620" y="77" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#1040a0">warning: missing field initializer</text><rect x="20" y="88" width="170" height="18" rx="2" fill="#deeeff" stroke="#88aaf0" stroke-width="0.6"/><text x="105" y="97" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#1040a0;font-family:monospace">-Wpedantic</text><rect x="194" y="88" width="222" height="18" rx="2" fill="#deeeff" stroke="#88aaf0" stroke-width="0.6"/><text x="305" y="97" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#1040a0">strict standard compliance</text><rect x="420" y="88" width="400" height="18" rx="2" fill="#deeeff" stroke="#88aaf0" stroke-width="0.6"/><text x="620" y="97" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:400;fill:#1040a0">warning: use of non-standard 'typeof'</text><rect x="20" y="108" width="170" height="18" rx="2" fill="#fff3e0" stroke="#f5b942" stroke-width="0.6"/><text x="105" y="117" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#b26a00;font-family:monospace">-Wformat=2</text><rect x="194" y="108" width="222" height="18" rx="2" fill="#fff3e0" stroke="#f5b942" stroke-width="0.6"/><text x="305" y="117" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#b26a00">format string security</text><rect x="420" y="108" width="400" height="18" rx="2" fill="#fff3e0" stroke="#f5b942" stroke-width="0.6"/><text x="620" y="117" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#b26a00">warning: %s on untrusted input</text><rect x="20" y="128" width="170" height="18" rx="2" fill="#fff3e0" stroke="#f5b942" stroke-width="0.6"/><text x="105" y="137" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#b26a00;font-family:monospace">-Wconversion</text><rect x="194" y="128" width="222" height="18" rx="2" fill="#fff3e0" stroke="#f5b942" stroke-width="0.6"/><text x="305" y="137" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#b26a00">implicit narrowing conversions</text><rect x="420" y="128" width="400" height="18" rx="2" fill="#fff3e0" stroke="#f5b942" stroke-width="0.6"/><text x="620" y="137" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:400;fill:#b26a00">warning: conversion from int to char</text><rect x="20" y="148" width="170" height="18" rx="2" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.6"/><text x="105" y="157" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#0d6a6a;font-family:monospace">-Wshadow</text><rect x="194" y="148" width="222" height="18" rx="2" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.6"/><text x="305" y="157" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#0d6a6a">variable shadows outer scope</text><rect x="420" y="148" width="400" height="18" rx="2" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.6"/><text x="620" y="157" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:400;fill:#0d6a6a">warning: declaration shadows a local var</text><rect x="20" y="168" width="170" height="18" rx="2" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.6"/><text x="105" y="177" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#0d6a6a;font-family:monospace">-Wstrict-aliasing=2</text><rect x="194" y="168" width="222" height="18" rx="2" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.6"/><text x="305" y="177" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#0d6a6a">strict aliasing violations</text><rect x="420" y="168" width="400" height="18" rx="2" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.6"/><text x="620" y="177" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:400;fill:#0d6a6a">warning: dereferencing type-punned ptr</text><rect x="20" y="188" width="170" height="18" rx="2" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.6"/><text x="105" y="197" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#1a7a40;font-family:monospace">-Wundef</text><rect x="194" y="188" width="222" height="18" rx="2" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.6"/><text x="305" y="197" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#1a7a40">undefined macros in #if</text><rect x="420" y="188" width="400" height="18" rx="2" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.6"/><text x="620" y="197" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#1a7a40">warning: 'NDEBUG' is not defined</text><rect x="20" y="208" width="170" height="18" rx="2" fill="#ffe0e0" stroke="#e08888" stroke-width="0.6"/><text x="105" y="217" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#c62828;font-family:monospace">-fstack-protector</text><rect x="194" y="208" width="222" height="18" rx="2" fill="#ffe0e0" stroke="#e08888" stroke-width="0.6"/><text x="305" y="217" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#c62828">stack smashing (runtime canary)</text><rect x="420" y="208" width="400" height="18" rx="2" fill="#ffe0e0" stroke="#e08888" stroke-width="0.6"/><text x="620" y="217" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#c62828">Aborted: stack smashing detected</text><rect x="20" y="232" width="800" height="18" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="241" text-anchor="middle" style="font-size:12px;fill:#c62828">Add -Werror to CI to enforce zero warnings. Recommended: gcc -Wall -Wextra -Wpedantic -Wformat=2 -Wconversion -Wshadow -Werror</text></svg>`},
{title:"GDB -- from basics to expert",narration:"GDB is the GNU Debugger and the most powerful tool for understanding why a program misbehaves. The most important commands for daily use are: run to start the program, next and step to execute line by line stepping over or into function calls, breakpoint and watchpoint to stop at specific locations or value changes, print and examine to inspect data, and backtrace to see the call stack. TUI mode, enabled with tui enable or the layout commands, shows the source file and current line in a split terminal view alongside the command prompt. GDB scripting with define and source allows you to automate complex debugging workflows. Conditional breakpoints with condition N expression stop only when specific values are reached.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">GDB -- the GNU Debugger: the most powerful tool in your arsenal</text><rect x="20" y="24" width="198" height="22" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="119" y="35" text-anchor="middle" style="font-size:11px;fill:#1040a0">Running</text><rect x="20" y="48" width="198" height="24" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="0.6"/><text x="24" y="58" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1040a0">run [args]</text><text x="24" y="68" text-anchor="start" style="font-size:9px;fill:#1040a0">start program</text><rect x="20" y="74" width="198" height="24" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="0.6"/><text x="24" y="84" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1040a0">start</text><text x="24" y="9 ke="#4caf79" stroke-width="0.6"/><text x="228" y="58" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1a7a40">print expr (p)</text><text x="228" y="68" text-anchor="start" style="font-size:9px;fill:#1a7a40">evaluate + print</text><rect x="224" y="74" width="198" height="24" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.6"/><text x="228" y="84" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1a7a40">x/Nfmt addr</text><text x="228" y="94" text-anchor="start" style="font-size:9px;fill:#1a7a40">examine N memory units</text><rect x="224" y="100" width="198" height="24" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.6"/><text x="228" y="110" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1a7a40">info locals</text><text x="228" y="120" text-anchor="start" style="font-size:9px;fill:#1a7a40">all locals in frame</text><rect x="224" y="126" width="198" height="24" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.6"/><text x="228" y="136" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1a7a40">backtrace (bt)</text><text x="228" y="146" text-anchor="start" style="font-size:9px;fill:#1a7a40">call stack</text><rect x="224" y="152" width="198" height="24" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.6"/><text x="228" y="162" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1a7a40">frame N</text><text x="228" y="172" text-anchor="start" style="font-size:9px;fill:#1a7a40">switch to frame N</text><rect x="224" y="178" width="198" height="24" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.6"/><text x="228" y="188" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1a7a40">info registers</text><text x="228" y="198" text-anchor="start" style="font-size:9px;fill:#1a7a40">all CPU registers</text><rect x="224" y="204" width="198" height="24" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.6"/><text x="228" y="214" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1a7a40">disassemble</text><text x="228" y="224" text-anchor="start" style="font-size:9px;fill:#1a7a40">show asm</text><rect x="428" y="24" width="198" height="22" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="527" y="35" text-anchor="middle" style="font-size:11px;fill:#b26a00">Breakpoints</text><rect x="428" y="48" width="198" height="24" rx="3" fill="#fff3e0" stroke="#f5b942" stroke-width="0.6"/><text x="432" y="58" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#b26a00">break func/file:line</text><text x="432" y="68" text-anchor="start" style="font-size:9px;fill:#b26a00">set breakpoint</text><rect x="428" y="74" width="198" height="24" rx="3" fill="#fff3e0" stroke="#f5b942" stroke-width="0.6"/><text x="432" y="84" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#b26a00">watch expr</text><text x="432" y="94" text-anchor="start" style="font-size:9px;fill:#b26a00">stop on write</text><rect x="428" y="100" width="198" height="24" rx="3" fill="#fff3e0" stroke="#f5b942" stroke-width="0.6"/><text x="432" y="110" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#b26a00">rwatch expr</text><text x="432" y="120" text-anchor="start" style="font-size:9px;fill:#b26a00">stop on read</text><rect x="428" y="126" width="198" height="24" rx="3" fill="#fff3e0" stroke="#f5b942" stroke-width="0.6"/><text x="432" y="136" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#b26a00">awatch expr</text><text x="432" y="146" text-anchor="start" style="font-size:9px;fill:#b26a00">stop on r/w</text><rect x="428" y="152" width="198" height="24" rx="3" fill="#fff3e0" stroke="#f5b942" stroke-width="0.6"/><text x="432" y="162" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#b26a00">condition N expr</text><text x="432" y="172" text-anchor="start" style="font-size:9px;fill:#b26a00">conditional bp</text><rect x="428" y="178" width="198" height="24" rx="3" fill="#fff3e0" stroke="#f5b942" stroke-width="0.6"/><text x="432" y="188" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#b26a00">info break</text><text x="432" y="198" text-anchor="start" style="font-size:9px;fill:#b26a00">list all</text><rect x="428" y="204" width="198" height="24" rx="3" fill="#fff3e0" stroke="#f5b942" stroke-width="0.6"/><text x="432" y="214" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#b26a00">delete N</text><text x="432" y="224" text-anchor="start" style="font-size:9px;fill:#b26a00">remove bp</text><rect x="632" y="24" width="198" height="22" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="731" y="35" text-anchor="middle" style="font-size:11px;fill:#0d6a6a">TUI mode</text><rect x="632" y="48" width="198" height="24" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.6"/><text x="636" y="58" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#0d6a6a">tui enable</text><text x="636" y="68" text-anchor="start" style="font-size:9px;fill:#0d6a6a">enter TUI</text><rect x="632" y="74" width="198" height="24" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.6"/><text x="636" y="84" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#0d6a6a">layout src</text><text x="636" y="94" text-anchor="start" style="font-size:9px;fill:#0d6a6a">source view</text><rect x="632" y="100" width="198" height="24" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.6"/><text x="636" y="110" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#0d6a6a">layout asm</text><text x="636" y="120" text-anchor="start" style="font-size:9px;fill:#0d6a6a">assembly view</text><rect x="632" y="126" width="198" height="24" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.6"/><text x="636" y="136" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#0d6a6a">layout regs</text><text x="636" y="146" text-anchor="start" style="font-size:9px;fill:#0d6a6a">registers view</text><rect x="632" y="152" width="198" height="24" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.6"/><text x="636" y="162" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#0d6a6a">layout split</text><text x="636" y="172" text-anchor="start" style="font-size:9px;fill:#0d6a6a">src+asm</text><rect x="632" y="178" width="198" height="24" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.6"/><text x="636" y="188" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#0d6a6a">Ctrl-X Ctrl-A</text><text x="636" y="198" text-anchor="start" style="font-size:9px;fill:#0d6a6a">toggle TUI</text><rect x="632" y="204" width="198" height="24" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.6"/><text x="636" y="214" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#0d6a6a">focus cmd</text><text x="636" y="224" text-anchor="start" style="font-size:9px;fill:#0d6a6a">focus command window</text><rect x="20" y="234" width="800" height="16" rx="5" fill="#f0e8ff" stroke="#c39be8" stroke-width="0.8"/><text x="420" y="242" text-anchor="middle" style="font-size:12px;fill:#5c2d91">gdb -tui ./prog  |  set pagination off  |  define cmd / end  -- scripting  |  source script.gdb</text></svg>`},
{title:"Core dumps -- crash analysis",narration:"A core dump is a complete snapshot of a process's virtual memory written to disk when the process receives a fatal signal. To enable them, run ulimit -c unlimited in the shell before launching the program, or configure limits.conf for persistent setting. The core file is named according to /proc/sys/kernel/core_pattern. To analyze it, run gdb with the executable and the core file as arguments. The bt full command shows the complete call stack with local variables in every frame. The frame command switches to any frame in the stack. The print and examine commands let you inspect any variable or memory address at the moment of crash. Always compile with -g to include debugging symbols.",svg:`<svg width="100%" viewBox="0 0 840 332"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Core dumps -- a snapshot of process memory at the moment of crash</text><rect x="30" y="26" width="260" height="60" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1.2"/><text x="160" y="46" text-anchor="middle" style="font-size:13px;font-weight:700;fill:#0d6a6a">1. Enable</text><text x="160" y="62" text-anchor="middle" style="font-size:10px;fill:#0d6a6a">ulimit -c unlimited</text><text x="160" y="76" text-anchor="middle" style="font-size:10px;fill:#0d6a6a">/proc/sys/kernel/core_pattern</text><line x1="292" y1="56" x2="306" y2="56" stroke="#0d6a6a" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="306" y="26" width="260" height="60" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="1.2"/><text x="436" y="46" text-anchor="middle" style="font-size:13px;font-weight:700;fill:#c62828">2. Crash</text><text x="436" y="62" text-anchor="middle" style="font-size:10px;fill:#c62828">program crashes (SIGSEGV etc)</text><text x="436" y="76" text-anchor="middle" style="font-size:10px;fill:#c62828">kernel writes core file</text><line x1="568" y1="56" x2="582" y2="56" stroke="#c62828" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="582" y="26" width="260" height="60" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.2"/><text x="712" y="46" text-anchor="middle" style="font-size:13px;font-weight:700;fill:#1a7a40">3. Analyze</text><text x="712" y="62" text-anchor="middle" style="font-size:10px;fill:#1a7a40">gdb ./prog core</text><text x="712" y="76" text-anchor="middle" style="font-size:10px;fill:#1a7a40">bt full / info locals</text><rect x="20" y="92" width="800" height="52" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="104" text-anchor="middle" style="font-size:12px;fill:#1040a0">Key GDB post-mortem analysis commands:</text><rect x="26" y="114" width="780" height="68" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="33" y="125" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">(gdb) bt full                 # full stack trace with locals in every frame</text><text x="33" y="140" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">(gdb) frame 3                 # switch to frame 3 where the crash is</text><text x="33" y="155" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">(gdb) info locals             # show all local variables in current frame</text><text x="33" y="170" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">(gdb) print *ptr              # dereference and print what a pointer points to</text><rect x="20" y="186" width="800" height="44" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="198" text-anchor="middle" style="font-size:12px;fill:#b26a00">Configuring core dumps:</text><rect x="26" y="234" width="780" height="53" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="33" y="245" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">echo "core.%e.%p.%t" | sudo tee /proc/sys/kernel/core_pattern   # name: prog.pid.timestamp</text><text x="33" y="260" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">ulimit -c unlimited      # per-shell / put in /etc/security/limits.conf for persistent</text><text x="33" y="275" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">coredumpctl (systemd)    # systemd captures all dumps automatically</text><rect x="20" y="291" width="800" height="30" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="301" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Compile with -g for symbol info -- without -g the core is nearly useless (no function names)</text><text x="420" y="315" text-anchor="middle" style="font-size:12px;fill:#1a7a40">gdb -ex bt -ex quit --batch prog core  -- automated crash reporting in CI</text></svg>`},
{title:"Valgrind -- five analysis tools",narration:"Valgrind instruments the program binary at load time to track every memory operation. Memcheck, the default tool, tracks which memory is allocated, initialized, and freed, reporting buffer overflows, use-after-free, uninitialized reads, and leaks. It runs at ten to thirty times normal speed. Callgrind counts every instruction executed and records the full call graph, which can be visualized in KCachegrind. Helgrind detects data races and lock-order violations similar to ThreadSanitizer but uses a different detection algorithm. Massif tracks heap and stack memory usage over time, producing a graph of allocation by call site, which helps find memory footprint regressions. The flag --leak-check=full and --track-origins=yes give the most complete leak reports from memcheck.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Valgrind -- dynamic binary instrumentation: five specialized analysis tools</text><rect x="20" y="24" width="198" height="18" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="119" y="33" text-anchor="middle" style="font-size:10px;fill:#c62828">memcheck (default)</text><text x="119" y="46" text-anchor="middle" style="font-size:9px;fill:#c62828">Memory error detector</text><rect x="20" y="50" width="198" height="104" rx="4" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="27" y="62" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">valgrind ./prog</text><text x="27" y="78" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">heap-buffer-overflow: invalid read</text><text x="27" y="94" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">use-after-free: 4B in freed blk</text><text x="27" y="110" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">a block of size 16 free'd at ...</text><text x="27" y="126" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">definitely lost: 256B in 4 blocks</text><text x="27" y="142" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">Overhead: 10-30x slower, 2x RAM</text><rect x="224" y="24" width="198" height="18" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="323" y="33" text-anchor="middle" style="font-size:10px;fill:#0d6a6a">callgrind</text><text x="323" y="46" text-anchor="middle" style="font-size:9px;fill:#0d6a6a">Call graph + instr count</text><rect x="224" y="50" width="198" height="104" rx="4" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="231" y="62" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">valgrind --tool=callgrind ./prog</text><text x="231" y="78" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">callgrind_annotate callgrind.out.*</text><text x="231" y="94" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">kcachegrind callgrind.out.*  (GUI)</text><text x="231" y="110" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">Shows: % instructions per function</text><text x="231" y="126" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">Reveals hot fns, no hw needed</text><text x="231" y="142" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">Overhead: 10-20x slower</text><rect x="428" y="24" width="198" height="18" rx="5" fill="#f0e8ff" stroke="#c39be8" stroke-width="0.8"/><text x="527" y="33" text-anchor="middle" style="font-size:10px;fill:#5c2d91">helgrind</text><text x="527" y="46" text-anchor="middle" style="font-size:9px;fill:#5c2d91">Thread error detector</text><rect x="428" y="50" width="198" height="104" rx="4" fill="#f0e8ff" stroke="#c39be8" stroke-width="0.8"/><text x="435" y="62" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">valgrind --tool=helgrind ./prog</text><text x="435" y="78" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">data race on 0x... by T1:</text><text x="435" y="94" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#888">#0  increment prog.c:12</text><text x="435" y="110" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">order violated: A before B (T1)</text><text x="435" y="126" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">                     B before A (T2)</text><text x="435" y="142" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">Overhead: 20-50x slower</text><rect x="632" y="24" width="198" height="18" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="731" y="33" text-anchor="middle" style="font-size:10px;fill:#1a7a40">massif</text><text x="731" y="46" text-anchor="middle" style="font-size:9px;fill:#1a7a40">Heap profiler</text><rect x="632" y="50" width="198" height="104" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="639" y="62" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">valgrind --tool=massif ./prog</text><text x="639" y="78" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">ms_print massif.out.*</text><text x="639" y="94" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">Shows heap usage over time</text><text x="639" y="110" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">Identifies peak allocation sites</text><text x="639" y="126" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">Tracks malloc/new/mmap/stack</text><text x="639" y="142" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:9.5px;fill:#222">Overhead: 10x slower</text><rect x="20" y="234" width="800" height="16" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="242" text-anchor="middle" style="font-size:12px;fill:#b26a00">valgrind --leak-check=full --track-origins=yes --show-leak-kinds=all -- for maximum detail from memcheck</text></svg>`},
{title:"ASan and UBSan in depth",narration:"AddressSanitizer and UndefinedBehaviorSanitizer are compiler-based sanitizers that instrument the binary to detect bugs at runtime. AddressSanitizer maintains a shadow memory map tracking which bytes are valid to access. Any access outside allocated regions generates a detailed error report with the full stack trace of both the bad access and the original allocation. Compile with -fsanitize=address,undefined -g -O1 -fno-omit-frame-pointer for complete results. UndefinedBehaviorSanitizer inserts checks at each potentially undefined operation: signed overflow, null dereference, misaligned access, invalid shift, and out-of-bounds array index. Both are designed to be run on test suites, not in production, because they add memory overhead and slow execution.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">AddressSanitizer and UndefinedBehaviorSanitizer -- catch bugs at their source</text><rect x="20" y="24" width="800" height="22" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="35" text-anchor="middle" style="font-size:12px;fill:#1040a0">Compile: gcc -fsanitize=address,undefined -g -O1 -fno-omit-frame-pointer prog.c</text><rect x="20" y="50" width="390" height="110" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="215" y="62" text-anchor="middle" style="font-size:11px;fill:#c62828">ASan output (heap-buffer-overflow):</text><rect x="26" y="72" width="378" height="128" rx="4" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="33" y="83" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">==12345==ERROR: AddressSanitizer:</text><text x="33" y="98" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  heap-buffer-overflow on 0x602000000014</text><text x="33" y="113" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">READ of size 4 at 0x602000000014 T0</text><text x="33" y="128" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">  #0 foo  prog.c:10:12</text><text x="33" y="143" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">  #1 main  prog.c:20:5</text><text x="33" y="158" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">allocated at 0x602000000010:</text><text x="33" y="173" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">  #0 malloc  /asan/...</text><text x="33" y="188" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">  #1 main  prog.c:18:14</text><rect x="430" y="50" width="390" height="110" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="625" y="62" text-anchor="middle" style="font-size:11px;fill:#b26a00">UBSan output (signed overflow):</text><rect x="436" y="72" width="378" height="143" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="443" y="83" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">prog.c:7:13: runtime error:</text><text x="443" y="98" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  signed integer overflow:</text><text x="443" y="113" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  2147483647 + 1 cannot be</text><text x="443" y="128" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  represented in type int</text><text x="443" y="143" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">SUMMARY: UBSan: undefined-behavior</text><text x="443" y="158" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  prog.c:7:13 in foo</text><text x="443" y="173" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="443" y="188" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888"># -fsanitize=undefined includes:</text><text x="443" y="203" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888"># shift, null, bounds, alignment...</text><rect x="20" y="166" width="800" height="44" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="180" text-anchor="middle" style="font-size:12px;fill:#1a7a40">What each sanitizer detects:</text><text x="28" y="190" text-anchor="start" style="font-size:9px;font-weight:700;fill:#1a7a40">ASan</text><text x="64" y="190" text-anchor="start" style="font-size:9px;fill:#555">heap/stack/global overflow, use-after-free, double-free, use-after-return (~2x overhead)</text><text x="28" y="199" text-anchor="start" style="font-size:9px;font-weight:700;fill:#1a7a40">UBSan</text><text x="64" y="199" text-anchor="start" style="font-size:9px;fill:#555">signed overflow, null deref, misalignment, invalid shift, OOB array index (<2x overhead)</text><text x="28" y="208" text-anchor="start" style="font-size:9px;font-weight:700;fill:#1a7a40">LSan</text><text x="64" y="208" text-anchor="start" style="font-size:9px;fill:#555">leak sanitizer: included in ASan, reports all leaked allocations at exit</text><text x="28" y="217" text-anchor="start" style="font-size:9px;font-weight:700;fill:#1a7a40">MSan</text><text x="64" y="217" text-anchor="start" style="font-size:9px;fill:#555">uninitialized reads: clang only, ~3x overhead -- finds subtle uninitialized value bugs</text><rect x="20" y="228" width="800" height="22" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="239" text-anchor="middle" style="font-size:12px;fill:#c62828">Run sanitizers on ALL tests in CI. A bug caught by ASan is 10x easier to fix than one found in production.</text></svg>`},
{title:"strace and ltrace -- syscall and library tracing",narration:"strace intercepts every system call a process makes using the ptrace mechanism, printing the call name, arguments, and return value. This reveals file accesses, network connections, memory mappings, and signal handling without modifying the program. The -e flag filters to specific syscalls. The -c flag produces a summary table showing total time and call count per syscall, which immediately identifies where the program spends time in kernel space. The -p flag attaches to a running process by PID. ltrace similarly intercepts calls to shared library functions by hooking the Procedure Linkage Table. These tools are invaluable for diagnosing missing configuration files, permission errors, network failures, and unexpected behaviors without needing source code.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">strace and ltrace -- observe every kernel call and library call your program makes</text><rect x="20" y="24" width="800" height="22" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="35" text-anchor="middle" style="font-size:12px;fill:#1040a0">strace intercepts syscalls via ptrace(2)  |  ltrace intercepts PLT stubs in shared libraries</text><rect x="20" y="50" width="390" height="112" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="215" y="62" text-anchor="middle" style="font-size:11px;fill:#0d6a6a">strace ./mycat file.txt</text><rect x="26" y="72" width="378" height="128" rx="4" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="33" y="83" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">execve("./mycat",["./mycat","file.txt"],...)=0</text><text x="33" y="98" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">openat(AT_FDCWD,"file.txt",O_RDONLY)  = 3</text><text x="33" y="113" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">fstat(3,{st_mode=S_IFREG,st_size=42}) = 0</text><text x="33" y="128" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">mmap(NULL,4096,PROT_READ,MAP_PRIVATE,3,0) = 0x7f...</text><text x="33" y="143" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">read(3,"hello world\\n",4096)            = 12</text><text x="33" y="158" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">write(1,"hello world\\n",12)             = 12</text><text x="33" y="173" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">close(3)                                 = 0</text><text x="33" y="188" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">exit_group(0)</text><rect x="430" y="50" width="390" height="112" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="625" y="62" text-anchor="middle" style="font-size:11px;fill:#b26a00">strace options and ltrace:</text><rect x="436" y="72" width="378" height="143" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="443" y="83" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888"># filter syscalls:</text><text x="443" y="98" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">strace -e openat,read,write ./prog</text><text x="443" y="113" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888"># summary (count + time):</text><text x="443" y="128" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">strace -c ./prog</text><text x="443" y="143" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888"># attach to running process:</text><text x="443" y="158" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">strace -p PID</text><text x="443" y="173" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888"># ltrace: library calls</text><text x="443" y="188" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">ltrace ./prog  # shows malloc,fopen etc</text><text x="443" y="203" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">ltrace -c ./prog  # summary table</text><rect x="20" y="168" width="800" height="44" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="180" text-anchor="middle" style="font-size:12px;fill:#1a7a40">strace use cases:</text><text x="28" y="192" text-anchor="start" style="font-size:9px;font-weight:700;fill:#1a7a40">config file location</text><text x="130" y="192" text-anchor="start" style="font-size:9px;fill:#555">trace openat() to see which files the program looks for</text><text x="28" y="200" text-anchor="start" style="font-size:9px;font-weight:700;fill:#1a7a40">performance</text><text x="130" y="200" text-anchor="start" style="font-size:9px;fill:#555">strace -c reveals which syscalls dominate wall time</text><text x="28" y="208" text-anchor="start" style="font-size:9px;font-weight:700;fill:#1a7a40">permissions</text><text x="130" y="208" text-anchor="start" style="font-size:9px;fill:#555">trace openat() EACCES or ENOENT to diagnose failures</text><text x="28" y="216" text-anchor="start" style="font-size:9px;font-weight:700;fill:#1a7a40">network</text><text x="130" y="216" text-anchor="start" style="font-size:9px;fill:#555">trace connect() and send/recv to see server addresses</text><rect x="20" y="218" width="800" height="30" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="230" text-anchor="middle" style="font-size:11px;fill:#1040a0">strace overhead: 10-100x slower (due to ptrace stop per syscall) -- use -c for profiling, not -o</text><text x="420" y="244" text-anchor="middle" style="font-size:11px;fill:#1040a0">perf trace (newer alternative): much lower overhead via ring buffer, same syscall view</text></svg>`},
{title:"gprof and perf -- performance profiling",narration:"Performance profiling answers the question: where does the program spend its time? gprof uses compile-time instrumentation added with the -pg flag to measure time in every function, producing a flat profile and a call graph. perf uses hardware performance counters in the CPU and statistical sampling without any recompilation. perf stat runs the program once and prints a summary of hardware events including cycles, instructions per cycle, cache misses, and branch mispredictions. An IPC below one indicates the program is stalled waiting for memory or mispredicted branches. A cache miss rate above five percent for the last-level cache indicates a memory-bound workload. perf record collects a sample trace that perf report displays as a ranked list of hot functions.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">gprof and perf -- find where your program spends its time</text><rect x="20" y="24" width="380" height="78" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="210" y="36" text-anchor="middle" style="font-size:12px;fill:#0d6a6a">gprof -- instrumented profiling</text><rect x="26" y="46" width="368" height="98" rx="4" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="33" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888"># Step 1: compile with -pg:</text><text x="33" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">gcc -pg -O2 prog.c -o prog</text><text x="33" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888"># Step 2: run -- generates gmon.out:</text><text x="33" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">./prog</text><text x="33" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888"># Step 3: generate report:</text><text x="33" y="132" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">gprof prog gmon.out | head -40</text><rect x="430" y="24" width="390" height="78" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="625" y="36" text-anchor="middle" style="font-size:12px;fill:#1040a0">perf stat -- hardware counters</text><rect x="436" y="46" width="378" height="113" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="443" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">perf stat ./prog</text><text x="443" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="443" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"> 2,345.12 msec  task-clock</text><text x="443" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"> 8,901,234,567  cycles           # 3.80 GHz</text><text x="443" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"> 6,789,012,345  instructions     # 0.76 IPC</text><text x="443" y="132" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">   234,567,890  cache-misses     # 12.3%</text><text x="443" y="147" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">     5,678,901  branch-misses    # 0.42%</text><rect x="20" y="108" width="800" height="58" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="120" text-anchor="middle" style="font-size:12px;fill:#b26a00">perf record + report -- sampling profiler (production-safe):</text><rect x="26" y="130" width="780" height="53" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="33" y="141" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">perf record -g ./prog            # sample with call graphs (-g)</text><text x="33" y="156" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">perf report                      # interactive TUI: top functions by % time</text><text x="33" y="171" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">perf record -F 999 -p PID        # attach to running process at 999 Hz</text><rect x="20" y="172" width="800" height="44" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="184" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Reading perf output:</text><text x="28" y="196" text-anchor="start" style="font-size:9px;font-weight:700;fill:#1a7a40">task-clock</text><text x="180" y="196" text-anchor="start" style="font-size:9px;fill:#555">wall time used; > 1 CPU = multi-threaded, < 1 = I/O bound</text><text x="28" y="204" text-anchor="start" style="font-size:9px;font-weight:700;fill:#1a7a40">IPC (insn/cycle)</text><text x="180" y="204" text-anchor="start" style="font-size:9px;fill:#555">< 1 = stalls (cache miss / branch miss); > 2 = well-optimized</text><text x="28" y="212" text-anchor="start" style="font-size:9px;font-weight:700;fill:#1a7a40">cache-misses %</text><text x="180" y="212" text-anchor="start" style="font-size:9px;fill:#555">> 5% last-level cache miss rate = memory bound -- optimize data layout</text><text x="28" y="220" text-anchor="start" style="font-size:9px;font-weight:700;fill:#1a7a40">branch-misses %</text><text x="180" y="220" text-anchor="start" style="font-size:9px;fill:#555">> 1% = unpredictable branches -- consider branchless code</text><rect x="20" y="226" width="800" height="24" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="234" text-anchor="middle" style="font-size:12px;fill:#c62828">gprof inserts timing overhead -- use perf for accurate wall-time profiles in production</text><text x="420" y="246" text-anchor="middle" style="font-size:12px;fill:#c62828">perf top -- live view of hot functions on running system (no recording needed)</text></svg>`},
{title:"Flame graphs and Cachegrind",narration:"A flame graph is a visualization of sampled call stacks where the horizontal axis represents total time and the vertical axis represents call depth. Each bar is a function: its width shows how much CPU time that function and its callees consumed, and it sits on top of its caller. Wide flat bars at the top of the stack are the hot spots. Generate a flame graph by capturing a perf record with call graphs, converting with stackcollapse-perf.pl, and rendering with flamegraph.pl. Cachegrind simulates the CPU cache hierarchy and counts cache misses per function and per source line. A high last-level cache miss rate in a hot function usually indicates poor data locality: the program is traversing data in a cache-unfriendly order, and restructuring to access memory sequentially dramatically improves performance.",svg:`<svg width="100%" viewBox="0 0 840 330"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Flame graphs -- visualize CPU time by call stack  |  Cachegrind -- model cache behavior</text><text x="230" y="30" text-anchor="middle" style="font-size:11px;fill:#444">Flame graph: y=call depth, x=CPU time fraction</text><rect x="20" y="188" width="400" height="22" rx="2" fill="#c62828" stroke="#c62828bb" stroke-width="0.5"/><text x="220" y="199" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:white">main()  100%</text><rect x="20" y="164" width="260" height="22" rx="2" fill="#e53935" stroke="#e53935bb" stroke-width="0.5"/><text x="150" y="175" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:white">work()  65%</text><rect x="281" y="164" width="139" height="22" rx="2" fill="#fb8c00" stroke="#fb8c00bb" stroke-width="0.5"/><text x="350" y="175" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:#333">setup()  35%</text><rect x="20" y="140" width="160" height="22" rx="2" fill="#d32f2f" stroke="#d32f2fbb" stroke-width="0.5"/><text x="100" y="151" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:white">inner()  40%</text><rect x="181" y="140" width="99" height="22" rx="2" fill="#ef5350" stroke="#ef5350bb" stroke-width="0.5"/><text x="230" y="151" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:white">alloc() 25%</text><rect x="281" y="140" width="79" height="22" rx="2" fill="#ffb74d" stroke="#ffb74dbb" stroke-width="0.5"/><text x="320" y="151" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:#333">init() 20%</text><rect x="361" y="140" width="59" height="22" rx="2" fill="#a5d6a7" stroke="#a5d6a7bb" stroke-width="0.5"/><text x="390" y="151" text-anchor="middle" dominant-baseline="central" style="font-size:9px;fill:#333">cls</text><rect x="20" y="116" width="112" height="22" rx="2" fill="#b71c1c" stroke="#b71c1cbb" stroke-width="0.5"/><text x="76" y="127" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:white">hot_fn() 28%</text><rect x="133" y="116" width="47" height="22" rx="2" fill="#ef9a9a" stroke="#ef9a9abb" stroke-width="0.5"/><text x="156" y="127" text-anchor="middle" dominant-baseline="central" style="font-size:9px;fill:#333">md5()</text><rect x="181" y="116" width="99" height="22" rx="2" fill="#ffcc80" stroke="#ffcc80bb" stroke-width="0.5"/><text x="230" y="127" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:#333">malloc</text><rect x="20" y="92" width="72" height="22" rx="2" fill="#880e4f" stroke="#880e4fbb" stroke-width="0.5"/><text x="56" y="103" text-anchor="middle" dominant-baseline="central" style="font-size:8px;fill:white">loop_body() 18%</text><text x="220" y="84" text-anchor="middle" style="font-size:9px;fill:#aaa"><-- wider = more CPU time</text><text x="20" y="210" text-anchor="start" style="font-size:9px;fill:#aaa">▲ lower = entry point</text><rect x="20" y="218" width="396" height="60" rx="4" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="27" y="228" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888"># Generate flame graph:</text><text x="27" y="241" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">perf record -g ./prog</text><text x="27" y="254" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">perf script | stackcollapse-perf.pl</text><text x="27" y="267" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  | flamegraph.pl > flame.svg</text><rect x="440" y="24" width="380" height="122" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="630" y="36" text-anchor="middle" style="font-size:12px;fill:#1040a0">Cachegrind cache hierarchy:</text><rect x="448" y="50" width="180" height="18" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="540" y="59" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#1a7a40">L1d / L1i  32 KB   ~4 cycles</text><text x="638" y="59" text-anchor="start" style="font-size:9px;fill:#555">hit here = fast</text><rect x="448" y="72" width="180" height="18" rx="3" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="540" y="81" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#b26a00">L2 unified  256 KB  ~12 cycles</text><text x="638" y="81" text-anchor="start" style="font-size:9px;fill:#555">miss L1 = slower</text><rect x="448" y="94" width="180" height="18" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="540" y="103" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#0d6a6a">L3 / LLC  8 MB    ~40 cycles</text><text x="638" y="103" text-anchor="start" style="font-size:9px;fill:#555">miss L2 = painful</text><rect x="448" y="116" width="180" height="18" rx="3" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="540" y="125" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#c62828">Main RAM    GB    ~200 cycles</text><text x="638" y="125" text-anchor="start" style="font-size:9px;fill:#555">miss L3 = stall!</text><rect x="440" y="142" width="380" height="98" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="447" y="153" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">valgrind --tool=cachegrind ./prog</text><text x="447" y="168" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">cg_annotate cachegrind.out.*</text><text x="447" y="183" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888"># shows per-function:</text><text x="447" y="198" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">#   Dr: data reads  Dw: data writes</text><text x="447" y="213" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">#   D1mr: L1 miss rate  DLmr: LLC miss rate</text><text x="447" y="228" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888"># annotate src with miss counts</text><rect x="440" y="244" width="380" height="74" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="630" y="258" text-anchor="middle" style="font-size:11px;fill:#b26a00">Optimization guidance:</text><text x="440" y="274" text-anchor="start" style="font-size:10px;fill:#b26a00">High DLmr: fix data layout (SoA vs AoS)</text><text x="440" y="288" text-anchor="start" style="font-size:10px;fill:#b26a00">High I1mr: code too large (link-time optimize)</text><text x="440" y="302" text-anchor="start" style="font-size:10px;fill:#b26a00">Use perf c2c for false sharing analysis</text></svg>`},
{title:"GDB remote + OpenOCD embedded debugging",narration:"Embedded debugging with GDB remote protocol connects the GDB client on your development machine to a hardware debug probe on the target board using a TCP socket. OpenOCD is the most common open-source on-chip debugger server: it speaks JTAG or SWD to hardware probes and exposes a GDB remote server on port 3333. After connecting, the load command programs the firmware into flash memory, then breakpoints and watchpoints work exactly as with local debugging. Cortex-M processors automatically save registers onto the stack when a hard fault occurs, including the faulting PC, so reading the stacked frame reveals the exact instruction that caused the fault. The CFSR register at address 0xE000ED28 contains detailed bits describing which fault class occurred: bus fault, memory management fault, usage fault, or imprecise error.",svg:`<svg width="100%" viewBox="0 0 840 288"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">GDB remote + OpenOCD -- debug bare-metal firmware running on real hardware</text><rect x="20" y="24" width="370" height="178" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="195" y="36" text-anchor="middle" style="font-size:12px;fill:#1040a0">The debugging stack</text><rect x="28" y="50" width="356" height="22" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="36" y="61" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1040a0">arm-none-eabi-gdb prog.elf</text><text x="36" y="70" text-anchor="start" style="font-size:8px;fill:#1040a0">GDB client (your laptop)</text><line x1="206" y1="72" x2="206" y2="78" stroke="#1040a0" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="28" y="78" width="356" height="22" rx="3" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="36" y="89" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;font-weight:700;fill:#555">TCP port 3333</text><text x="36" y="98" text-anchor="start" style="font-size:8px;fill:#555">GDB remote serial protocol</text><line x1="206" y1="100" x2="206" y2="106" stroke="#555" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="28" y="106" width="356" height="22" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="36" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;font-weight:700;fill:#0d6a6a">OpenOCD</text><text x="36" y="126" text-anchor="start" style="font-size:8px;fill:#0d6a6a">on-chip debugger server</text><line x1="206" y1="128" x2="206" y2="134" stroke="#0d6a6a" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="28" y="134" width="356" height="22" rx="3" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="36" y="145" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;font-weight:700;fill:#b26a00">JTAG / SWD probe</text><text x="36" y="154" text-anchor="start" style="font-size:8px;fill:#b26a00">hardware interface (ST-Link etc)</text><line x1="206" y1="156" x2="206" y2="162" stroke="#b26a00" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="28" y="162" width="356" height="22" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="36" y="173" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1a7a40">Target MCU</text><text x="36" y="182" text-anchor="start" style="font-size:8px;fill:#1a7a40">Cortex-M running your firmware</text><rect x="410" y="24" width="410" height="98" rx="5" fill="#e6f4ee" stroke="#4
