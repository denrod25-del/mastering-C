<script>
const SLIDES=[
{title:"What is undefined behavior?",narration:"The C standard defines three categories of unportable behavior and understanding the distinction matters. Undefined behavior means the standard places no requirement on what happens. The compiler is free to assume UB never occurs and optimize aggressively on that assumption. Implementation-defined behavior means the behavior varies by platform but must be documented. Unspecified behavior means the standard allows multiple valid outcomes without requiring documentation. UB is categorically different: it is not a runtime event, not an exception, not a signal. It is an optimization contract the compiler uses to justify eliminating your safety checks.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">The C standard defines three categories of behavior -- UB is the most dangerous</text><rect x="20" y="24" width="254" height="130" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="147" y="36" text-anchor="middle" style="font-size:12px;fill:#c62828">Undefined Behavior (UB)</text><rect x="26" y="46" width="242" height="143" rx="4" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="33" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">Anything can happen.</text><text x="33" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  nasal demons, time travel,</text><text x="33" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  silently wrong results,</text><text x="33" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  works for 10 years then</text><text x="33" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  breaks on new compiler.</text><text x="33" y="132" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="33" y="147" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">Standard: "no requirement"</text><text x="33" y="162" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">Compiler: "assume it never</text><text x="33" y="177" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  occurs -- optimize freely"</text><rect x="294" y="24" width="252" height="130" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="36" text-anchor="middle" style="font-size:12px;fill:#b26a00">Implementation-Defined</text><rect x="300" y="46" width="240" height="143" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="307" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">Behavior is defined but</text><text x="307" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  depends on the impl.</text><text x="307" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  Must be documented.</text><text x="307" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="307" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">Examples:</text><text x="307" y="132" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  sizeof(int) = 4 (x86)</text><text x="307" y="147" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  CHAR_SIGNED or unsigned</text><text x="307" y="162" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  right shift of signed int</text><text x="307" y="177" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">Portable if you check.</text><rect x="566" y="24" width="254" height="130" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="693" y="36" text-anchor="middle" style="font-size:12px;fill:#1040a0">Unspecified Behavior</text><rect x="572" y="46" width="242" height="143" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="579" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">One of several valid</text><text x="579" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  behaviors chosen by impl.</text><text x="579" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  Need not be documented.</text><text x="579" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="579" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">Examples:</text><text x="579" y="132" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  argument eval order</text><text x="579" y="147" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  order of side effects</text><text x="579" y="162" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  in && and || subexpressions</text><text x="579" y="177" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">Avoid relying on any one.</text><rect x="20" y="162" width="800" height="26" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="175" text-anchor="middle" style="font-size:12px;fill:#c62828">UB is not a runtime signal -- the compiler assumes it never occurs and optimizes on that assumption</text><rect x="20" y="194" width="800" height="22" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="205" text-anchor="middle" style="font-size:12px;fill:#b26a00">Rule: write code where all behavior is defined. Every UB is a latent security vulnerability.</text><rect x="20" y="222" width="800" height="22" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="233" text-anchor="middle" style="font-size:12px;fill:#1a7a40">gcc -fsanitize=undefined,address  --  catches most UB at runtime during testing</text></svg>`},
{title:"Arithmetic undefined behavior",narration:"Three arithmetic operations invoke undefined behavior. Signed integer overflow: when a signed integer exceeds its range the result is not defined. In particular two complement wraparound is not guaranteed and the compiler may assume overflow never occurs allowing deletion of overflow checks. Division and modulo by zero: the result is undefined, not a guaranteed exception. On x86 a SIGFPE signal may occur but this is not required by the standard. Shift out of range: shifting by an amount equal to or exceeding the bit width of the type, or left-shifting a negative value, are both undefined behavior.",svg:`<svg width="100%" viewBox="0 0 840 254"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Three arithmetic operations invoke UB -- even if they "work" today the compiler may exploit them</text><rect x="20" y="24" width="800" height="62" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="36" text-anchor="middle" style="font-size:12px;fill:#c62828">UB 1: Signed integer overflow -- wrapping is NOT guaranteed for signed types</text><rect x="26" y="46" width="380" height="68" rx="4" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="33" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int x = INT_MAX;  // 2,147,483,647</text><text x="33" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">int y = x + 1;    // UB! (not -2147483648)</text><text x="33" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// compiler assumes x+1 &gt; x always</text><text x="33" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// =&gt; deletes your overflow check</text><rect x="430" y="46" width="380" height="68" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="437" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Safe alternatives:</text><text x="437" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">unsigned int u = UINT_MAX;</text><text x="437" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">unsigned int v = u + 1; // wraps to 0: defined</text><text x="437" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// or: __builtin_add_overflow(x, 1, &amp;y)</text><rect x="20" y="92" width="800" height="56" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="104" text-anchor="middle" style="font-size:12px;fill:#b26a00">UB 2: Division and modulo by zero -- not an exception; enters UB territory</text><rect x="26" y="114" width="380" height="53" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="33" y="125" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int a = 5, b = 0;</text><text x="33" y="140" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">int c = a / b;   // UB! not a SIGFPE guarantee</text><text x="33" y="155" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">int d = a % b;   // UB! same rule</text><rect x="430" y="114" width="380" height="53" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="437" y="125" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Always check divisor != 0</text><text x="437" y="140" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">if (b != 0) c = a / b;</text><text x="437" y="155" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// On x86 SIGFPE may happen -- do NOT rely on it</text><rect x="20" y="154" width="800" height="56" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="166" text-anchor="middle" style="font-size:12px;fill:#1040a0">UB 3: Shift out of range -- shift &gt;= bit width, or left-shift of negative value</text><rect x="26" y="176" width="380" height="68" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="33" y="187" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#1a7a40">uint32_t v = 1u &lt;&lt; 31;  // OK: unsigned</text><text x="33" y="202" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">int32_t  s = 1  &lt;&lt; 31;  // UB: overflow</text><text x="33" y="217" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">uint32_t w = v  &lt;&lt; 32;  // UB: shift &gt;= width</text><text x="33" y="232" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">int neg  = -1 &lt;&lt; 1;     // UB: left-shift negative</text><rect x="430" y="176" width="380" height="53" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="437" y="187" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Use unsigned for bit manipulation</text><text x="437" y="202" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// 0 &lt;= shift &lt; sizeof(type)*CHAR_BIT</text><text x="437" y="217" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Portable rotate: (v&lt;&lt;n)|(v&gt;&gt;(32-n))</text><rect x="20" y="236" width="800" height="16" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="420" y="244" text-anchor="middle" style="font-size:12px;fill:#555">Compile with -ftrapv (signed overflow =&gt; SIGABRT)  or  -fsanitize=signed-integer-overflow</text></svg>`},
{title:"Pointer undefined behavior",narration:"Four pointer operations invoke undefined behavior. Null pointer dereference is UB and the compiler uses the dereference to prove the pointer non-null, allowing deletion of null checks that appear afterward. Out-of-bounds access is UB even if the adjacent memory physically exists. Use-after-free is UB because the allocator may have reused or unmapped those bytes. Misaligned pointer dereference is UB because it violates the type alignment requirement. It causes bus errors on ARM and silently slower operations on x86. All four are caught at runtime by AddressSanitizer.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Four pointer operations invoke undefined behavior -- all are exploitable vulnerabilities</text><rect x="20" y="24" width="390" height="90" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="215" y="36" text-anchor="middle" style="font-size:12px;fill:#c62828">UB 1: Null pointer dereference</text><rect x="26" y="46" width="378" height="68" rx="4" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="33" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int *p = NULL;</text><text x="33" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">int v = *p;     // UB: crash on most platforms</text><text x="33" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// BUT: compiler uses this to prove p!=NULL</text><text x="33" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// =&gt; deletes null check that comes AFTER</text><rect x="430" y="24" width="390" height="90" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="625" y="36" text-anchor="middle" style="font-size:12px;fill:#b26a00">UB 2: Out-of-bounds access</text><rect x="436" y="46" width="378" height="68" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="443" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int arr[4] = {1,2,3,4};</text><text x="443" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">int x = arr[4]; // UB: past the end</text><text x="443" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">int y = arr[-1];// UB: before the start</text><text x="443" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// C never checks bounds -- this is on you</text><rect x="20" y="120" width="390" height="90" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="215" y="132" text-anchor="middle" style="font-size:12px;fill:#c62828">UB 3: Use-after-free</text><rect x="26" y="142" width="378" height="83" rx="4" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="33" y="153" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int *p = malloc(sizeof(int));</text><text x="33" y="168" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">*p = 42;</text><text x="33" y="183" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">free(p);         // returned to heap</text><text x="33" y="198" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">int v = *p;      // UB: may be reused already</text><text x="33" y="213" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#1a7a40">p = NULL;        // safe: catches dangling use</text><rect x="430" y="120" width="390" height="90" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="625" y="132" text-anchor="middle" style="font-size:12px;fill:#1040a0">UB 4: Misaligned pointer</text><rect x="436" y="142" width="378" height="83" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="443" y="153" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">char buf[8];</text><text x="443" y="168" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int *p = (int*)(buf + 1); // misaligned!</text><text x="443" y="183" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">*p = 42;  // UB on all platforms</text><text x="443" y="198" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// bus error on ARM, slow on x86</text><text x="443" y="213" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// also strict-aliasing UB (wrong type)</text><rect x="20" y="216" width="800" height="32" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="228" text-anchor="middle" style="font-size:12px;fill:#1a7a40">All four caught by: gcc -fsanitize=address (ASan)  --  run every test with ASan enabled</text><text x="420" y="242" text-anchor="middle" style="font-size:12px;fill:#1a7a40">UB 2 also: -fsanitize=bounds  |  UB 4: -fsanitize=alignment</text></svg>`},
{title:"Strict aliasing and type UB",narration:"The strict aliasing rule states that an object may only be accessed through a pointer of a compatible type, with one exception: char pointers can alias anything. This rule lets the compiler prove that writes through one pointer type cannot affect values read through an incompatible type, enabling load hoisting and dead store elimination. If you write to a float and read that memory as an int through a reinterpreted pointer the compiler may return a cached pre-write value. The three legal alternatives are memcpy which always optimizes to a register move, a union which is legal in C11, and char pointers which always alias any type.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Strict aliasing rule: an object may only be read through a pointer of a compatible type</text><rect x="20" y="24" width="390" height="116" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="215" y="36" text-anchor="middle" style="font-size:12px;fill:#c62828">Source code (strict aliasing violation)</text><rect x="26" y="46" width="378" height="98" rx="4" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="33" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">float f = 1.0f;</text><text x="33" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">int  *ip = (int *)&amp;f; // UB: float* and int*</text><text x="33" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">                      //  cannot alias</text><text x="33" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">f = 2.0f;             // write through float*</text><text x="33" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">return *ip;           // read through int* =&gt; UB</text><text x="33" y="132" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// compiler may return cached pre-write value</text><rect x="430" y="24" width="390" height="116" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="625" y="36" text-anchor="middle" style="font-size:12px;fill:#1040a0">What the compiler thinks at -O2</text><rect x="436" y="46" width="378" height="98" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="443" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// ip and &f can't alias (strict aliasing)</text><text x="443" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// so f=2.0f has no effect on *ip</text><text x="443" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// cached original float bits returned</text><text x="443" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="443" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Result: returns 0x3F800000 (bits of 1.0f)</text><text x="443" y="132" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// even though f is now 2.0f -- WRONG</text><rect x="20" y="148" width="800" height="52" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="162" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Three legal ways to reinterpret bytes:</text><rect x="26" y="172" width="236" height="53" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="33" y="183" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// 1. memcpy (always safe, fast)</text><text x="33" y="198" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">uint32_t bits;</text><text x="33" y="213" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#1a7a40">memcpy(&amp;bits, &amp;f, sizeof f); // OK</text><rect x="280" y="172" width="260" height="53" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="287" y="183" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// 2. union (C11 legal)</text><text x="287" y="198" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">union {float f; uint32_t i;} u;</text><text x="287" y="213" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#1a7a40">u.f = 1.0f; return u.i; // OK</text><rect x="556" y="172" width="258" height="53" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="563" y="183" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// 3. char* aliases anything</text><text x="563" y="198" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">char *cp = (char*)&amp;f;</text><text x="563" y="213" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// reading as bytes: always OK</text><rect x="20" y="232" width="800" height="18" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="241" text-anchor="middle" style="font-size:12px;fill:#b26a00">-fno-strict-aliasing disables (costs ~5-10% perf)  |  -fsanitize=undefined catches at runtime</text></svg>`},
{title:"Sequence point and expression UB",narration:"Between sequence points, modifying the same variable more than once in a single expression, or modifying a variable and using its value for a purpose other than determining the new value, is undefined behavior. The classic example is i-plus-plus plus i-plus-plus: both increments are unsequenced modifications of i and the result can be anything at all, not just one of the two obvious values. The same applies to function argument evaluation order: if two arguments modify the same variable the combined behavior is undefined. The comma operator and short-circuit and-and and or-or do introduce sequence points and are safe.",svg:`<svg width="100%" viewBox="0 0 840 250"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Sequence point UB: modifying a variable twice, or modifying and using it, in one expression</text><rect x="20" y="24" width="800" height="36" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="38" text-anchor="middle" style="font-size:12px;fill:#1040a0">Between sequence points all side effects of the previous expression must be complete</text><text x="420" y="52" text-anchor="middle" style="font-size:12px;fill:#1040a0">Sequence points: end of full expression  |  before function call  |  short-circuit &&/||  |  comma operator</text><rect x="20" y="66" width="800" height="56" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="78" text-anchor="middle" style="font-size:12px;fill:#c62828">Classic UB expressions -- output is NOT "implementation-defined", it is fully undefined</text><rect x="26" y="88" width="780" height="68" rx="4" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="33" y="99" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int i = 1;</text><text x="33" y="114" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">int a = i++ + i++;   // UB: two unsequenced modifications of i (could be 2, 3, or 42)</text><text x="33" y="129" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">int b = ++i + ++i;   // UB: same problem with pre-increment</text><text x="33" y="144" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">printf("%d %d", i++, i++); // UB: arg eval order unspecified AND both modify i</text><rect x="20" y="130" width="800" height="54" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="142" text-anchor="middle" style="font-size:12px;fill:#b26a00">More subtle cases:</text><rect x="26" y="152" width="780" height="53" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="33" y="163" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">int v = a[i] = i++;  // UB: i used as subscript AND modified</text><text x="33" y="178" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#1a7a40">int w = f(i) + g(i); // OK if f/g do not modify i (just unspecified eval order)</text><text x="33" y="193" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#1a7a40">int x = (i=2, i+1); // OK: comma IS a sequence point -- x=3, defined</text><rect x="20" y="192" width="800" height="28" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="204" text-anchor="middle" style="font-size:12px;fill:#1a7a40">How to avoid: one modification per statement. Never modify and use the same variable in one expression.</text><text x="420" y="216" text-anchor="middle" style="font-size:12px;fill:#1a7a40">gcc -Wsequence-point catches many (not all)  |  -fsanitize=undefined catches some at runtime</text><rect x="20" y="226" width="800" height="22" rx="5" fill="#f0e8ff" stroke="#c39be8" stroke-width="0.8"/><text x="420" y="237" text-anchor="middle" style="font-size:12px;fill:#5c2d91">C11 replaced "sequence points" with "sequenced-before" partial order but the dangerous cases are identical</text></svg>`},
{title:"How compilers exploit UB",narration:"The compiler does not merely ignore undefined behavior. It actively uses UB as a proof mechanism to derive facts about your program and then eliminates code that those facts make unreachable. Three canonical examples. First, signed overflow UB lets the compiler assume x plus one hundred is always greater than x, deleting your overflow check. Second, a dereference before a null check proves the pointer non-null at the check site, deleting the null check. Third, strict aliasing UB allows the compiler to assume a float pointer and int pointer never alias, enabling load hoisting that returns a stale value. In every case the compiler is correct by the standard.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">The compiler assumes UB never occurs -- then uses that to justify removing your safety checks</text><rect x="20" y="24" width="800" height="62" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="36" text-anchor="middle" style="font-size:12px;fill:#c62828">Exploitation 1: signed overflow =&gt; overflow check deleted</text><rect x="26" y="46" width="380" height="83" rx="4" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="33" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Your code:</text><text x="33" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int f(int x) {</text><text x="33" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  if (x + 100 &lt; x) handle_overflow(); // (1)</text><text x="33" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  return x + 100;</text><text x="33" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// (1): overflow is UB, so x+100&gt;x always =&gt; check gone</text><rect x="430" y="46" width="380" height="83" rx="4" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="437" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// What -O2 generates:</text><text x="437" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">f:</text><text x="437" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  lea  eax, [rdi+100]</text><text x="437" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  ret</text><text x="437" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">  // overflow check: DELETED</text><rect x="20" y="92" width="800" height="60" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="104" text-anchor="middle" style="font-size:12px;fill:#b26a00">Exploitation 2: dereference proves pointer non-null =&gt; null check deleted</text><rect x="26" y="114" width="380" height="83" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="33" y="125" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int deref(int *p) {</text><text x="33" y="140" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  int v = *p;        // proves p != NULL</text><text x="33" y="155" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  if (p == NULL) ... // always false =&gt; DELETED</text><text x="33" y="170" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  return v;</text><text x="33" y="185" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// compiler correct per standard</text><rect x="430" y="114" width="380" height="83" rx="4" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="437" y="125" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// What -O2 generates:</text><text x="437" y="140" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">deref:</text><text x="437" y="155" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  mov  eax, DWORD PTR [rdi]</text><text x="437" y="170" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  ret</text><text x="437" y="185" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">  // null check: GONE</text><rect x="20" y="158" width="800" height="58" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="170" text-anchor="middle" style="font-size:12px;fill:#1040a0">Exploitation 3: strict aliasing =&gt; redundant reload eliminated</text><rect x="26" y="180" width="380" height="83" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="33" y="191" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">void inc(float *f, int *i) {</text><text x="33" y="206" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  (*i)++;            // modify through int*</text><text x="33" y="221" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  return *f;         // reload float*</text><text x="33" y="236" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// f and i cannot alias =&gt; *f unchanged</text><text x="33" y="251" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// =&gt; return cached value, skip reload =&gt; WRONG</text><rect x="430" y="180" width="380" height="83" rx="4" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="437" y="191" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// What -O2 generates:</text><text x="437" y="206" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">inc:</text><text x="437" y="221" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  add  DWORD PTR [rsi], 1</text><text x="437" y="236" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">  // *f NOT reloaded (cached in register)</text><text x="437" y="251" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  ret  // may return stale value</text><rect x="20" y="222" width="800" height="26" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="234" text-anchor="middle" style="font-size:12px;fill:#1a7a40">UB is a formal proof: from "this is not UB" the compiler derives facts and eliminates unreachable code</text></svg>`},
{title:"UB is a time bomb",narration:"\"Works on my machine\" is not a valid correctness test for undefined behavior. The same source code with signed overflow UB produces three different observable behaviors depending on optimization level. At level zero the compiler computes the comparison honestly. At level one it notices the overflow is undefined and optimizes. At level two the check is entirely deleted. Three time bomb triggers cause latent UB to suddenly manifest: a new compiler version, a higher optimization level, or a different platform or CPU microarchitecture. Security CVEs have resulted from code that worked correctly for years and then silently broke when the compiler was updated.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">"Works on my machine" is not a valid test -- UB may be invisible today and catastrophic tomorrow</text><rect x="20" y="26" width="800" height="56" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="38" text-anchor="middle" style="font-size:12px;fill:#1040a0">Same source, same inputs, different compiler flags:</text><rect x="26" y="48" width="780" height="38" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="33" y="59" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int always_bigger(int x) { return x + 1 &gt; x; }</text><text x="33" y="74" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// signed overflow is UB, so x+1 &gt; x is always true (per standard)</text><rect x="20" y="90" width="800" height="92" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><rect x="30" y="94" width="252" height="26" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="156" y="107" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:700;fill:#555">-O0</text><text x="156" y="132" text-anchor="middle" style="font-size:11px;fill:#555">actually computes x+1,</text><text x="156" y="146" text-anchor="middle" style="font-size:11px;fill:#555">compares to x,</text><text x="156" y="160" text-anchor="middle" style="font-size:11px;fill:#555">returns 0 or 1</text><rect x="30" y="172" width="252" height="22" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="156" y="183" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:600;fill:#555">depends on x</text><rect x="300" y="94" width="252" height="26" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="426" y="107" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:700;fill:#b26a00">-O1</text><text x="426" y="132" text-anchor="middle" style="font-size:11px;fill:#b26a00">notices x+1 &gt; x is</text><text x="426" y="146" text-anchor="middle" style="font-size:11px;fill:#b26a00">always true via UB,</text><text x="426" y="160" text-anchor="middle" style="font-size:11px;fill:#b26a00">returns 1 always</text><rect x="300" y="172" width="252" height="22" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="1.2"/><text x="426" y="183" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:600;fill:#b26a00">UB silently exploited</text><rect x="570" y="94" width="252" height="26" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="696" y="107" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:700;fill:#c62828">-O2</text><text x="696" y="132" text-anchor="middle" style="font-size:11px;fill:#c62828">mov eax, 1  /  ret</text><text x="696" y="146" text-anchor="middle" style="font-size:11px;fill:#c62828">(2 instructions total)</text><text x="696" y="160" text-anchor="middle" style="font-size:11px;fill:#c62828">check fully absent</text><rect x="570" y="172" width="252" height="22" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="1.2"/><text x="696" y="183" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:600;fill:#c62828">check deleted</text><rect x="20" y="202" width="800" height="40" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="216" text-anchor="middle" style="font-size:12px;fill:#c62828">Three time bomb triggers: new compiler, higher optimization, different platform or CPU microarchitecture</text><text x="420" y="233" text-anchor="middle" style="font-size:12px;fill:#c62828">Security CVEs have resulted from UB that "worked" for years then silently broke on a routine compiler update</text></svg>`},
{title:"Reading assembly to diagnose UB",narration:"The most reliable way to confirm that the compiler is exploiting a specific undefined behavior is to inspect the generated assembly. The Compiler Explorer at godbolt.org lets you paste code and immediately see assembly output for any compiler and flag combination. The signed overflow example is instructive: at optimization level zero gcc generates roughly ten instructions including the actual comparison and conditional branch. At optimization level two the entire function compiles to two instructions: move the constant one into the return register and return. The overflow check has been entirely eliminated. This is the correct output per the standard, not a compiler bug.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Reading compiler output confirms whether UB is being exploited -- use godbolt.org or gcc -S</text><text x="200" y="30" text-anchor="middle" style="font-size:12px;fill:#444">Source code</text><text x="560" y="30" text-anchor="middle" style="font-size:12px;fill:#444">gcc -O0  (computes it)</text><text x="736" y="30" text-anchor="middle" style="font-size:12px;fill:#444">gcc -O2  (UB exploited)</text><rect x="20" y="38" width="352" height="143" rx="4" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="27" y="49" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int check_ovf(int x) {</text><text x="27" y="64" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">  // signed overflow is UB</text><text x="27" y="79" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">  // so x+1 &gt; x is always</text><text x="27" y="94" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">  // true per standard</text><text x="27" y="109" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="27" y="124" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  if (x + 1 &gt; x)</text><text x="27" y="139" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    return 1;</text><text x="27" y="154" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  return 0;</text><text x="27" y="169" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">}</text><rect x="380" y="38" width="330" height="158" rx="4" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="387" y="49" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">check_ovf:</text><text x="387" y="64" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  push   rbp</text><text x="387" y="79" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  mov    rbp, rsp</text><text x="387" y="94" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  mov    [rbp-4], edi</text><text x="387" y="109" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  mov    eax, [rbp-4]</text><text x="387" y="124" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  lea    edx, [rax+1]   ; x+1</text><text x="387" y="139" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  cmp    edx, eax       ; compare</text><text x="387" y="154" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  jle    .L2            ; branch</text><text x="387" y="169" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  mov    eax, 1</text><text x="387" y="184" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  ...  (10 instructions)</text><rect x="720" y="38" width="100" height="143" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="727" y="49" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">check_ovf:</text><text x="727" y="64" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  mov eax, 1</text><text x="727" y="79" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  ret</text><text x="727" y="94" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="727" y="109" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="727" y="124" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  ; UB exploited:</text><text x="727" y="139" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  ; x+1 &gt; x always</text><text x="727" y="154" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  ; per standard</text><text x="727" y="169" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  ; 2 instructions</text><rect x="20" y="184" width="800" height="30" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="196" text-anchor="middle" style="font-size:12px;fill:#b26a00">-O0 computes the comparison honestly.  -O2 eliminates it entirely and returns a constant.</text><text x="420" y="208" text-anchor="middle" style="font-size:12px;fill:#b26a00">This is correct behavior per the C standard -- the program had UB. Not a compiler bug.</text><rect x="20" y="220" width="800" height="28" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="230" text-anchor="middle" style="font-size:12px;fill:#1040a0">godbolt.org -- paste code, see assembly for any compiler/flag combination, side-by-side</text><text x="420" y="243" text-anchor="middle" style="font-size:12px;fill:#1040a0">objdump -d -M intel a.out  |  gcc -S -O2 -fverbose-asm file.c</text></svg>`},
{title:"Sanitizers -- catching UB at runtime",narration:"Four compiler-based sanitizers instrument your binary to catch different classes of bug at runtime. AddressSanitizer detects memory safety errors including heap and stack buffer overflows, use-after-free, and double-free at roughly twice normal speed. UndefinedBehaviorSanitizer detects many UB forms directly including signed overflow, null dereference, misaligned access, and invalid shifts at less than two times overhead. ThreadSanitizer detects data races and lock-order inversions at five to fifteen times normal speed. MemorySanitizer, available only in clang, detects reads from uninitialized memory. Best practice: compile all tests with address and undefined sanitizers enabled together.",svg:`<svg width="100%" viewBox="0 0 840 254"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Four sanitizers -- each catches a different class of bug at runtime during testing</text><rect x="20" y="24" width="192" height="226" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="116" y="36" text-anchor="middle" style="font-size:11px;fill:#c62828">ASan -- AddressSanitizer</text><rect x="24" y="46" width="184" height="18" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="116" y="55" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:600;fill:#555">-fsanitize=address</text><rect x="24" y="67" width="184" height="16" rx="5" fill="#fff" stroke="#e08888" stroke-width="1.2"/><text x="116" y="75" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:500;fill:#c62828">~2x slowdown, ~2x RAM</text><text x="30" y="92" text-anchor="start" style="font-size:10px;fill:#444">heap/stack buffer overflow</text><text x="30" y="114" text-anchor="start" style="font-size:10px;fill:#444">use-after-free  +  double-free</text><text x="30" y="136" text-anchor="start" style="font-size:10px;fill:#444">use-after-return</text><text x="30" y="158" text-anchor="start" style="font-size:10px;fill:#444">heap-use-after-scope</text><text x="30" y="180" text-anchor="start" style="font-size:10px;fill:#444">global buffer overflow</text><rect x="220" y="24" width="192" height="226" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="316" y="36" text-anchor="middle" style="font-size:11px;fill:#b26a00">UBSan -- UndefinedBehavior</text><rect x="224" y="46" width="184" height="18" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="316" y="55" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:600;fill:#555">-fsanitize=undefined</text><rect x="224" y="67" width="184" height="16" rx="5" fill="#fff" stroke="#f5b942" stroke-width="1.2"/><text x="316" y="75" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:500;fill:#b26a00"><2x slowdown</text><text x="230" y="92" text-anchor="start" style="font-size:10px;fill:#444">signed integer overflow</text><text x="230" y="114" text-anchor="start" style="font-size:10px;fill:#444">null pointer dereference</text><text x="230" y="136" text-anchor="start" style="font-size:10px;fill:#444">misaligned pointer access</text><text x="230" y="158" text-anchor="start" style="font-size:10px;fill:#444">divide by zero</text><text x="230" y="180" text-anchor="start" style="font-size:10px;fill:#444">invalid shift amount</text><rect x="440" y="24" width="192" height="226" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="536" y="36" text-anchor="middle" style="font-size:11px;fill:#1040a0">TSan -- ThreadSanitizer</text><rect x="444" y="46" width="184" height="18" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="536" y="55" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:600;fill:#555">-fsanitize=thread</text><rect x="444" y="67" width="184" height="16" rx="5" fill="#fff" stroke="#88aaf0" stroke-width="1.2"/><text x="536" y="75" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:500;fill:#1040a0">5-15x slowdown, 8x RAM</text><text x="450" y="92" text-anchor="start" style="font-size:10px;fill:#444">data races (concurrent r/w)</text><text x="450" y="114" text-anchor="start" style="font-size:10px;fill:#444">lock-order inversions</text><text x="450" y="136" text-anchor="start" style="font-size:10px;fill:#444">unlock from wrong thread</text><text x="450" y="158" text-anchor="start" style="font-size:10px;fill:#444">use of destroyed mutex</text><rect x="640" y="24" width="192" height="226" rx="5" fill="#f0e8ff" stroke="#c39be8" stroke-width="0.8"/><text x="736" y="36" text-anchor="middle" style="font-size:11px;fill:#5c2d91">MSan -- MemorySanitizer</text><rect x="644" y="46" width="184" height="18" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="736" y="55" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:600;fill:#555">-fsanitize=memory (clang)</text><rect x="644" y="67" width="184" height="16" rx="5" fill="#fff" stroke="#c39be8" stroke-width="1.2"/><text x="736" y="75" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:500;fill:#5c2d91">~3x slowdown</text><text x="650" y="92" text-anchor="start" style="font-size:10px;fill:#444">reads from uninit memory</text><text x="650" y="114" text-anchor="start" style="font-size:10px;fill:#444">uninit values in branches</text><text x="650" y="136" text-anchor="start" style="font-size:10px;fill:#444">uninit in syscall args</text><text x="650" y="158" text-anchor="start" style="font-size:10px;fill:#444">(some false pos with asm)</text><rect x="20" y="240" width="800" height="12" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="246" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Best practice: -fsanitize=address,undefined -g -O1 in every CI test run -- catches the vast majority of bugs</text></svg>`},
{title:"Defense in depth -- five layers against UB",narration:"No single tool eliminates all undefined behavior and each tool has blind spots. The most effective approach combines five complementary layers. Compiler warnings are free and catch a significant fraction of bugs at zero runtime cost. Sanitizers in continuous integration catch memory safety and UB at test time. Static analysis tools like clang-tidy, cppcheck, and Coverity perform interprocedural analysis without running the code, finding logic errors and resource leaks. Fuzzing with AFL-plus-plus or libFuzzer generates inputs that exercise code paths humans never test. Finally coding standards like MISRA-C and CERT-C prohibit entire classes of dangerous constructs at code review time.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">No single tool catches everything -- layer defenses to eliminate UB systematically</text><rect x="20" y="28" width="800" height="40" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="420" y="39" text-anchor="middle" style="font-size:12px;fill:#555">Layer 1: Compiler Warnings  (zero cost, always on)</text><text x="420" y="53" text-anchor="middle" style="font-size:10px;fill:#555">-Wall -Wextra -Wpedantic -Wconversion -Wstrict-aliasing=2 -Wshadow</text><text x="420" y="65" text-anchor="middle" style="font-size:10px;fill:#666">Catches: missing returns, signed/unsigned compare, shadowed vars, deprecated features</text><rect x="20" y="72" width="800" height="40" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="83" text-anchor="middle" style="font-size:12px;fill:#1040a0">Layer 2: Sanitizers in CI  (2-15x overhead, // ── Text-to-Speech (Web Speech API) ──────────────────────────────────────────
let ttsOn = false, ttsUtter = null, ttsVoice = null;

function ttsPickVoice() {
  const vs = speechSynthesis.getVoices();
  if (!vs.length) return null;
  // Prefer a natural en-US/en-GB voice; fall back to any English, then first
  return vs.find(v => /en[-_](US|GB)/i.test(v.lang) && /natural|neural|premium/i.test(v.name))
      || vs.find(v => /en[-_](US|GB)/i.test(v.lang))
      || vs.find(v => v.lang.startsWith('en'))
      || vs[0];
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => { ttsVoice = ttsPickVoice(); };
  ttsVoice = ttsPickVoice();
}

function ttsSpeak(text, onEnd) {
  if (!ttsOn || !('speechSynthesis' in window)) { if (onEnd) onEnd(); return; }
  speechSynthesis.cancel();
  // Clean text for speech: strip code-ish punctuation that reads badly
  const clean = text
    .replace(/->/g, ' arrow ')
    .replace(/&/g, ' ampersand ')
    .replace(/\*p\b/g, 'star p')
    .replace(/`/g, '')
    .replace(/\s+/g, ' ').trim();
  ttsUtter = new SpeechSynthesisUtterance(clean);
  if (ttsVoice) ttsUtter.voice = ttsVoice;
  ttsUtter.rate = 0.95;
  ttsUtter.pitch = 1.0;
  if (onEnd) ttsUtter.onend = onEnd;
  speechSynthesis.speak(ttsUtter);
}

function ttsStop() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
}

function ttsToggle() {
  ttsOn = !ttsOn;
  const b = document.getElementById('ttsbtn');
  if (ttsOn) {
    b.textContent = '🔊 Voice On';
    b.style.background = '#e6f4ee';
    b.style.borderColor = '#4caf79';
    // Speak the current slide immediately so the user gets feedback
    ttsSpeak(SLIDES[vi].title + '. ' + SLIDES[vi].narration, null);
  } else {
    b.textContent = '🔇 Voice Off';
    b.style.background = '';
    b.style.borderColor = '';
    ttsStop();
  }
}
window.addEventListener('beforeunload', ttsStop);

let vi=0,playing=false,ticker=null,ctick=null;
function gt(n){
  vi=Math.max(0,Math.min(n,SLIDES.length-1));
  const s=SLIDES[vi];
  document.getElementById('st').textContent=s.title;
  document.getElementById('sc').textContent=(vi+1)+' / '+SLIDES.length;
  const d=document.getElementById('diag');
  d.style.opacity='0';d.innerHTML=s.svg;setTimeout(()=>d.style.opacity='1',30);
  document.getElementById('pf').style.width=(vi/(SLIDES.length-1)*100)+'%';
  clearInterval(ctick);
  let pos=0,full=s.narration;
  document.getElementById('narr').textContent='';
  ctick=setInterval(()=>{if(pos<full.length)document.getElementById('narr').textContent=full.slice(0,++pos);else clearInterval(ctick);},18);
  ttsStop();
  if(ttsOn){
    ttsSpeak(s.title+'. '+full,()=>{if(playing){clearTimeout(ticker);ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},1200);}});
    if(playing)clearTimeout(ticker);
  } else if(playing){clearTimeout(ticker);ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},Math.max(9000,full.length*56));}
}
function play(){playing=true;document.getElementById('pb2').textContent='&#9208; Pause';
  if(ttsOn){ttsSpeak(SLIDES[vi].title+'. '+SLIDES[vi].narration,()=>{if(playing)ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},1200);});}
  else{ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},Math.max(9000,SLIDES[vi].narration.length*56));}}
function pause(){playing=false;clearTimeout(ticker);ttsStop();document.getElementById('pb2').textContent='&#9654; Play';}
function tg(){playing?pause():play();}
function gn(){clearTimeout(ticker);gt(vi+1);if(playing)play();}
function gp(){clearTimeout(ticker);gt(vi-1);if(playing)play();}
function pgc(e){const r=document.getElementById('pbar').getBoundingClientRect();clearTimeout(ticker);gt(Math.round((e.clientX-r.left)/r.width*(SLIDES.length-1)));if(playing)play();}
document.addEventListener('keydown',e=>{if(['INPUT','TEXTAREA'].includes(e.target.tagName))return;if(e.key===' '){e.preventDefault();tg();}else if(e.key==='ArrowRight')gn();else if(e.key==='ArrowLeft')gp();else if(e.key==='v'||e.key==='V')ttsToggle();});
gt(0);
</script>

<div id="voice-panel">
  <div id="vp-bar">
    <span id="vp-status">Ready</span>
    <button id="vp-close" onclick="_vpClose()" aria-label="Close">&#x2715;</button>
  </div>
  <div id="vp-transcript" class="aai-empty"></div>
  <div id="vp-answer"></div>
  <div id="vp-footer">Powered by AssemblyAI &middot; universal-3-5-pro</div>
</div>
<script>
/* ── AssemblyAI Voice Input + Q&A ────────────────────────────────────────── */
const _AAI='https://the-r4snv8rq4-bsymbolic.vercel.app';
const _TERMS=['pointer','malloc','undefined behaviour','mutex','deadlock','epoll',
  'mmap','fork','syscall','struct','volatile','restrict','pthread','semaphore',
  'spinlock','realloc','calloc','free list','stack frame','heap internals'];
/* AudioWorklet: capture Float32 mic audio → Int16 PCM at 16 kHz */
const _WL=`class P extends AudioWorkletProcessor{process(i){const c=i[0]?.[0];if(c){const b=new Int16Array(c.length);for(let j=0;j<c.length;j++){const s=Math.max(-1,Math.min(1,c[j]));b[j]=s<0?s*0x8000:s*0x7FFF;}this.port.postMessage(b.buffer,[b.buffer]);}return true;}}registerProcessor('aai-pcm',P);`;

let _ws=null,_ctx=null,_mic=null,_node=null,_buf=[],_on=false;

const _$=id=>document.getElementById(id);
const _status=(t,live)=>{const e=_$('vp-status');if(e){e.textContent=t;e.className=live?'aai-live':'';}};
const _tx=t=>{const e=_$('vp-transcript');if(!e)return;e.textContent=t;e.className=t?'':'aai-empty';};
const _ans=h=>{const e=_$('vp-answer');if(!e)return;e.innerHTML=h;e.className=h?'aai-show':'';};
const _open=()=>_$('voice-panel')?.classList.add('aai-open');
function _vpClose(){_$('voice-panel')?.classList.remove('aai-open');if(_on)_stop();}

async function _start(){
  if(_on)return;
  if(_AAI==='https://the-r4snv8rq4-bsymbolic.vercel.app'){
    _open();_status('Backend not configured — see setup guide');return;
  }
  _open();_status('Connecting\u2026');_tx('');_ans('');
  try{
    /* 1. Mint short-lived token (API key stays on server) */
    const tr=await fetch(_AAI+'/api/token');
    if(!tr.ok)throw new Error('Token failed ('+tr.status+')');
    const{token}=await tr.json();
    /* 2. Open WebSocket using token — no API key in browser */
    const p=new URLSearchParams({sample_rate:'16000',speech_model:'universal-3-5-pro',mode:'balanced',token});
    _TERMS.forEach(t=>p.append('keyterms_prompt',t));
    _ws=new WebSocket('wss://streaming.assemblyai.com/v3/ws?'+p);
    await new Promise((ok,fail)=>{
      _ws.onopen=ok;
      _ws.onerror=()=>fail(new Error('WebSocket failed'));
      setTimeout(()=>fail(new Error('Connection timed out')),10000);
    });
    _ws.onmessage=e=>{
      const m=JSON.parse(e.data);
      if(m.type!=='Turn')return;
      _tx(m.transcript);
      /* Auto-trigger Q&A when turn finalizes and ends with ? */
      if(m.end_of_turn&&m.transcript.trim().endsWith('?'))_ask(m.transcript.trim());
    };
    _ws.onclose=()=>{_on=false;_btn();_status('Disconnected');};
    /* 3. Capture mic → PCM16 via AudioWorklet → stream to AssemblyAI */
    _mic=await navigator.mediaDevices.getUserMedia({audio:{channelCount:1,echoCancellation:true,noiseSuppression:true}});
    _ctx=new AudioContext({sampleRate:16000});
    const bu=URL.createObjectURL(new Blob([_WL],{type:'application/javascript'}));
    await _ctx.audioWorklet.addModule(bu);URL.revokeObjectURL(bu);
    _node=new AudioWorkletNode(_ctx,'aai-pcm');
    _node.port.onmessage=ev=>{
      _buf.push(...new Int16Array(ev.data));
      /* Send ~200 ms chunks (3200 samples @ 16 kHz) — within AssemblyAI 50–1000 ms window */
      if(_buf.length>=3200&&_ws?.readyState===1)
        _ws.send(new Int16Array(_buf.splice(0,3200)).buffer);
    };
    _ctx.createMediaStreamSource(_mic).connect(_node);
    _on=true;_btn();_status('Listening',true);
  }catch(err){_status('Error: '+err.message);_clean();}
}

function _stop(){
  /* Always send Terminate — abandoned sessions stay billable until 3-hour cap */
  if(_ws?.readyState===1){_ws.send(JSON.stringify({type:'Terminate'}));_ws.close();}
  _clean();_status('Stopped');
}
function _clean(){_mic?.getTracks().forEach(t=>t.stop());_ctx?.close();_ws=_ctx=_mic=_node=null;_buf=[];_on=false;_btn();}
function _btn(){const b=_$('micbtn');if(!b)return;b.textContent=_on?'\u23F9 Stop':'\uD83C\uDF99 Ask';b.className=_on?'aai-live':'';}
function _micToggle(){_on?_stop():_start();}
window.addEventListener('beforeunload',()=>{if(_ws?.readyState===1)_ws.send(JSON.stringify({type:'Terminate'}));});

async function _ask(q){
  _status('Answering\u2026');_ans('<em style="color:#8b949e">Thinking\u2026</em>');
  try{
    const r=await fetch(_AAI+'/api/qa',{
      method:'POST',
      headers:{'content-type':'application/json'},
      body:JSON.stringify({question:q,volume:document.title}),
    });
    if(!r.ok)throw new Error('Q&A failed ('+r.status+')');
    const{answer}=await r.json();
    /* Minimal markdown: fenced code blocks + inline code */
    const h=answer
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```[\w]*\n?([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
    _ans('<p>'+h+'</p>');
    _status(_on?'Listening':'Ready',_on);
  }catch(err){
    _ans('<em style="color:#f85149">'+err.message+'</em>');
    _status(_on?'Listening':'Ready',_on);
  }
}

</script>
</body>
</html>
