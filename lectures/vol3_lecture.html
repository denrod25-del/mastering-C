{title:"Integer types and the stdint.h contract",narration:"The C standard guarantees minimum sizes, not exact sizes. A char is at least 1 byte, a short at least 2, an int at least 2, a long at least 4, and a long long at least 8. In practice, on all modern 32 and 64-bit platforms, int is 4 bytes \u2014 but you should never rely on this. The stdint dot h header provides exact-width types: int8_t, int16_t, int32_t, int64_t, and their unsigned counterparts. Always use these in code that must be portable across platforms, compilers, or architectures.",svg:`<svg width="100%" viewBox="0 0 840 267"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Integer types have guaranteed minimums only — use &lt;stdint.h&gt; for exact portable sizes</text><text x="147" y="58" text-anchor="end" style="font-size:13px;fill:#333">char</text><rect x="152" y="42" width="56" height="32" rx="4" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1.2"/><text x="180" y="58" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:600;fill:#0d6a6a">1 byte</text><text x="218" y="52" text-anchor="start" style="font-size:11px;fill:#555">-128..127 / uint: 0..255</text><text x="218" y="66" text-anchor="start" style="font-size:10px;fill:#888">→ int8_t  /  uint8_t</text><text x="147" y="106" text-anchor="end" style="font-size:13px;fill:#333">short</text><rect x="152" y="90" width="112" height="32" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="1.2"/><text x="208" y="106" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:600;fill:#1040a0">2 bytes</text><text x="274" y="100" text-anchor="start" style="font-size:11px;fill:#555">-32768..32767</text><text x="274" y="114" text-anchor="start" style="font-size:10px;fill:#888">→ int16_t  /  uint16_t</text><text x="147" y="154" text-anchor="end" style="font-size:13px;fill:#333">int</text><rect x="152" y="138" width="224" height="32" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="1.2"/><text x="264" y="154" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:600;fill:#b26a00">4 bytes</text><text x="386" y="148" text-anchor="start" style="font-size:11px;fill:#555">-2³¹ .. 2³¹-1</text><text x="386" y="162" text-anchor="start" style="font-size:10px;fill:#888">→ int32_t  /  uint32_t</text><text x="147" y="202" text-anchor="end" style="font-size:13px;fill:#333">long long</text><rect x="152" y="186" width="448" height="32" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.2"/><text x="376" y="202" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:600;fill:#1a7a40">8 bytes</text><text x="610" y="196" text-anchor="start" style="font-size:11px;fill:#555">-2⁶³ .. 2⁶³-1</text><text x="610" y="210" text-anchor="start" style="font-size:10px;fill:#888">→ int64_t  /  uint64_t</text><rect x="152" y="225" width="322" height="8" rx="2" fill="#fdfaea" stroke="#e8e070" stroke-width="0.8" stroke-dasharray="5 3"/><text x="313" y="229" text-anchor="middle" style="font-size:10px;fill:#a09030">long: 4 bytes on Win64  ·  8 bytes on Linux-64  ·  never rely on it</text><rect x="20" y="237" width="800" height="20" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="247" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Use &lt;stdint.h&gt; everywhere: int8_t int16_t int32_t int64_t uint8_t uint16_t uint32_t uint64_t</text></svg>`},
{title:"Two's complement \u2014 how negative numbers are stored",narration:"Nearly all modern CPUs store signed integers using two's complement encoding. The most significant bit is the sign bit and has weight negative-two-to-the-N-minus-one rather than positive. This means for int8: the value -1 is represented as all-ones (0xFF), -128 is 10000000 (0x80), and +127 is 01111111 (0x7F). To negate a two's-complement value: flip all bits then add 1. The key insight: -1 in any signed integer type is always all-one bits, and +1 plus -1 is always zero because the carry out of the sign bit is discarded.",svg:`<svg width="100%" viewBox="0 0 840 248"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Two's complement: the sign bit has weight -2⁷ — everything else works like normal binary</text><text x="282" y="32" text-anchor="start" style="font-size:10px;fill:#aaa">bit 7</text><text x="560" y="32" text-anchor="end" style="font-size:10px;fill:#aaa">bit 0</text><text x="280" y="56" text-anchor="end" style="font-size:13px;fill:#333">  +1</text><rect x="288" y="42" width="30" height="28" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="303" y="56" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:700;fill:#1a7a40">0</text><rect x="322" y="42" width="30" height="28" rx="3" fill="#f8f8f4" stroke="#e0e0e0" stroke-width="0.8"/><text x="337" y="56" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:700;fill:#ccc">0</text><rect x="356" y="42" width="30" height="28" rx="3" fill="#f8f8f4" stroke="#e0e0e0" stroke-width="0.8"/><text x="371" y="56" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-wei ="620" y="200" text-anchor="start" style="font-size:10px;fill:#888">all bits 1 → always means -1</text><rect x="20" y="232" width="800" height="14" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="239" text-anchor="middle" style="font-size:12px;fill:#b26a00">Two's complement trick: to negate a value — flip all bits then add 1. Example: +5 = 00000101 → flip → 11111010 → +1 → 11111011 = -5</text></svg>`},
{title:"Integer promotion and usual arithmetic conversions",narration:"Before any arithmetic operation, C promotes operands smaller than int up to int. This is called integer promotion. Then, when two operands of different types are combined, the one with lower rank is converted to match the higher: the usual arithmetic conversions. The dangerous case is mixing signed and unsigned: if unsigned has rank equal to or higher than signed, the signed value is converted to unsigned. This is why negative-one is greater-than zero when compared to an unsigned zero \u2014 the negative-one silently becomes a huge positive number.",svg:`<svg width="100%" viewBox="0 0 840 246"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Every arithmetic expression promotes smaller types to int before the operation</text><text x="420" y="30" text-anchor="middle" style="font-size:12px;fill:#888">Integer promotion hierarchy (left promotes to right):</text><rect x="80" y="48" width="155" height="46" rx="6" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1.5"/><text x="157" y="35" text-anchor="middle" style="font-size:12px;font-weight:700;fill:#333">char</text><text x="157" y="71" text-anchor="middle" dominant-baseline="central" style="font-size:18px;font-weight:700;fill:#0d6a6a;font-family:inherit">1 byte</text><line x1="237" y1="71" x2="254" y2="71" stroke="#1040a0" stroke-width="2.4" marker-end="url(#ah)" fill="none" class="da"/><text x="245" y="103" text-anchor="middle" style="font-size:11px;fill:#1040a0">↑ promoted to</text><rect x="250" y="48" width="155" height="46" rx="6" fill="#deeeff" stroke="#88aaf0" stroke-width="1.5"/><text x="327" y="35" text-anchor="middle" style="font-size:12px;font-weight:700;fill:#333">short</text><text x="327" y="71" text-anchor="middle" dominant-baseline="central" style="font-size:18px;font-weight:700;fill:#1040a0;font-family:inherit">2 bytes</text><line x1="407" y1="71" x2="424" y2="71" stroke="#1040a0" stroke-width="2.4" marker-end="url(#ah)" fill="none" class="da"/><text x="415" y="103" text-anchor="middle" style="font-size:11px;fill:#1040a0">↑ promoted to</text><rect x="420" y="48" width="155" height="46" rx="6" fill="#fff3e0" stroke="#f5b942" stroke-width="1.5"/><text x="497" y="35" text-anchor="middle" style="font-size:12px;font-weight:700;fill:#333">int</text><text x="497" y="71" text-anchor="middle" dominant-baseline="central" style="font-size:18px;font-weight:700;fill:#b26a00;font-family:inherit">4 bytes</text><line x1="577" y1="71" x2="594" y2="71" stroke="#1040a0" stroke-width="2.4" marker-end="url(#ah)" fill="none" class="da"/><text x="585" y="103" text-anchor="middle" style="font-size:11px;fill:#1040a0">↑ promoted to</text><rect x="590" y="48" width="155" height="46" rx="6" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.5"/><text x="667" y="35" text-anchor="middle" style="font-size:12px;font-weight:700;fill:#333">long</text><text x="667" y="71" text-anchor="middle" dominant-baseline="central" style="font-size:18px;font-weight:700;fill:#1a7a40;font-family:inherit">8 bytes</text><rect x="20" y="112" width="800" height="20" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="122" text-anchor="middle" style="font-size:13px;fill:#c62828">DANGER: mixed signed/unsigned arithmetic promotes signed to unsigned!</text><rect x="20" y="140" width="800" height="22" rx="4" fill="#f2f2ee" stroke="#d0d0c8" stroke-width="0.8"/><text x="420" y="151" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;fill:#222">int i = -1;  unsigned u = 1;  if (i &lt; u)  — FALSE!  because -1 becomes 4294967295 (unsigned)</text><rect x="20" y="170" width="800" height="56" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="186" text-anchor="middle" style="font-size:12px;fill:#b26a00">Usual arithmetic conversions (ranked — lower rank promotes to higher):</text><rect x="20" y="198" width="800" height="22" rx="4" fill="#f2f2ee" stroke="#d0d0c8" stroke-width="0.8"/><text x="420" y="209" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;fill:#222">long double &gt; double &gt; float &gt; unsigned long long &gt; long long &gt; unsigned long &gt; long &gt; unsigned int &gt; int</text><rect x="20" y="228" width="800" height="14" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="235" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Rule: if either operand is unsigned and the other is signed with equal or smaller rank, signed converts to unsigned</text></svg>`},
{title:"Signed and unsigned arithmetic traps",narration:"Three traps account for most signed-unsigned bugs. First, comparison: any signed value compared to an unsigned value promotes the signed one to unsigned first, so negative-one is greater-than zero. Second, loop counters: a for-loop counting down with an unsigned counter will underflow from zero to UINT_MAX and loop forever. Third, signed overflow: overflowing a signed integer is undefined behavior, not wraparound, giving the compiler permission to delete your overflow check entirely at -O2. Use unsigned for counts and sizes, enable -Wsign-compare, and compile with -fsanitize=undefined.",svg:`<svg width="100%" viewBox="0 0 840 248"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Signed ↔ unsigned mixing: three traps that cause security vulnerabilities</text><rect x="20" y="26" width="800" height="60" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="40" text-anchor="middle" style="font-size:13px;fill:#c62828">Trap 1 — comparison: -1 &lt; 0u  is  FALSE</text><rect x="20" y="52" width="800" height="28" rx="4" fill="#f2f2ee" stroke="#d0d0c8" stroke-width="0.8"/><text x="420" y="66" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;fill:#222">int i = -1;  unsigned u = 0;  // i &lt; u  evaluates to  4294967295u &lt; 0u  →  false!</text><rect x="20" y="94" width="800" height="60" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="108" text-anchor="middle" style="font-size:13px;fill:#b26a00">Trap 2 — infinite loop: unsigned counter underflows to UINT_MAX</text><rect x="20" y="120" width="800" height="28" rx="4" fill="#f2f2ee" stroke="#d0d0c8" stroke-width="0.8"/><text x="420" y="134" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;fill:#222">for (unsigned i = n-1; i &gt;= 0; i--)  —  when i hits 0, i-- wraps to 4294967295  →  loops forever!</text><rect x="20" y="162" width="800" height="60" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="176" text-anchor="middle" style="font-size:13px;fill:#c62828">Trap 3 — signed overflow is UNDEFINED BEHAVIOR (not just wraparound)</text><rect x="20" y="188" width="800" height="28" rx="4" fill="#f2f2ee" stroke="#d0d0c8" stroke-width="0.8"/><text x="420" y="202" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;fill:#222">int x = INT_MAX;  x + 1  —  UB: compiler may assume this never happens → deletes your overflow check!</text><rect x="20" y="230" width="800" height="14" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="237" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Fixes: use explicit casts, compare same-signedness types, use unsigned for counts, compile with -Wsign-compare</text></svg>`},
{title:"Endianness \u2014 byte order in memory",narration:"A multi-byte integer is stored as individual bytes in memory, but the order of those bytes differs between architectures. Big-endian stores the most significant byte at the lowest address \u2014 the bytes read like a number written left to right. Little-endian stores the least significant byte first \u2014 the bytes are stored in the opposite order. x86 and x64 processors are little-endian. Network protocols traditionally use big-endian, called network byte order. Never cast a byte buffer directly to a multi-byte integer without considering endianness. Use htonl and ntohl for portable network code.",svg:`<svg width="100%" viewBox="0 0 840 240"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Endianness: byte ordering of multi-byte integers in memory</text><rect x="200" y="26" width="440" height="30" rx="5" fill="#f0e8ff" stroke="#c39be8" stroke-width="0.8"/><text x="420" y="41" text-anchor="middle" style="font-size:14px;fill:#5c2d91">uint32_t value = 0x12345678</text><text x="120" y="84" text-anchor="end" style="font-size:13px;fill:#333">Big-endian</text><text x="120" y="100" text-anchor="end" style="font-size:10px;fill:#aaa">(SPARC, PowerPC,</text><text x="120" y="112" text-anchor="end" style="font-size:10px;fill:#aaa">network order)</text><rect x="160" y="70" width="120" height="48" rx="6" fill="#deeeff" stroke="#88aaf0" stroke-width="1.5"/><text x="220" y="94" text-anchor="middle" dominant-baseline="central" style="font-size:16px;font-weight:700;fill:#1040a0;font-family:monospace">0x12</text><text x="220" y="128" text-anchor="middle" style="font-size:10px;fill:#aaa">0x64</text><rect x="290" y="70" width="120" height="48" rx="6" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1.5"/><text x="350" y="94" text-anchor="middle" dominant-baseline="central" style="font-size:16px;font-weight:700;fill:#0d6a6a;font-family:monospace">0x34</text><text x="350" y="128" text-anchor="middle" style="font-size:10px;fill:#aaa">0x65</text><rect x="420" y="70" width="120" height="48" rx="6" fill="#fff3e0" stroke="#f5b942" stroke-width="1.5"/><text x="480" y="94" text-anchor="middle" dominant-baseline="central" style="font-size:16px;font-weight:700;fill:#b26a00;font-family:monospace">0x56</text><text x="480" y="128" text-anchor="middle" style="font-size:10px;fill:#aaa">0x66</text><rect x="550" y="70" width="120" height="48" rx="6" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.5"/><text x="610" y="94" text-anchor="middle" dominant-baseline="central" style="font-size:16px;font-weight:700;fill:#1a7a40;font-family:monospace">0x78</text><text x="610" y="128" text-anchor="middle" style="font-size:10px;fill:#aaa">0x67</text><text x="160" y="142" text-anchor="start" style="font-size:10px;fill:#666">MSB first →</text><text x="120" y="182" text-anchor="end" style="font-size:13px;fill:#333">Little-endian</text><text x="120" y="198" text-anchor="end" style="font-size:10px;fill:#aaa">(x86, x86-64,</text><text x="120" y="210" text-anchor="end" style="font-size:10px;fill:#aaa">ARM default)</text><rect x="160" y="158" width="120" height="48" rx="6" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.5"/><text x="220" y="182" text-anchor="middle" dominant-baseline="central" style="font-size:16px;font-weight:700;fill:#1a7a40;font-family:monospace">0x78</text><text x="220" y="216" text-anchor="middle" style="font-size:10px;fill:#aaa">0x64</text><rect x="290" y="158" width="120" height="48" rx="6" fill="#fff3e0" stroke="#f5b942" stroke-width="1.5"/><text x="350" y="182" text-anchor="middle" dominant-baseline="central" style="font-size:16px;font-weight:700;fill:#b26a00;font-family:monospace">0x56</text><text x="350" y="216" text-anchor="middle" style="font-size:10px;fill:#aaa">0x65</text><rect x="420" y="158" width="120" height="48" rx="6" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1.5"/><text x="480" y="182" text-anchor="middle" dominant-baseline="central" style="font-size:16px;font-weight:700;fill:#0d6a6a;font-family:monospace">0x34</text><text x="480" y="216" text-anchor="middle" style="font-size:10px;fill:#aaa">0x66</text><rect x="550" y="158" width="120" height="48" rx="6" fill="#deeeff" stroke="#88aaf0" stroke-width="1.5"/><text x="610" y="182" text-anchor="middle" dominant-baseline="central" style="font-size:16px;font-weight:700;fill:#1040a0;font-family:monospace">0x12</text><text x="610" y="216" text-anchor="middle" style="font-size:10px;fill:#aaa">0x67</text><text x="160" y="230" text-anchor="start" style="font-size:10px;fill:#666">LSB first →</text><text x="726" y="182" text-anchor="middle" style="font-size:10px;fill:#aaa">same

{title:"IEEE 754 floating-point representation",narration:"A 32-bit float uses one sign bit, eight exponent bits with a bias of 127, and twenty-three mantissa bits with an implicit leading one. The formula is: value equals negative-one to the sign times two to the stored-exponent-minus-127 times one-point-mantissa. For the value 1.0: sign is zero, stored exponent is 127 (0x7F), mantissa is all zeros, giving exactly 2 to the zero times 1.0. Special cases: all-ones exponent with zero mantissa means plus or minus infinity; all-ones exponent with nonzero mantissa means NaN. Because 0.1 is not exactly representable in binary floating point, 0.1 plus 0.2 does not equal 0.3.",svg:`<svg width="100%" viewBox="0 0 840 250"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">IEEE 754 single-precision float: 1 sign bit + 8 exponent bits + 23 mantissa bits</text><rect x="130" y="30" width="28" height="14" rx="2" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="144" y="37" text-anchor="middle" style="font-size:10px;fill:#c62828">S</text><rect x="162" y="30" width="176" height="14" rx="2" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="250" y="37" text-anchor="middle" style="font-size:10px;fill:#1040a0">exponent (8 bits)</text><rect x="342" y="30" width="396" height="14" rx="2" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="540" y="37" text-anchor="middle" style="font-size:10px;fill:#b26a00">mantissa / significand (23 bits)</text><text x="120" y="66" text-anchor="end" style="font-size:12px;fill:#333">1.0</text><rect x="130" y="52" width="28" height="28" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="1"/><text x="144" y="66" text-anchor="middle" dominant-ba {title:"Bit manipulation \u2014 the six operations and their idioms",narration:"C provides six bitwise operators. AND (&) clears bits: masking with 0 forces bits to zero. OR (|) sets bits: masking with 1 forces bits to one. XOR (^) toggles bits: masking with 1 flips those bits. NOT (~) inverts all bits in the value. Left shift (<<) multiplies by a power of two; right shift (>>) divides, but for signed values the behavior of the vacated bits is implementation-defined. The common idioms are: test a bit with (x & mask) != 0, set a bit with x | mask, clear a bit with x & ~mask, and toggle with x ^ mask.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Bit manipulation — x = 0b10110100 = 0xB4 = 180</text><text x="264" y="30" text-anchor="end" style="font-size:12px;fill:#333">x = </text><rect x="270" y="30" width="23" height="22" rx="2" fill="#deeeff" stroke="#88aaf0" stroke-width="0.6"/><text x="281" y="41" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#1040a0">1</text><rect x="296" y="30" width="23" height="22" rx="2" fill="#f8f8f4" stroke="#e0e0e0" stroke-width="0.6"/><text x="307" y="41" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#ccc">0</text><rect x="322" y="30" width="23" height="22" rx="2" fill="#deeeff" stroke="#88aaf0" stroke-width="0.6"/><text x="333" y="41" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#1040a0">1</text><rect x="348" y="30" width="23" height="22" rx="2" fill="#deeeff" stroke="#88aaf0" stroke-width="0.6"/><text x="359" y="41" text-anchor="middle" dominant-baseline="central" styl {title:"Struct padding and alignment",narration:"Every type has an alignment requirement: the set of addresses where it may legally start. A uint32_t must start at a multiple of 4; a uint16_t at a multiple of 2. When you put members in a struct, the compiler inserts invisible padding bytes between members to keep each one aligned. The struct's total size is then padded to a multiple of its strictest member's alignment. Reordering members from largest alignment to smallest eliminates internal padding entirely. Use offsetof to find where a member actually lives and sizeof to see the full padded size.",svg:`<svg width="100%" viewBox="0 0 840 244"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Struct padding: the compiler inserts bytes to satisfy alignment requirements</text><text x="420" y="28" text-anchor="middle" style="font-size:12px;fill:#444">struct { uint8_t a;  uint32_t b;  uint8_t c;  uint16_t d; }  —  how much does sizeof return?</text><rect x="60" y="42" width="38" height="46" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1.2"/><text x="79" y="65" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:700;fill:#0d6a6a">a</text><text x="60" y="98" text-anchor="start" style="font-size:10px;fill:#aaa">+0</text><rect x="98" y="42" width="114" height="46" rx="3" fill="#f0f0eb" stroke="#ddd" stroke-width="1.2"/><text x="155" y="65" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#bbb">pad</text><text x="98" y="98" text-anchor="start" style="font-size:10px;fill:#aaa">+1</text><rect x="212" y="42" width="152" height="46" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="1.2"/><text x="288" y="65" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:700;fill:#1040a0">b</text><text x="212" y="98" text-anchor="start" style="font-size:10px;fill:#aaa">+4</text><rect x="364" y="42" width="38" height="46" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1.2"/><text x="383" y="65" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:700;fill:#0d6a6a">c</text><text x="364" y="98" text-anchor="start" style="font-size:10px;fill:#aaa">+8</text><rect x="402" y="42" width="38" height="46" rx="3" fill="#f0f0eb" stroke="#ddd" stroke-width="1.2"/><text x="421" y="65" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#bbb">pad</text><text x="402" y="98" text-anchor="start" style="font-size:10px;fill:#aaa">+9</text><rect x="440" y="42" width="76" height="46" rx="3" fill="#fff3e0" stroke="#f5b942" stroke-width="1.2"/><text x="478" y="65" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:700;fill:#b26a00">d</text><text x="440" y="98" text-anchor="start" style="font-size:10px;fill:#aaa">+10</text><text x="516" y="98" text-anchor="start" style="font-size:10px;fill:#888">+12</text><text x="546" y="65" text-anchor="start" dominant-baseline="central" style="font-size:14px;font-weight:700;fill:#c62828">= 12 bytes!</text><text x="420" y="116" text-anchor="middle" style="font-size:12px;fill:#777">Alignment rules: uint8 needs ≥1-byte alignment | uint16 needs ≥2-byte | uint32 needs ≥4-byte | struct total = multiple of strictest</text><text x="420" y="132" text-anchor="middle" style="font-size:12px;fill:#444">Reordered: struct { uint32_t b; uint16_t d; uint8_t a; uint8_t c; }</text><rect x="60" y="144" width="152" height="38" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="1.2"/><text x="136" y="163" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:700;fill:#1040a0">b</text><rect x="212" y="144" width="76" height="38" rx="3" fill="#fff3e0" stroke="#f5b942" stroke-width="1.2"/><text x="250" y="163" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:700;fill:#b26a00">d</text><rect x="288" y="144" width="38" height="38" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1.2"/><text x="307" y="163" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:700;fill:#0d6a6a">a</text><rect x="326" y="144" width="38" height="38" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1.2"/><text x="345" y="163" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:700;fill:#0d6a6a">c</text><text x="372" y="163" text-anchor="start" dominant-baseline="central" style="font-size:14px;font-weight:700;fill:#1a7a40">= 8 bytes (no padding!)</text><rect x="20" y="192" width="800" height="18" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="201" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Rule: sort struct members largest to smallest alignment to eliminate internal padding</text><rect x="20" y="216" width="800" height="22" rx="4" fill="#f2f2ee" stroke="#d0d0c8" stroke-width="0.8"/><text x="420" y="227" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;fill:#222">sizeof(struct) vs offsetof(struct,member)  ·  __attribute__((packed)) removes padding (but breaks alignment on ARM)</text></svg>`},
{title:"Unions \u2014 overlapping members at one address",narration:"A union is like a struct where all members start at offset zero and share the same memory. The union's size is the size of its largest member. Accessing different members reads the same bytes interpreted through different types. In C11 this is the legal way to do type-punning: store a float in the float member and read the raw bits through the uint32_t member. The other common use is a discriminated union: a struct containing a tag and a union, where the tag tells you which member of the union is currently valid. Never access a union member that was not the most recently written one in C++, though C11 explicitly allows it.",svg:`<svg width="100%" viewBox="0 0 840 246"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Unions: all members start at the same address — size = the largest member</text><rect x="20" y="26" width="800" height="22" rx="4" fill="#f2f2ee" stroke="#d0d0c8" stroke-width="0.8"/><text x="420" y="37" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;fill:#222">union Bytes { uint32_t i;  float f;  uint8_t b[4]; };  // sizeof = 4, all members at offset 0</text><rect x="200" y="60" width="245" height="60" rx="0" fill="none" stroke="#ccc" stroke-width="0.5"/><rect x="200" y="60" width="116" height="60" rx="0" fill="#deeeff" stroke="#88aaf0" stroke-width="1.2"/><text x="258" y="80" text-anchor="middle" style="font-size:11px;fill:#1040a0">b[0]</text><text x="258" y="100" text-anchor="middle" style="font-size:10px;fill:#1040a0">byte 0</text><rect x="320" y="60" width="116" height="60" rx="0" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1.2"/><text x="378" y="80" text-anchor="middle" style="font-size:11px;fill:#0d6a6a">b[1]</text><text x="378" y="100" text-anchor="middle" style="font-size:10px;fill:#0d6a6a">byte 1</text><rect x="440" y="60" width="116" height="60" rx="0" fill="#fff3e0" stroke="#f5b942" stroke-width="1.2"/><text x="498" y="80" text-anchor="middle" style="font-size:11px;fill:#b26a00">b[2]</text><text x="498" y="100" text-anchor="middle" style="font-size:10px;fill:#b26a00">byte 2</text><rect x="560" y="60" width="116" height="60" rx="0" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.2"/><text x="618" y="80" text-anchor="middle" style="font-size:11px;fill:#1a7a40">b[3]</text><text x="618" y="100" text-anchor="middle" style="font-size:10px;fill:#1a7a40">byte 3</text><text x="440" y="52" text-anchor="middle" style="font-size:11px;fill:#1040a0">i (uint32_t) — spans all 4 bytes</text><text x="440" y="138" text-anchor="middle" style="font-size:11px;fill:#b26a00">f (float) — spans all 4 bytes</text><line x1="200" y1="148" x2="676" y2="148" stroke="#aaa" stroke-width="1" marker-start="url(#ah)" marker-end="url(#ah)"/><text x="440" y="160" text-anchor="middle" style="font-size:10px;fill:#888">same 4 bytes — same address</text><rect x="20" y="116" width="800" height="64" rx="5" fill="#f0e8ff" stroke="#c39be8" stroke-width="0.8"/><text x="420" y="132" text-anchor="middle" style="font-size:12px;fill:#5c2d91">Legal C11 type punning via union (undefined behavior in C++):</text><rect x="20" y="144" width="800" height="22" rx="4" fill="#f2f2ee" stroke="#d0d0c8" stroke-width="0.8"/><text x="420" y="155" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;fill:#222">union { float f; uint32_t bits; } u = {.f = 1.0f};  printf("0x%08X\\n", u.bits);  // prints 0x3F800000</text><rect x="20" y="188" width="800" height="52" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="202" text-anchor="middle" style="font-size:12px;fill:#b26a00">Union as discriminated variant (tagged union):</text><rect x="20" y="212" width="800" height="22" rx="4" fill="#f2f2ee" stroke="#d0d0c8" stroke-width="0.8"/><text x="420" y="223" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;fill:#222">struct { int tag; union { int i; float f; char *s; } val; }  // choose interpretation via tag</text></svg>`},
{title:"const, volatile, and restrict qualifiers",narration:"Three qualifiers change how the compiler treats memory accesses. const tells the compiler the value must not be modified through this expression \u2014 the key distinction is between pointer-to-const and const-pointer. volatile tells the compiler not to cache or reorder accesses to this memory, because hardware or another thread may change it at any time \u2014 essential for memory-mapped I/O registers. restrict is a promise to the compiler that this pointer is the only way this memory is accessed in this scope, meaning no aliasing \u2014 enabling the vectorization that makes array loops run four or eight times faster with SIMD instructions.",svg:`<svg width="100%" viewBox="0 0 840 248"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Three qualifiers: const enforces read-only, volatile prevents caching, restrict enables vectorization</text><rect x="20" y="26" width="800" height="72" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="40" text-anchor="middle" style="font-size:13px;fill:#1040a0">const — the compiler enforces that this value is not modified</text><rect x="20" y="52" width="390" height="22" rx="4" fill="#f2f2ee" stroke="#d0d0c8" stroke-width="0.8"/><text x="215" y="63" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;fill:#222">const int *p = &x;    // p points to const int</text><rect x="424" y="52" width="396" height="22" rx="4" fill="#f2f2ee" stroke="#d0d0c8" stroke-width="0.8"/><text x="622" y="63" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;fill:#222">int *const p = &x;   // p itself is const (fixed address)</text><text x="215" y="82" text-anchor="middle" style="font-size:10px;fill:#1040a0">data is read-only; pointer can change</text><text x="622" y="82" text-anchor="middle" style="font-size:10px;fill:#1040a0">pointer is fixed; data can change</text><rect x="20" y="102" width="800" height="66" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="116" text-anchor="middle" style="font-size:13px;fill:#c62828">volatile — tells compiler: this memory can change without your knowledge</text><rect x="20" y="128" width="800" height="22" rx="4" fill="#f2f2ee" stroke="#d0d0c8" stroke-width="0.8"/><text x="420" y="139" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;fill:#222">volatile uint32_t *UART_STATUS = (uint32_t*)0x40010000;  while (!(*UART_STATUS & 0x01));</text><text x="420" y="160" text-anchor="middle" style="font-size:10px;fill:#c62828">Without volatile: compiler caches *UART_STATUS in a register and loops forever (dead load elimination)</text><rect x="20" y="172" width="800" height="66" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="186" text-anchor="middle" style="font-size:13px;fill:#1a7a40">restrict — tells compiler: this is the only pointer to this object (no aliasing)</text><rect x="20" y="198" width="800" height="22" rx="4" fill="#f2f2ee" stroke="#d0d0c8" stroke-width="0.8"/><text x="420" y="209" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;fill:#222">void add(float *restrict a, float *restrict b, float *restrict c, int n) { for(int i=0;i&lt;n;i++) a[i]=b[i]+c[i]; }</text><text x="420" y="230" text-anchor="middle" style="font-size:10px;fill:#1a7a40">Without restrict: compiler must re-read b[i] and c[i] every iteration (a might alias them). With restrict: SIMD vectorization enabled.</text></svg>`},
];


// ── Text-to-Speech (Web Speech API) ──────────────────────────────────────────
let ttsOn = false, ttsUtter = null, ttsVoice = null;

function ttsPickVoice() {
  const vs = speechSynthesis.getVoices();
  if (!vs.length) return null;
  // Prefer a natural en-US/en-GB voice; fall back to any English, then first
  return vs.find(v => /en[-_](US|GB)/i.test(v.lang) && /natural|neural|premium/i.test(v.name))
      || vs.find(v => /en[-_](US|GB)/i.test(v.lang))
      || vs.find(v => v.lang.startsWith('en'))
      || vs[0];
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => { ttsVoice = ttsPickVoice(); };
  ttsVoice = ttsPickVoice();
}

function ttsSpeak(text, onEnd) {
  if (!ttsOn || !('speechSynthesis' in window)) { if (onEnd) onEnd(); return; }
  speechSynthesis.cancel();
  // Clean text for speech: strip code-ish punctuation that reads badly
  const clean = text
    .replace(/->/g, ' arrow ')
    .replace(/&/g, ' ampersand ')
    .replace(/\*p\b/g, 'star p')
    .replace(/`/g, '')
    .replace(/\s+/g, ' ').trim();
  ttsUtter = new SpeechSynthesisUtterance(clean);
  if (ttsVoice) ttsUtter.voice = ttsVoice;
  ttsUtter.rate = 0.95;
  ttsUtter.pitch = 1.0;
  if (onEnd) ttsUtter.onend = onEnd;
  speechSynthesis.speak(ttsUtter);
}

function ttsStop() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
}

function ttsToggle() {
  ttsOn = !ttsOn;
  const b = document.getElementById('ttsbtn');
  if (ttsOn) {
    b.textContent = '🔊 Voice On';
    b.style.background = '#e6f4ee';
    b.style.borderColor = '#4caf79';
    // Speak the current slide immediately so the user gets feedback
    ttsSpeak(SLIDES[vi].title + '. ' + SLIDES[vi].narration, null);
  } else {
    b.textContent = '🔇 Voice Off';
    b.style.background = '';
    b.style.borderColor = '';
    ttsStop();
  }
}
window.addEventListener('beforeunload', ttsStop);

let vi=0,playing=false,ticker=null,ctick=null;
function updateNav(){
  const prevBtn=document.getElementById('prevbtn'),nextBtn=document.getElementById('nextbtn');
  prevBtn.disabled=(vi===0);prevBtn.setAttribute('aria-disabled',String(vi===0));
  nextBtn.disabled=(vi===SLIDES.length-1);nextBtn.setAttribute('aria-disabled',String(vi===SLIDES.length-1));
}
function gt(n){
  vi=Math.max(0,Math.min(n,SLIDES.length-1));
  const s=SLIDES[vi];
  document.getElementById('st').textContent=s.title;
  document.getElementById('sc').textContent=(vi+1)+' / '+SLIDES.length;
  const d=document.getElementById('diag');
  d.style.opacity='0';d.innerHTML=s.svg;
  const svgEl=d.querySelector('svg');
  if(svgEl){svgEl.setAttribute('role','img');svgEl.setAttribute('aria-label',s.title+' diagram');}
  setTimeout(()=>d.style.opacity='1',30);
  document.getElementById('pf').style.width=(vi/(SLIDES.length-1)*100)+'%';
  const bar=document.getElementById('pbar');
  bar.setAttribute('aria-valuemax',String(SLIDES.length));
  bar.setAttribute('aria-valuenow',String(vi+1));
  bar.setAttribute('aria-valuetext',(vi+1)+' of '+SLIDES.length+': '+s.title);
  updateNav();
  document.getElementById('live-announce').textContent=s.title;
  clearInterval(ctick);let pos=0,full=s.narration;
  document.getElementById('narr').textContent='';
  ctick=setInterval(()=>{if(pos<full.length)document.getElementById('narr').textContent=full.slice(0,++pos);else clearInterval(ctick);},18);
  ttsStop();
  if(ttsOn){
    ttsSpeak(s.title+'. '+full,()=>{if(playing){clearTimeout(ticker);ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},1200);}});
    if(playing)clearTimeout(ticker);
  } else if(playing){clearTimeout(ticker);ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},Math.max(9000,full.length*56));}
}
function play(){playing=true;document.getElementById('pb2').textContent='⏸ Pause';
  if(ttsOn){ttsSpeak(SLIDES[vi].title+'. '+SLIDES[vi].narration,()=>{if(playing)ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},1200);});}
  else{ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},Math.max(9000,SLIDES[vi].narration.length*56));}}
function pause(){playing=false;clearTimeout(ticker);ttsStop();document.getElementById('pb2').textContent='▶ Play';}
function tg(){playing?pause():play();}
function gn(){if(vi>=SLIDES.length-1)return;clearTimeout(ticker);gt(vi+1);if(playing)play();}
function gp(){if(vi<=0)return;clearTimeout(ticker);gt(vi-1);if(playing)play();}
function pgc(e){const r=document.getElementById('pbar').getBoundingClientRect();clearTimeout(ticker);gt(Math.round((e.clientX-r.left)/r.width*(SLIDES.length-1)));if(playing)play();}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&document.getElementById('voice-panel').classList.contains('aai-open')){_vpClose();return;}
  if(['INPUT','TEXTAREA'].includes(e.target.tagName))return;
  if(e.key===' '){e.preventDefault();tg();}
  else if(e.key==='ArrowRight')gn();
  else if(e.key==='ArrowLeft')gp();
  else if(e.key==='v'||e.key==='V')ttsToggle();
});
gt(0);
</script>

<div id="voice-panel" role="region" aria-labelledby="vp-title">
  <div id="vp-bar">
    <span id="vp-title" class="sr-only">Voice input and Q&amp;A</span>
    <span id="vp-status" aria-live="polite">Ready</span>
    <button id="vp-close" onclick="_vpClose()" aria-label="Close voice panel">&#x2715;</button>
  </div>
  <form id="vp-form">
    <label for="vp-input" class="sr-only">Type a question about this lecture</label>
    <input id="vp-input" type="text" placeholder="Or type a question and press Enter…" autocomplete="off">
    <button type="submit">Ask</button>
  </form>
  <div id="vp-transcript" class="aai-empty" aria-live="polite"></div>
  <div id="vp-answer" aria-live="polite"></div>
  <div id="vp-footer">Mic audio streams live to AssemblyAI only while this panel is open, for transcription and Q&amp;A &middot; universal-3-5-pro</div>
</div>
<script>
/* ── AssemblyAI Voice Input + Q&A ────────────────────────────────────────── */
const _AAI='https://the-c.vercel.app';
const _aaiConfigured=()=>!!_AAI&&_AAI.indexOf('REPLACE_WITH')===-1;
const _TERMS=['pointer','malloc','undefined behaviour','mutex','deadlock','epoll',
  'mmap','fork','syscall','struct','volatile','restrict','pthread','semaphore',
  'spinlock','realloc','calloc','free list','stack frame','heap internals'];
/* AudioWorklet: capture Float32 mic audio → Int16 PCM at 16 kHz */
const _WL=`class P extends AudioWorkletProcessor{process(i){const c=i[0]?.[0];if(c){const b=new Int16Array(c.length);for(let j=0;j<c.length;j++){const s=Math.max(-1,Math.min(1,c[j]));b[j]=s<0?s*0x8000:s*0x7FFF;}this.port.postMessage(b.buffer,[b.buffer]);}return true;}}registerProcessor('aai-pcm',P);`;

let _ws=null,_ctx=null,_mic=null,_node=null,_buf=[],_on=false,_connecting=false,_asking=false;

const _$=id=>document.getElementById(id);
const _status=(t,live)=>{const e=_$('vp-status');if(e){e.textContent=t;e.className=live?'aai-live':'';}};
const _tx=t=>{const e=_$('vp-transcript');if(!e)return;e.textContent=t;e.className=t?'':'aai-empty';};
const _ans=h=>{const e=_$('vp-answer');if(!e)return;e.innerHTML=h;e.className=h?'aai-show':'';};
const _open=()=>_$('voice-panel')?.classList.add('aai-open');
function _vpClose(){_$('voice-panel')?.classList.remove('aai-open');if(_on)_stop();_$('micbtn')?.focus();}

function _micSupported(){
  return !!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia&&window.AudioContext&&window.AudioWorklet&&window.WebSocket);
}

async function _start(){
  if(_on||_connecting)return;
  if(!_aaiConfigured()){
    _open();_status('Backend not configured — see README setup guide');return;
  }
  if(!_micSupported()){
    _open();_status('Voice input isn’t supported in this browser — try typing a question instead');return;
  }
  if(location.protocol!=='https:'&&location.hostname!=='localhost'&&location.hostname!=='127.0.0.1'){
    _open();_status('Voice input requires HTTPS — try typing a question instead');return;
  }
  _connecting=true;
  _open();_status('Connecting…');_tx('');_ans('');
  try{
    /* 1. Mint short-lived token (API key stays on server) */
    const tokCtl=new AbortController();
    const tokTimer=setTimeout(()=>tokCtl.abort(),10000);
    const tr=await fetch(_AAI+'/api/token',{signal:tokCtl.signal});
    clearTimeout(tokTimer);
    if(!tr.ok)throw new Error('Token failed ('+tr.status+')');
    const{token}=await tr.json();
    /* 2. Open WebSocket using token — no API key in browser */
    const p=new URLSearchParams({sample_rate:'16000',speech_model:'universal-3-5-pro',mode:'balanced',token});
    _TERMS.forEach(t=>p.append('keyterms_prompt',t));
    _ws=new WebSocket('wss://streaming.assemblyai.com/v3/ws?'+p);
    await new Promise((ok,fail)=>{
      _ws.onopen=ok;
      _ws.onerror=()=>fail(new Error('WebSocket failed'));
      setTimeout(()=>fail(new Error('Connection timed out')),10000);
    });
    _ws.onmessage=e=>{
      const m=JSON.parse(e.data);
      if(m.type!=='Turn')return;
      _tx(m.transcript);
      /* Auto-trigger Q&A when turn finalizes and ends with ? */
      if(m.end_of_turn&&m.transcript.trim().endsWith('?'))_ask(m.transcript.trim());
    };
    _ws.onclose=()=>{_on=false;_btn();_status('Disconnected');};
    /* 3. Capture mic → PCM16 via AudioWorklet → stream to AssemblyAI */
    _mic=await navigator.mediaDevices.getUserMedia({audio:{channelCount:1,echoCancellation:true,noiseSuppression:true}});
    _ctx=new AudioContext({sampleRate:16000});
    const bu=URL.createObjectURL(new Blob([_WL],{type:'application/javascript'}));
    await _ctx.audioWorklet.addModule(bu);URL.revokeObjectURL(bu);
    _node=new AudioWorkletNode(_ctx,'aai-pcm');
    _node.port.onmessage=ev=>{
      _buf.push(...new Int16Array(ev.data));
      /* Send ~200 ms chunks (3200 samples @ 16 kHz) — within AssemblyAI 50–1000 ms window */
      if(_buf.length>=3200&&_ws?.readyState===1)
        _ws.send(new Int16Array(_buf.splice(0,3200)).buffer);
    };
    _ctx.createMediaStreamSource(_mic).connect(_node);
    _on=true;_connecting=false;_btn();_status('Listening',true);
  }catch(err){
    _connecting=false;
    const msg=err.name==='AbortError'?'Token request timed out':err.name==='NotAllowedError'?'Microphone permission denied':err.message;
    _status('Error: '+msg);_clean();
  }
}

function _stop(){
  /* Always send Terminate — abandoned sessions stay billable until 3-hour cap */
  if(_ws?.readyState===1){_ws.send(JSON.stringify({type:'Terminate'}));_ws.close();}
  _clean();_status('Stopped');
}
function _clean(){_mic?.getTracks().forEach(t=>t.stop());_ctx?.close();_ws=_ctx=_mic=_node=null;_buf=[];_on=false;_connecting=false;_btn();}
function _btn(){const b=_$('micbtn');if(!b)return;b.textContent=_on?'⏹ Stop':'🎙 Ask';b.className=_on?'aai-live':'';}
function _micToggle(){if(_connecting)return;_on?_stop():_start();}
window.addEventListener('beforeunload',()=>{if(_ws?.readyState===1)_ws.send(JSON.stringify({type:'Terminate'}));});

async function _ask(q){
  if(_asking)return;
  if(!_aaiConfigured()){
    _open();_status('Backend not configured — see README setup guide');return;
  }
  _asking=true;
  _open();_status('Answering…');_ans('<em style="color:#8b949e">Thinking…</em>');
  const ctl=new AbortController();
  const timer=setTimeout(()=>ctl.abort(),20000);
  try{
    const r=await fetch(_AAI+'/api/qa',{
      method:'POST',
      headers:{'content-type':'application/json'},
      body:JSON.stringify({question:q,volume:document.title}),
      signal:ctl.signal,
    });
    if(!r.ok)throw new Error('Q&A failed ('+r.status+')');
    const{answer}=await r.json();
    /* Minimal markdown: fenced code blocks + inline code. Escaped first, so this cannot inject HTML. */
    const h=answer
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```[\w]*\n?([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
    _ans('<p>'+h+'</p><p style="color:#8b949e;font-size:.75em">AI-generated — verify compiler/platform-specific details.</p>');
    _status(_on?'Listening':'Ready',_on);
  }catch(err){
    const msg=err.name==='AbortError'?'Request timed out — try again':err.message;
    _ans('<em style="color:#f85149">'+msg+'</em>');
    _status(_on?'Listening':'Ready',_on);
  }finally{
    clearTimeout(timer);_asking=false;
  }
}
document.getElementById('vp-form')?.addEventListener('submit',e=>{
  e.preventDefault();
  const input=document.getElementById('vp-input');
  const v=input.value.trim();
  if(!v)return;
  input.value='';
  _ask(v);
});

</script>
</body>
</html>
