<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>C Mastery — Volume VII: Systems Programming</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.player{background:#fff;border:1px solid #ddd;border-radius:14px;overflow:hidden;width:100%;max-width:880px;box-shadow:0 2px 16px rgba(0,0,0,.09)}
.hdr{padding:14px 22px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;gap:12px}
.hl{display:flex;align-items:center;gap:10px}
.chip{font-size:11px;font-weight:700;letter-spacing:.08em;background:#e6f4ee;border:1px solid #4caf79;border-radius:6px;padding:2px 8px;color:#1a7a40}
.hdr h2{font-size:15px;font-weight:600;color:#222}
.cnt{font-size:12px;color:#aaa;white-space:nowrap}
#diag{background:#f8f8f4;padding:20px;min-height:268px;display:flex;align-items:center;justify-content:center;transition:opacity .2s}
.nw{padding:14px 22px;border-top:1px solid #eee}
.nl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#bbb;margin-bottom:6px}
#narr{font-size:14px;line-height:1.8;min-height:96px;color:#333}
.pw{padding:0 22px 5px}
.pb{height:3px;background:#ececec;border-radius:2px;cursor:pointer}
.pf{height:100%;background:#444;border-radius:2px;transition:width .2s}
.ctrls{padding:11px 22px 16px;display:flex;align-items:center;justify-content:center;gap:12px}
button{border:1px solid #e0e0e0;background:#fff;border-radius:9px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:500;color:#333;transition:background .12s;white-space:nowrap}
button:hover{background:#f5f5f0}
#pb2{padding:8px 24px;font-size:14px}
.kbd{font-size:11px;color:#bbb;text-align:center;padding-bottom:10px}
svg text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
@keyframes drawArr{from{stroke-dashoffset:320}to{stroke-dashoffset:0}}
.da{stroke-dasharray:320;animation:drawArr .65s ease forwards}

/* ── AssemblyAI Voice Input + Q&A ─────────────────────────────────────────── */
#micbtn{
  padding:.45rem .9rem;border-radius:6px;cursor:pointer;font-size:.82rem;
  font-weight:500;border:1px solid #30363d;background:#161b22;color:#8b949e;
  transition:.15s;margin-left:.25rem;
}
#micbtn:hover{border-color:#58a6ff;color:#58a6ff;}
#micbtn.aai-live{background:#2d0f0f;border-color:#f85149;color:#f85149;animation:aai-pulse 1.2s infinite;}
@keyframes aai-pulse{0%,100%{opacity:1}50%{opacity:.5}}
#voice-panel{
  display:none;position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
  width:min(660px,94vw);background:#161b22;border:1px solid #30363d;
  border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.75);z-index:9999;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;
}
#voice-panel.aai-open{display:block;}
#vp-bar{
  background:#21262d;padding:.5rem 1rem;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid #30363d;
}
#vp-status{font-size:.75rem;color:#8b949e;display:flex;align-items:center;gap:.4rem;}
#vp-status.aai-live::before{content:'\25CF';color:#f85149;font-size:.65rem;}
#vp-close{background:none;border:none;color:#8b949e;cursor:pointer;font-size:1.1rem;padding:.1rem .4rem;line-height:1;}
#vp-close:hover{color:#e6edf3;}
#vp-transcript{
  padding:.75rem 1rem;font-size:.88rem;color:#e6edf3;min-height:2.6rem;
  line-height:1.55;border-bottom:1px solid #21262d;font-style:italic;
}
#vp-transcript.aai-empty::before{content:'Say anything — end with ? to get an AI answer';color:#484f58;font-style:italic;}
#vp-answer{
  display:none;padding:.75rem 1rem;font-size:.84rem;color:#c9d1d9;
  line-height:1.65;max-height:260px;overflow-y:auto;
}
#vp-answer.aai-show{display:block;}
#vp-answer code{
  background:#010409;padding:.1rem .35rem;border-radius:3px;
  font-family:'SFMono-Regular',Consolas,monospace;font-size:.8em;color:#e6edf3;
}
#vp-answer pre{
  background:#010409;border:1px solid #30363d;border-radius:6px;padding:.6rem .8rem;
  font-size:.78rem;overflow-x:auto;margin:.4rem 0;white-space:pre;
  font-family:'SFMono-Regular',Consolas,monospace;color:#e6edf3;
}
#vp-answer p{margin:.35rem 0;}
#vp-footer{padding:.35rem 1rem .6rem;font-size:.7rem;color:#484f58;}
</style>
</head>

<div class="player">

  <div class="kbd">Space = play/pause &middot; &larr;&rarr; = step &middot; click progress bar to jump &nbsp;·&nbsp; V&nbsp;=&nbsp;voice</div>

<script>
const SLIDES=[
{title:"The syscall interface -- user space to kernel",narration:"Every interaction between a user-space program and the operating system happens through a system call. On x86-64 Linux the syscall instruction switches the CPU from ring three user mode to ring zero kernel mode. Before executing the instruction, libc sets up registers according to the syscall ABI: rax holds the syscall number, rdi the first argument, rsi the second, rdx the third, and so on through r10, r8, and r9 for arguments four through six. After the kernel handles the request it places the return value in rax: a non-negative value on success, or a negative errno code on failure. The strace tool shows every syscall a process makes along with its arguments and return values, which is invaluable for debugging system interactions.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">The syscall interface -- the only way user space talks to the kernel</text><rect x="26" y="28" width="310" height="32" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.2"/><text x="181" y="44" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:600;fill:#1a7a40">C code  (ring 3 user space)</text><line x1="181" y1="60" x2="181" y2="66" stroke="#aaa" stroke-width="1.5" marker-end="url(#ah)"/><rect x="26" y="66" width="310" height="32" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="1.2"/><text x="181" y="82" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:600;fill:#1040a0">libc wrapper: sets registers</text><line x1="181" y1="98" x2="181" y2="104" stroke="#aaa" stroke-width="1.5" marker-end="url(#ah)"/><rect x="26" y="104" width="310" height="32" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="1.2"/><text x="181" y="120" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:600;fill:#b26a00">syscall  instruction</text><line x1="181" y1="136" x2="181" y2="142" stroke="#aaa" stroke-width="1.5" marker-end="url(#ah)"/><rect x="26" y="142" width="310" height="32" rx="4" fill="#ffe0e0" stroke="#e08888" stroke-width="1.2"/><text x="181" y="158" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:600;fill:#c62828">kernel: sys_write  (ring 0)</text><line x1="181" y1="174" x2="181" y2="180" stroke="#aaa" stroke-width="1.5" marker-end="url(#ah)"/><rect x="26" y="180" width="310" height="32" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.2"/><text x="181" y="196" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:600;fill:#1a7a40">return: rax = bytes or -errno</text><rect x="356" y="24" width="464" height="200" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="588" y="36" text-anchor="middle" style="font-size:12px;fill:#1040a0">x86-64 Linux syscall ABI:</text><text x="364" y="50" text-anchor="start" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">rax</text><text x="406" y="50" text-anchor="start" style="font-size:10px;fill:#555">syscall number (1 = SYS_write)</text><text x="364" y="69" text-anchor="start" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">rdi</text><text x="406" y="69" text-anchor="start" style="font-size:10px;fill:#555">1st arg  (e.g. fd = 1)</text><text x="364" y="88" text-anchor="start" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">rsi</text><text x="406" y="88" text-anchor="start" style="font-size:10px;fill:#555">2nd arg  (e.g. buf pointer)</text><text x="364" y="107" text-anchor="start" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">rdx</text><text x="406" y="107" text-anchor="start" style="font-size:10px;fill:#555">3rd arg  (e.g. byte count)</text><text x="364" y="126" text-anchor="start" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">r10</text><text x="406" y="126" text-anchor="start" style="font-size:10px;fill:#555">4th arg</text><text x="364" y="145" text-anchor="start" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">r8</text><text x="406" y="145" text-anchor="start" style="font-size:10px;fill:#555">5th arg</text><text x="364" y="164" text-anchor="start" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">r9</text><text x="406" y="164" text-anchor="start" style="font-size:10px;fill:#555">6th arg</text><text x="364" y="183" text-anchor="start" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">rax</text><text x="406" y="183" text-anchor="start" style="font-size:10px;fill:#555">return: bytes written or -errno</text><rect x="356" y="230" width="464" height="86" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="363" y="240" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Minimal write syscall in asm:</text><text x="363" y="253" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">mov  rax, 1     ; SYS_write</text><text x="363" y="266" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">mov  rdi, 1     ; stdout</text><text x="363" y="279" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">mov  rsi, buf   ; buffer</text><text x="363" y="292" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">mov  rdx, len   ; length</text><text x="363" y="305" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">syscall         ; trap to kernel</text><rect x="26" y="222" width="294" height="28" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="173" y="236" text-anchor="middle" style="font-size:12px;fill:#b26a00">strace ./prog  shows every syscall, args, and return values</text></svg>`},
{title:"File descriptors -- fd table, file structs, inodes",narration:"A file descriptor is a small non-negative integer that indexes into a per-process table of open file references maintained by the kernel. When a process starts, file descriptors zero, one, and two are already open and connected to standard input, standard output, and standard error. The open system call returns the lowest available file descriptor. Each file descriptor points to a kernel file description structure which records the current offset, access mode, and flags. Multiple file descriptors can point to the same file description, which is how dup2 works for I/O redirection. The file description in turn points to the underlying inode or socket object. close decrements the reference count and frees the file description only when it reaches zero.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">File descriptors -- small integers that index into the kernel file table</text><rect x="20" y="24" width="150" height="196" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="95" y="36" text-anchor="middle" style="font-size:11px;fill:#1040a0">fd table</text><rect x="28" y="48" width="130" height="26" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="42" y="61" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">0</text><text x="64" y="61" text-anchor="start" dominant-baseline="central" style="font-size:10px;fill:#555">stdin</text><line x1="160" y1="61" x2="230" y2="61" stroke="#1040a0" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="28" y="82" width="130" height="26" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="42" y="95" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">1</text><text x="64" y="95" text-anchor="start" dominant-baseline="central" style="font-size:10px;fill:#555">stdout</text><line x1="160" y1="95" x2="230" y2="95" stroke="#1040a0" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="28" y="116" width="130" height="26" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="42" y="129" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">2</text><text x="64" y="129" text-anchor="start" dominant-baseline="central" style="font-size:10px;fill:#555">stderr</text><line x1="160" y1="129" x2="230" y2="129" stroke="#1040a0" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="28" y="150" width="130" height="26" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="42" y="163" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">3</text><text x="64" y="163" text-anchor="start" dominant-baseline="central" style="font-size:10px;fill:#555">data.txt</text><line x1="160" y1="163" x2="230" y2="163" stroke="#1040a0" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="28" y="184" width="130" height="26" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="42" y="197" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">4</text><text x="64" y="197" text-anchor="start" dominant-baseline="central" style="font-size:10px;fill:#555">socket</text><line x1="160" y1="197" x2="230" y2="197" stroke="#1040a0" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="234" y="24" width="200" height="196" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="334" y="36" text-anchor="middle" style="font-size:11px;fill:#0d6a6a">file structs (kernel)</text><rect x="240" y="48" width="186" height="26" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="248" y="57" text-anchor="start" style="font-size:9px;fill:#0d6a6a">type: chr, flags: r</text><text x="248" y="68" text-anchor="start" style="font-size:9px;fill:#0d6a6a">offset: 0</text><line x1="428" y1="61" x2="456" y2="61" stroke="#0d6a6a" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="240" y="82" width="186" height="26" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="248" y="91" text-anchor="start" style="font-size:9px;fill:#0d6a6a">type: chr, flags: w</text><text x="248" y="102" text-anchor="start" style="font-size:9px;fill:#0d6a6a">offset: 0</text><line x1="428" y1="95" x2="456" y2="95" stroke="#0d6a6a" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="240" y="116" width="186" height="26" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="248" y="125" text-anchor="start" style="font-size:9px;fill:#0d6a6a">type: chr, flags: w</text><text x="248" y="136" text-anchor="start" style="font-size:9px;fill:#0d6a6a">offset: 0</text><line x1="428" y1="129" x2="456" y2="129" stroke="#0d6a6a" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="240" y="150" width="186" height="26" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="248" y="159" text-anchor="start" style="font-size:9px;fill:#0d6a6a">type: reg, flags: rw</text><text x="248" y="170" text-anchor="start" style="font-size:9px;fill:#0d6a6a">offset: 4096</text><line x1="428" y1="163" x2="586" y2="163" stroke="#0d6a6a" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="240" y="184" width="186" height="26" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="248" y="193" text-anchor="start" style="font-si 474" y="204" text-anchor="start" style="font-size:9px;fill:#b26a00">192.168.1.1:80</text><rect x="20" y="226" width="800" height="22" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="237" text-anchor="middle" style="font-size:12px;fill:#1a7a40">dup2(oldfd,newfd) redirects I/O | open() returns lowest available fd | close(fd) decrements refcount</text></svg>`},
{title:"Process address space -- segments and /proc/maps",narration:"Every process has a private virtual address space that the CPU and kernel maintain through page tables. The layout from low to high addresses is: the text segment containing read-only compiled code, the data segment with initialized globals, BSS with zero-initialized globals, the heap growing upward through malloc calls, a large unmapped gap, shared library mappings and the mmap region, the stack growing downward, and the kernel at the very top. Reading slash proc slash PID slash maps shows the actual layout including permissions for each region: r for readable, w for writable, x for executable, p for private copy-on-write, and s for shared. Tools like pmap and valgrind use this interface.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Process address space -- each process sees its own 128 TB virtual map</text><rect x="26" y="26" width="280" height="26" rx="3" fill="#f0e8ff" stroke="#c39be8" stroke-width="1"/><text x="34" y="39" text-anchor="start" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#5c2d91">kernel  (0xFFFF800000000000)</text><text x="320" y="39" text-anchor="start" style="font-size:9px;fill:#555">invisible from user space</text><rect x="26" y="56" width="280" height="26" rx="3" fill="#fff3e0" stroke="#f5b942" stroke-width="1"/><text x="34" y="69" text-anchor="start" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#b26a00">stack  (grows down)</text><text x="320" y="69" text-anchor="start" style="font-size:9px;fill:#555">local vars, return addrs, saved regs</text><rect x="26" y="86" width="280" height="26" rx="3" fill="#f2f2ee" stroke="#ccc" stroke-width="1"/><text x="34" y="99" text-anchor="start" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#555">mmap region</text><text x="320" y="99" text-anchor="start" style="font-size:9px;fill:#555">shared libs (.so), file maps, thread stacks</text><rect x="26" y="116" width="280" height="26" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="1"/><text x="34" y="129" text-anchor="start" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#1a7a40">heap  (grows up)</text><text x="320" y="129" text-anchor="start" style="font-size:9px;fill:#555">malloc/calloc allocations (brk/mmap)</text><rect x="26" y="146" width="280" height="26" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1"/><text x="34" y="159" text-anchor="start" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#0d6a6a">.bss</text><text x="320" y="159" text-anchor="start" style="font-size:9px;fill:#555">uninitialized global/static data (zeroed)</text><rect x="26" y="176" width="280" height="26" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="1"/><text x="34" y="189" text-anchor="start" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#1040a0">.data</text><text x="320" y="189" text-anchor="start" style="font-size:9px;fill:#555">initialized global/static data</text><rect x="26" y="206" width="280" height="26" rx="3" fill="#ffe0e0" stroke="#e08888" stroke-width="1"/><text x="34" y="219" text-anchor="start" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#c62828">.text</text><text x="320" y="219" text-anchor="start" style="font-size:9px;fill:#555">read-only: compiled machine code</text><rect x="476" y="24" width="344" height="190" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="648" y="36" text-anchor="middle" style="font-size:11px;fill:#555">/proc/self/maps  (cat to see your own)</text><rect x="482" y="46" width="332" height="120" rx="4" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="489" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">00400000-00401000 r--p  .text</text><text x="489" y="71" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">00401000-00402000 r-xp  .text (exec)</text><text x="489" y="85" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">00402000-00403000 r--p  .rodata</text><text x="489" y="99" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">00404000-00405000 rw-p  .data</text><text x="489" y="113" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">00405000-00406000 rw-p  .bss</text><text x="489" y="127" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">7f...000-7f...fff r-xp  libc.so.6</text><text x="489" y="141" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">7ffe...0-7ffff... rw-p  [stack]</text><text x="489" y="155" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">ffffffffff600000  r-xp  [vsyscall]</text><rect x="476" y="218" width="344" height="30" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="648" y="228" text-anchor="middle" style="font-size:10px;fill:#1040a0">Permissions: r=read  w=write  x=execute</text><text x="648" y="240" text-anchor="middle" style="font-size:10px;fill:#1040a0">p=private (COW)  s=shared</text><rect x="26" y="220" width="440" height="28" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="246" y="230" text-anchor="middle" style="font-size:10px;fill:#b26a00">pmap -x PID  --  show memory map with RSS</text><text x="246" y="242" text-anchor="middle" style="font-size:10px;fill:#b26a00">cat /proc/PID/status  --  VmRSS, VmSize, etc.</text></svg>`},
{title:"fork / exec / wait -- process creation",narration:"Fork creates a new process by duplicating the calling process. The child gets a copy of the parent's virtual address space using copy-on-write: pages are shared until either process writes to them, at which point the kernel creates a private copy. Fork returns the child's process ID to the parent and zero to the child. The exec family of functions replaces the calling process's image with a new program while preserving open file descriptors, the process ID, and most signal dispositions. The canonical pattern for spawning a subprocess is fork followed by exec in the child. The parent calls waitpid to collect the child's exit status. A child that has exited but whose status has not been collected becomes a zombie and holds its process ID until the parent waits.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">fork/exec/wait -- the POSIX process creation model</text><text x="200" y="30" text-anchor="middle" style="font-size:12px;fill:#1040a0">Parent process</text><text x="620" y="30" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Child process</text><line x1="400" y1="28" x2="400" y2="248" stroke="#eee" stroke-width="2" stroke-dasharray="6 4"/><rect x="30" y="40" width="356" height="24" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="38" y="52" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;fill:#1040a0">pid_t c = fork();</text><rect x="416" y="40" width="404" height="24" rx="3" fill="" stroke="#ccc" stroke-width="0.8"/><text x="424" y="52" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;fill:">// returns child PID to parent</text><rect x="30" y="80" width="356" height="24" rx="3" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="38" y="92" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;fill:#555">// (parent continues)</text><rect x="416" y="80" width="404" height="24" rx="3" fill="fork() returns 0" stroke="#1a7a40" stroke-width="0.8"/><text x="424" y="92" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;fill:#e6f4ee">// child is a copy of parent</text><rect x="416" y="120" width="404" height="24" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="424" y="132" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;fill:#0d6a6a">execve("/bin/ls",argv,envp)</text><rect x="30" y="160" width="356" height="24" rx="3" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="38" y="172" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;fill:#b26a00">int st; waitpid(c,&st,0);</text><rect x="416" y="160" width="404" height="24" rx="3" fill="// new image runs" stroke="#0d6a6a" stroke-width="0.8"/><text x="424" y="172" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;fill:#e0f4f4">// blocks until child exits</text><rect x="416" y="200" width="404" height="24" rx="3" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="424" y="212" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;fill:#c62828">// child exits, becomes zombie</text><rect x="30" y="228" width="356" height="24" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="38" y="240" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;fill:#1a7a40">// waitpid returns, st = exit code</text><line x1="210" y1="64" x2="210" y2="80" stroke="#1040a0" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><line x1="390" y1="52" x2="416" y2="52" stroke="#aaa" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><text x="403" y="46" text-anchor="middle" style="font-size:10px;fill:#aaa">fork()</text><rect x="20" y="238" width="800" height="12" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="244" text-anchor="middle" style="font-size:12px;fill:#c62828">Zombie: child exited but parent not yet called wait() -- PID held until parent reaps it</text></svg>`},
{title:"Pipes -- anonymous and named IPC",narration:"A pipe is a unidirectional byte stream with a kernel buffer of roughly 64 kilobytes. The pipe function creates two file descriptors: fd bracket zero for reading and fd bracket one for writing. Data written to the write end can be read from the read end in first-in-first-out order. Writes up to PIPE_BUF bytes are guaranteed atomic. read blocks when the buffer is empty and write blocks when it is full. The critical rule in the fork-and-pipe pattern is to close unused ends in each process: the child must close the read end it will not use, and the parent must close the write end it will not use. Only when all write ends are closed does the reader see end of file.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Pipes -- unidirectional byte streams: the simplest IPC mechanism</text><rect x="20" y="24" width="800" height="82" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="36" text-anchor="middle" style="font-size:12px;fill:#1040a0">Anonymous pipe -- int fd[2]; pipe(fd);</text><rect x="40" y="50" width="130" height="38" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="1.2"/><text x="105" y="69" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:600;fill:#1040a0">Write end
fd[1]</text><line x1="172" y1="69" x2="234" y2="69" stroke="#1040a0" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="236" y="46" width="280" height="46" rx="6" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1.5"/><text x="376" y="62" text-anchor="middle" style="font-size:11px;fill:#0d6a6a">Kernel pipe buffer</text><text x="376" y="76" text-anchor="middle" style="font-size:9px;fill:#0d6a6a">FIFO, ~64 KB max, atomic writes &lt;= PIPE_BUF</text><line x1="518" y1="69" x2="580" y2="69" stroke="#0d6a6a" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="582" y="50" width="130" height="38" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1.2"/><text x="647" y="69" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:600;fill:#0d6a6a">Read end
fd[0]</text><text x="420" y="104" text-anchor="middle" style="font-size:10px;fill:#1040a0">write(fd[1], data, n) blocks when full  |  read(fd[0], buf, n) blocks when empty</text><rect x="20" y="112" width="800" height="90" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="124" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Canonical parent-child pipe pattern:</text><rect x="26" y="134" width="394" height="98" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="33" y="145" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int fd[2]; pipe(fd);</text><text x="33" y="160" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">if (fork() == 0) {  // child: producer</text><text x="33" y="175" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    close(fd[0]);   // close unused read end</text><text x="33" y="190" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    write(fd[1], data, len);</text><text x="33" y="205" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    close(fd[1]); _exit(0);</text><text x="33" y="220" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">}</text><rect x="434" y="134" width="380" height="98" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="441" y="145" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// parent: consumer</text><text x="441" y="160" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">close(fd[1]);   // close unused write end</text><text x="441" y="175" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">ssize_t n = read(fd[0], buf, sizeof buf);</text><text x="441" y="190" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// EOF when all writers have closed fd[1]</text><text x="441" y="205" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">close(fd[0]);</text><text x="441" y="220" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">waitpid(-1, NULL, 0);</text><rect x="20" y="208" width="800" height="22" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="219" text-anchor="middle" style="font-size:12px;fill:#b26a00">Named pipe (FIFO): mkfifo("/tmp/mypipe", 0600) -- persists in filesystem, unrelated processes</text><rect x="20" y="234" width="800" height="16" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="420" y="242" text-anchor="middle" style="font-size:12px;fill:#0d6a6a">Other IPC: UNIX domain sockets (stream) | shared memory shm_open | message queues mq_open</text></svg>`},
{title:"Signals -- self-pipe trick and signalfd",narration:"Signal handlers run asynchronously at any point in the main thread, which creates a deep problem: if a signal arrives while the thread is inside malloc holding its internal lock, and the handler calls printf which also needs malloc, the program deadlocks. The solution is to keep signal handlers minimal. The self-pipe trick solves event loop integration before Linux 2.6.22: create a non-blocking pipe, write one byte from the handler using only the async-signal-safe write call, and add the read end to your select or epoll interest set. The modern solution is signalfd: block the signal from normal delivery with sigprocmask, then call signalfd to get a file descriptor that becomes readable when the signal would have been delivered.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Signals -- asynchronous delivery and the self-pipe trick for event loops</text><rect x="20" y="24" width="800" height="54" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="36" text-anchor="middle" style="font-size:12px;fill:#c62828">The async-signal-safety problem:</text><text x="420" y="50" text-anchor="middle" style="font-size:10px;fill:#c62828">Signal arrives while main thread is inside malloc() holding its internal lock -- handler calls printf() which also needs malloc -- deadlock!</text><rect x="20" y="82" width="390" height="110" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="215" y="94" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Self-pipe trick (pre-Linux 2.6.22)</text><rect x="26" y="104" width="378" height="113" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="33" y="115" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Setup: create a pipe, set non-blocking</text><text x="33" y="130" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">pipe2(pfd, O_NONBLOCK);</text><text x="33" y="145" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Signal handler (only async-safe ops!):</text><text x="33" y="160" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">void handler(int sig) {</text><text x="33" y="175" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    write(pfd[1], &sig, 1); // safe</text><text x="33" y="190" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">}</text><text x="33" y="205" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Event loop reads pfd[0] with select/epoll</text><rect x="430" y="82" width="390" height="110" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="625" y="94" text-anchor="middle" style="font-size:12px;fill:#1040a0">signalfd (Linux 2.6.22+)</text><rect x="436" y="104" width="378" height="113" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="443" y="115" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Block signal from normal delivery:</text><text x="443" y="130" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">sigset_t mask; sigemptyset(&mask);</text><text x="443" y="145" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">sigaddset(&mask, SIGTERM);</text><text x="443" y="160" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">sigprocmask(SIG_BLOCK, &mask, NULL);</text><text x="443" y="175" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Get an fd for that signal:</text><text x="443" y="190" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int sfd = signalfd(-1, &mask, SFD_NONBLOCK);</text><text x="443" y="205" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Add sfd to epoll -- reads deliver siginfo</text><rect x="20" y="196" width="800" height="26" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="207" text-anchor="middle" style="font-size:12px;fill:#b26a00">sigaction() is better than signal(): SA_RESTART restarts slow syscalls, SA_SIGINFO gives full siginfo_t</text><text x="420" y="221" text-anchor="middle" style="font-size:12px;fill:#b26a00">sigprocmask blocks signal delivery -- use during critical sections to prevent re-entrancy</text><rect x="20" y="228" width="800" height="22" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="420" y="239" text-anchor="middle" style="font-size:12px;fill:#0d6a6a">Async-signal-safe functions (complete list is short): write, _exit, kill, signal, raise, read</text></svg>`},
{title:"Sockets -- TCP client/server pattern",narration:"Sockets are the universal IPC mechanism in POSIX, covering TCP streams, UDP datagrams, and UNIX domain sockets for local inter-process communication. The server calls socket to create a socket file descriptor, setsockopt with SO_REUSEADDR to allow immediate restart after a crash, bind to assign an address and port, listen to mark it as a passive endpoint, then accept in a loop to receive incoming connections. Each accept call returns a new connected socket file descriptor. The client calls socket and connect. Both sides then read and write on their connected descriptors. TCP provides reliable ordered delivery; UDP provides faster but unreliable unordered datagrams. UNIX domain sockets use filesystem paths instead of IP addresses and are faster for local IPC.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Sockets -- the universal IPC: TCP streams, UDP datagrams, UNIX domain</text><text x="200" y="30" text-anchor="middle" style="font-size:12px;fill:#1040a0">Server</text><text x="620" y="30" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Client</text><line x1="420" y1="28" x2="420" y2="196" stroke="#eee" stroke-width="1.5" stroke-dasharray="5 4"/><text x="30" y="42" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#1040a0">socket(AF_INET,SOCK_STREAM,0)</text><text x="428" y="42" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#1a7a40">socket(AF_INET,SOCK_STREAM,0)</text><text x="30" y="64" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#1040a0">setsockopt(fd,SOL_SOCKET,SO_REUSEADDR)</text><text x="30" y="86" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#1040a0">bind(fd, &addr, sizeof addr)</text><text x="30" y="108" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#1040a0">listen(fd, SOMAXCONN)</text><text x="30" y="130" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#1040a0">cfd = accept(fd, &caddr, &clen)</text><text x="428" y="130" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#1a7a40">connect(fd, &saddr, sizeof saddr)</text><text x="30" y="152" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#1040a0">read(cfd,buf,n) / write(cfd,resp,n)</text><text x="428" y="152" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#1a7a40">write(fd,req,n) / read(fd,buf,n)</text><text x="30" y="174" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#1040a0">close(cfd)  [loop to accept]</text><text x="428" y="174" text-anchor="start" style="font-family:monospace;font-size:10px;fill:#1a7a40">close(fd)</text><line x1="360" y1="64" x2="428" y2="106" stroke="#aaa" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><text x="394" y="58" text-anchor="middle" style="font-size:10px;fill:#aaa">TCP handshake</text><rect x="20" y="200" width="800" height="48" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="420" y="212" text-anchor="middle" style="font-size:12px;fill:#555">TCP vs UDP:</text><text x="28" y="222" text-anchor="start" style="font-size:11px;font-weight:700;fill:#1040a0">TCP</text><text x="68" y="222" text-anchor="start" style="font-size:10px;fill:#555">connection-oriented, reliable, ordered, flow-control -- SOCK_STREAM</text><text x="28" y="236" text-anchor="start" style="font-size:11px;font-weight:700;fill:#b26a00">UDP</text><text x="68" y="236" text-anchor="start" style="font-size:10px;fill:#555">connectionless, unreliable, unordered, low-latency -- SOCK_DGRAM</text></svg>`},
{title:"epoll -- O(1) I/O multiplexing",narration:"When a server handles thousands of concurrent connections, calling blocking read on each would require a thread per connection. epoll solves this with O(1) event notification. You create an epoll instance with epoll_create1, register interest in file descriptors using epoll_ctl with EPOLL_CTL_ADD, and call epoll_wait which blocks until at least one registered descriptor is ready. epoll_wait returns only the descriptors that are actually ready, not all registered ones, which is why it scales to millions of connections. Level-triggered mode reports readiness as long as data is available; edge-triggered mode reports only the transition from not-ready to ready, which is more efficient but requires draining the descriptor completely on each event.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">epoll -- O(1) event notification for thousands of file descriptors</text><rect x="20" y="24" width="246" height="60" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="133" y="36" text-anchor="middle" style="font-size:11px;fill:#c62828">Problem: blocking on multiple fds</text><text x="133" y="50" text-anchor="middle" style="font-size:9px;fill:#c62828">select/poll scan all O(n) -- no good for 10k conns</text><rect x="20" y="88" width="800" height="140" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="100" text-anchor="middle" style="font-size:12px;fill:#1040a0">epoll event loop:</text><rect x="28" y="112" width="130" height="20" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="93" y="122" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:10px;font-weight:700;fill:#0d6a6a">conn_fd 5</text><line x1="160" y1="122" x2="230" y2="140" stroke="#0d6a6a" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="28" y="138" width="130" height="20" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="93" y="148" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:10px;font-weight:700;fill:#0d6a6a">conn_fd 6</text><line x1="160" y1="148" x2="230" y2="140" stroke="#0d6a6a" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="28" y="164" width="130" height="20" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="93" y="174" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1a7a40">listen_fd</text><line x1="160" y1="174" x2="230" y2="140" stroke="#1a7a40" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="28" y="190" width="130" height="20" rx="3" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="93" y="200" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:10px;font-weight:700;fill:#b26a00">timer_fd</text><line x1="160" y1="200" x2="230" y2="140" stroke="#b26a00" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><rect x="232" y="120" width="160" height="40" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="1.2"/><text x="312" y="140" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:600;fill:#1040a0">epoll_fd
(kernel rb-tree)</text><line x1="394" y1="140" x2="464" y2="140" stroke="#1040a0" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><text x="429" y="134" text-anchor="middle" style="font-size:10px;fill:#1040a0">events[]</text><rect x="466" y="110" width="348" height="113" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="473" y="121" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int epfd = epoll_create1(0);</text><text x="473" y="136" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">struct epoll_event ev = {</text><text x="473" y="151" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  .events = EPOLLIN | EPOLLET,</text><text x="473" y="166" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  .data.fd = conn_fd };</text><text x="473" y="181" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">epoll_ctl(epfd, EPOLL_CTL_ADD, conn_fd, &ev);</text><text x="473" y="196" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int n = epoll_wait(epfd,evs,MAX,-1);</text><text x="473" y="211" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// n = number of ready events</text><rect x="20" y="234" width="800" height="16" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="242" text-anchor="middle" style="font-size:12px;fill:#b26a00">EPOLLET = edge-triggered (fires once on transition) vs default level-triggered (fires while data available)</text></svg>`},
{title:"mmap -- file mapping and anonymous memory",narration:"mmap maps a file or anonymous memory directly into the process's virtual address space. For file mapping: open the file, call mmap with MAP_SHARED and the file descriptor, and the returned pointer addresses the file contents directly. The kernel uses page faults to load pages on demand and write-back dirty pages. This is faster than read and write for large files because it avoids copying between kernel and user buffers. MAP_PRIVATE creates a copy-on-write mapping: writes go to private pages without modifying the file, which is exactly how exec loads programs. MAP_ANONYMOUS with fd negative one allocates zero-initialized memory from the kernel, which glibc uses for large malloc requests. Shared memory IPC uses MAP_SHARED on a shm_open file descriptor.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">mmap -- map files or anonymous memory directly into the virtual address space</text><rect x="20" y="24" width="800" height="60" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="36" text-anchor="middle" style="font-size:12px;fill:#1040a0">Signature:  void *mmap(addr, length, prot, flags, fd, offset)</text><text x="420" y="50" text-anchor="middle" style="font-size:10px;fill:#1040a0">Returns: virtual address of mapping, or MAP_FAILED (-1) on error</text><rect x="20" y="88" width="266" height="22" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="153" y="99" text-anchor="middle" style="font-size:11px;fill:#1a7a40">File mapping</text><rect x="20" y="110" width="266" height="106" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="27" y="121" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">void *p = mmap(NULL, size,</text><text x="27" y="135" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  PROT_READ|PROT_WRITE,</text><text x="27" y="149" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  MAP_SHARED,  // or MAP_PRIVATE</text><text x="27" y="163" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  fd, 0);</text><text x="27" y="177" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// p[0..size-1] IS the file</text><text x="27" y="191" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// page faults load pages on demand</text><text x="27" y="205" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">munmap(p, size); msync(p, size, MS_SYNC);</text><rect x="293" y="88" width="266" height="22" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="426" y="99" text-anchor="middle" style="font-size:11px;fill:#b26a00">Anon mapping (large alloc)</text><rect x="293" y="110" width="266" height="106" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="300" y="121" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">void *p = mmap(NULL, size,</text><text x="300" y="135" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  PROT_READ|PROT_WRITE,</text><text x="300" y="149" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  MAP_PRIVATE|MAP_ANONYMOUS,</text><text x="300" y="163" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  -1, 0); // no fd needed</text><text x="300" y="177" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Zero-initialized pages</text><text x="300" y="191" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Kernel allocates on first touch</text><text x="300" y="205" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Better than malloc for large buffers</text><rect x="566" y="88" width="266" height="22" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="699" y="99" text-anchor="middle" style="font-size:11px;fill:#0d6a6a">Shared memory (IPC)</text><rect x="566" y="110" width="266" height="106" rx="4" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="573" y="121" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Both processes:</text><text x="573" y="135" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">void *p = mmap(NULL, size,</text><text x="573" y="149" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  PROT_READ|PROT_WRITE,</text><text x="573" y="163" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  MAP_SHARED,</text><text x="573" y="177" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  shm_fd, 0);</text><text x="573" y="191" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Same physical pages -- fast IPC</text><text x="573" y="205" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Need sync: mutex or semaphore!</text><rect x="20" y="238" width="800" height="12" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="244" text-anchor="middle" style="font-size:12px;fill:#c62828">MAP_PRIVATE + file = copy-on-write: writes go to private pages, file unchanged -- used by exec()</text></svg>`},
{title:"Memory-mapped I/O and bare-metal C",narration:"Memory-mapped I/O is the mechanism by which software communicates with hardware peripherals on microcontrollers and embedded systems. Hardware registers are located at fixed physical addresses. In bare-metal code you cast those addresses to volatile pointers and read or write them directly. The volatile qualifier is mandatory: without it the compiler may optimize away the access because it sees no data dependency. In the Linux kernel, ioremap maps the physical address into virtual space before accessing it. An interrupt service routine is a function called by hardware when a peripheral needs attention. The ISR environment is extremely constrained: no malloc, no blocking calls, no standard library, and it must complete quickly. Shared state between an ISR and main code requires volatile for every shared variable and disabling interrupts during multi-byte updates.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Memory-mapped I/O and bare-metal C -- talking directly to hardware</text><rect x="20" y="24" width="390" height="110" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="215" y="36" text-anchor="middle" style="font-size:12px;fill:#1040a0">Memory-mapped I/O (MMIO)</text><rect x="26" y="46" width="378" height="158" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="33" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Peripheral registers at fixed phys address</text><text x="33" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Map into virtual space (Linux driver):</text><text x="33" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">void __iomem *base = ioremap(0x40010000, 0x100);</text><text x="33" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="33" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// ARM bare-metal / MCU (direct):</text><text x="33" y="132" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">#define UART0_DR  (*(volatile uint32_t*)0x40001000)</text><text x="33" y="147" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">#define UART0_SR  (*(volatile uint32_t*)0x40001004)</text><text x="33" y="162" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="33" y="177" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">while (!(UART0_SR & 0x20)); // wait TX ready</text><text x="33" y="192" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">UART0_DR = c;               // write char</text><rect x="430" y="24" width="390" height="110" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="625" y="36" text-anchor="middle" style="font-size:12px;fill:#b26a00">ISR -- Interrupt Service Routine</text><rect x="436" y="46" width="378" height="143" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="443" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Attribute tells compiler: ISR calling conv.</text><text x="443" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">__attribute__((interrupt("IRQ")))</text><text x="443" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">void UART_IRQ_Handler(void) {</text><text x="443" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">    // VERY restricted environment:</text><text x="443" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">    // - no malloc, no printf, no stdlib</text><text x="443" y="132" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">    // - no blocking calls</text><text x="443" y="147" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">    // - keep it short and fast</text><text x="443" y="162" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    rx_buf[head++] = UART0_DR;</text><text x="443" y="177" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    NVIC_ClearPendingIRQ(UART_IRQn); }</text><rect x="20" y="140" width="800" height="52" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="152" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Freestanding C -- compiling without the C runtime or OS:</text><rect x="26" y="162" width="780" height="53" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="33" y="173" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// gcc flags: -ffreestanding -nostdlib -nostartfiles -mcpu=cortex-m4</text><text x="33" y="188" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// No main() -- linker script defines entry point</text><text x="33" y="203" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// No stack setup -- must initialize SP in startup code before any C function runs</text><rect x="20" y="200" width="800" height="26" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="211" text-anchor="middle" style="font-size:12px;fill:#c62828">volatile is MANDATORY for MMIO: without it the compiler caches the register value in a CPU register</text><text x="420" y="223" text-anchor="middle" style="font-size:12px;fill:#c62828">and never re-reads it -- the peripheral state change becomes invisible to your code</text><rect x="20" y="232" width="800" height="18" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="420" y="241" text-anchor="middle" style="font-size:12px;fill:#0d6a6a">Shared vars between ISR and main: volatile + disable interrupts during multi-byte read/write</text></svg>`},
];

// ── Text-to-Speech (Web Speech API) ──────────────────────────────────────────
let ttsOn = false, ttsUtter = null, ttsVoice = null;

function ttsPickVoice() {
  const vs = speechSynthesis.getVoices();
  if (!vs.length) return null;
  // Prefer a natural en-US/en-GB voice; fall back to any English, then first
  return vs.find(v => /en[-_](US|GB)/i.test(v.lang) && /natural|neural|premium/i.test(v.name))
      || vs.find(v => /en[-_](US|GB)/i.test(v.lang))
      || vs.find(v => v.lang.startsWith('en'))
      || vs[0];
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => { ttsVoice = ttsPickVoice(); };
  ttsVoice = ttsPickVoice();
}

function ttsSpeak(text, onEnd) {
  if (!ttsOn || !('speechSynthesis' in window)) { if (onEnd) onEnd(); return; }
  speechSynthesis.cancel();
  // Clean text for speech: strip code-ish punctuation that reads badly
  const clean = text
    .replace(/->/g, ' arrow ')
    .replace(/&/g, ' ampersand ')
    .replace(/\*p\b/g, 'star p')
    .replace(/`/g, '')
    .replace(/\s+/g, ' ').trim();
  ttsUtter = new SpeechSynthesisUtterance(clean);
  if (ttsVoice) ttsUtter.voice = ttsVoice;
  ttsUtter.rate = 0.95;
  ttsUtter.pitch = 1.0;
  if (onEnd) ttsUtter.onend = onEnd;
  speechSynthesis.speak(ttsUtter);
}

function ttsStop() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
}

function ttsToggle() {
  ttsOn = !ttsOn;
  const b = document.getElementById('ttsbtn');
  if (ttsOn) {
    b.textContent = '🔊 Voice On';
    b.style.background = '#e6f4ee';
    b.style.borderColor = '#4caf79';
    // Speak the current slide immediately so the user gets feedback
    ttsSpeak(SLIDES[vi].title + '. ' + SLIDES[vi].narration, null);
  } else {
    b.textContent = '🔇 Voice Off';
    b.style.background = '';
    b.style.borderColor = '';
    ttsStop();
  }
}
window.addEventListener('beforeunload', ttsStop);

let vi=0,playing=false,ticker=null,ctick=null;
function gt(n){
  vi=Math.max(0,Math.min(n,SLIDES.length-1));
  const s=SLIDES[vi];
  document.getElementById('st').textContent=s.title;
  document.getElementById('sc').textContent=(vi+1)+' / '+SLIDES.length;
  const d=document.getElementById('diag');
  d.style.opacity='0';d.innerHTML=s.svg;setTimeout(()=>d.style.opacity='1',30);
  document.getElementById('pf').style.width=(vi/(SLIDES.length-1)*100)+'%';
  clearInterval(ctick);let pos=0,full=s.narration;
  document.getElementById('narr').textContent='';
  ctick=setInterval(()=>{if(pos<full.length)document.getElementById('narr').textContent=full.slice(0,++pos);else clearInterval(ctick);},18);
  ttsStop();
  if(ttsOn){
    ttsSpeak(s.title+'. '+full,()=>{if(playing){clearTimeout(ticker);ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},1200);}});
    if(playing)clearTimeout(ticker);
  } else if(playing){clearTimeout(ticker);ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},Math.max(9000,full.length*56));}
}
function play(){playing=true;document.getElementById('pb2').textContent='&#9208; Pause';
  if(ttsOn){ttsSpeak(SLIDES[vi].title+'. '+SLIDES[vi].narration,()=>{if(playing)ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},1200);});}
  else{ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},Math.max(9000,SLIDES[vi].narration.length*56));}}
function pause(){playing=false;clearTimeout(ticker);ttsStop();document.getElementById('pb2').textContent='&#9654; Play';}
function tg(){playing?pause():play();}
function gn(){clearTimeout(ticker);gt(vi+1);if(playing)play();}
function gp(){clearTimeout(ticker);gt(vi-1);if(playing)play();}
function pgc(e){const r=document.getElementById('pbar').getBoundingClientRect();clearTimeout(ticker);gt(Math.round((e.clientX-r.left)/r.width*(SLIDES.length-1)));if(playing)play();}
document.addEventListener('keydown',e=>{if(['INPUT','TEXTAREA'].includes(e.target.tagName))return;if(e.key===' '){e.preventDefault();tg();}else if(e.key==='ArrowRight')gn();else if(e.key==='ArrowLeft')gp();else if(e.key==='v'||e.key==='V')ttsToggle();});
gt(0);
</script>

<div id="voice-panel">
  <div id="vp-bar">
    <span id="vp-status">Ready</span>
    <button id="vp-close" onclick="_vpClose()" aria-label="Close">&#x2715;</button>
  </div>
  <div id="vp-transcript" class="aai-empty"></div>
  <div id="vp-answer"></div>
  <div id="vp-footer">Powered by AssemblyAI &middot; universal-3-5-pro</div>
</div>
<script>
/* ── AssemblyAI Voice Input + Q&A ────────────────────────────────────────── */
const _AAI='https://the-c.vercel.app';
const _TERMS=['pointer','malloc','undefined behaviour','mutex','deadlock','epoll',
  'mmap','fork','syscall','struct','volatile','restrict','pthread','semaphore',
  'spinlock','realloc','calloc','free list','stack frame','heap internals'];
/* AudioWorklet: capture Float32 mic audio → Int16 PCM at 16 kHz */
const _WL=`class P extends AudioWorkletProcessor{process(i){const c=i[0]?.[0];if(c){const b=new Int16Array(c.length);for(let j=0;j<c.length;j++){const s=Math.max(-1,Math.min(1,c[j]));b[j]=s<0?s*0x8000:s*0x7FFF;}this.port.postMessage(b.buffer,[b.buffer]);}return true;}}registerProcessor('aai-pcm',P);`;

let _ws=null,_ctx=null,_mic=null,_node=null,_buf=[],_on=false;

const _$=id=>document.getElementById(id);
const _status=(t,live)=>{const e=_$('vp-status');if(e){e.textContent=t;e.className=live?'aai-live':'';}};
const _tx=t=>{const e=_$('vp-transcript');if(!e)return;e.textContent=t;e.className=t?'':'aai-empty';};
const _ans=h=>{const e=_$('vp-answer');if(!e)return;e.innerHTML=h;e.className=h?'aai-show':'';};
const _open=()=>_$('voice-panel')?.classList.add('aai-open');
function _vpClose(){_$('voice-panel')?.classList.remove('aai-open');if(_on)_stop();}

async function _start(){
  if(_on)return;
  if(_AAI==='https://the-c.vercel.app'){
    _open();_status('Backend not configured — see setup guide');return;
  }
  _open();_status('Connecting\u2026');_tx('');_ans('');
  try{
    /* 1. Mint short-lived token (API key stays on server) */
    const tr=await fetch(_AAI+'/api/token');
    if(!tr.ok)throw new Error('Token failed ('+tr.status+')');
    const{token}=await tr.json();
    /* 2. Open WebSocket using token — no API key in browser */
    const p=new URLSearchParams({sample_rate:'16000',speech_model:'universal-3-5-pro',mode:'balanced',token});
    _TERMS.forEach(t=>p.append('keyterms_prompt',t));
    _ws=new WebSocket('wss://streaming.assemblyai.com/v3/ws?'+p);
    await new Promise((ok,fail)=>{
      _ws.onopen=ok;
      _ws.onerror=()=>fail(new Error('WebSocket failed'));
      setTimeout(()=>fail(new Error('Connection timed out')),10000);
    });
    _ws.onmessage=e=>{
      const m=JSON.parse(e.data);
      if(m.type!=='Turn')return;
      _tx(m.transcript);
      /* Auto-trigger Q&A when turn finalizes and ends with ? */
      if(m.end_of_turn&&m.transcript.trim().endsWith('?'))_ask(m.transcript.trim());
    };
    _ws.onclose=()=>{_on=false;_btn();_status('Disconnected');};
    /* 3. Capture mic → PCM16 via AudioWorklet → stream to AssemblyAI */
    _mic=await navigator.mediaDevices.getUserMedia({audio:{channelCount:1,echoCancellation:true,noiseSuppression:true}});
    _ctx=new AudioContext({sampleRate:16000});
    const bu=URL.createObjectURL(new Blob([_WL],{type:'application/javascript'}));
    await _ctx.audioWorklet.addModule(bu);URL.revokeObjectURL(bu);
    _node=new AudioWorkletNode(_ctx,'aai-pcm');
    _node.port.onmessage=ev=>{
      _buf.push(...new Int16Array(ev.data));
      /* Send ~200 ms chunks (3200 samples @ 16 kHz) — within AssemblyAI 50–1000 ms window */
      if(_buf.length>=3200&&_ws?.readyState===1)
        _ws.send(new Int16Array(_buf.splice(0,3200)).buffer);
    };
    _ctx.createMediaStreamSource(_mic).connect(_node);
    _on=true;_btn();_status('Listening',true);
  }catch(err){_status('Error: '+err.message);_clean();}
}

function _stop(){
  /* Always send Terminate — abandoned sessions stay billable until 3-hour cap */
  if(_ws?.readyState===1){_ws.send(JSON.stringify({type:'Terminate'}));_ws.close();}
  _clean();_status('Stopped');
}
function _clean(){_mic?.getTracks().forEach(t=>t.stop());_ctx?.close();_ws=_ctx=_mic=_node=null;_buf=[];_on=false;_btn();}
function _btn(){const b=_$('micbtn');if(!b)return;b.textContent=_on?'\u23F9 Stop':'\uD83C\uDF99 Ask';b.className=_on?'aai-live':'';}
function _micToggle(){_on?_stop():_start();}
window.addEventListener('beforeunload',()=>{if(_ws?.readyState===1)_ws.send(JSON.stringify({type:'Terminate'}));});

async function _ask(q){
  _status('Answering\u2026');_ans('<em style="color:#8b949e">Thinking\u2026</em>');
  try{
    const r=await fetch(_AAI+'/api/qa',{
      method:'POST',
      headers:{'content-type':'application/json'},
      body:JSON.stringify({question:q,volume:document.title}),
    });
    if(!r.ok)throw new Error('Q&A failed ('+r.status+')');
    const{answer}=await r.json();
    /* Minimal markdown: fenced code blocks + inline code */
    const h=answer
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```[\w]*\n?([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
    _ans('<p>'+h+'</p>');
    _status(_on?'Listening':'Ready',_on);
  }catch(err){
    _ans('<em style="color:#f85149">'+err.message+'</em>');
    _status(_on?'Listening':'Ready',_on);
  }
}

</script>
</body>
</html>
