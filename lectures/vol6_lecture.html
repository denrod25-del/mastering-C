/* ── AssemblyAI Voice Input + Q&A ─────────────────────────────────────────── */
#micbtn{
  padding:.45rem .9rem;border-radius:6px;cursor:pointer;font-size:.82rem;
  font-weight:500;border:1px solid #30363d;background:#161b22;color:#8b949e;
  transition:.15s;margin-left:.25rem;
}
#micbtn:hover{border-color:#58a6ff;color:#58a6ff;}
#micbtn.aai-live{background:#2d0f0f;border-color:#f85149;color:#f85149;animation:aai-pulse 1.2s infinite;}
@keyframes aai-pulse{0%,100%{opacity:1}50%{opacity:.5}}
#voice-panel{
  display:none;position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
  width:min(660px,94vw);background:#161b22;border:1px solid #30363d;
  border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.75);z-index:9999;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;
}
#voice-panel.aai-open{display:block;}
#vp-bar{
  background:#21262d;padding:.5rem 1rem;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid #30363d;
}
#vp-status{font-size:.75rem;color:#8b949e;display:flex;align-items:center;gap:.4rem;}
#vp-status.aai-live::before{content:'\25CF';color:#f85149;font-size:.65rem;}
#vp-close{background:none;border:none;color:#8b949e;cursor:pointer;font-size:1.1rem;padding:.1rem .4rem;line-height:1;}
#vp-close:hover{color:#e6edf3;}
#vp-transcript{
  padding:.75rem 1rem;font-size:.88rem;color:#e6edf3;min-height:2.6rem;
  line-height:1.55;border-bottom:1px solid #21262d;font-style:italic;
}
#vp-transcript.aai-empty::before{content:'Say anything — end with ? to get an AI answer';color:#484f58;font-style:italic;}
#vp-form{display:flex;gap:.5rem;padding:.6rem 1rem;border-bottom:1px solid #21262d;}
#vp-input{flex:1;min-width:0;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;padding:.5rem .6rem;font-size:.84rem;}
#vp-input:focus-visible{outline:2px solid #58a6ff;outline-offset:1px;}
#vp-form button{min-height:36px;padding:.4rem .9rem;font-size:.8rem;border-radius:6px;border:1px solid #30363d;background:#21262d;color:#e6edf3;}
#vp-form button:hover{background:#30363d;}
#vp-answer{
  display:none;padding:.75rem 1rem;font-size:.84rem;color:#c9d1d9;
  line-height:1.65;max-height:260px;overflow-y:auto;
}
#vp-answer.aai-show{display:block;}
#vp-answer code{
  background:#010409;padding:.1rem .35rem;border-radius:3px;
  font-family:'SFMono-Regular',Consolas,monospace;font-size:.8em;color:#e6edf3;
}
#vp-answer pre{
  background:#010409;border:1px solid #30363d;border-radius:6px;padding:.6rem .8rem;
  font-size:.78rem;overflow-x:auto;margin:.4rem 0;white-space:pre;
  font-family:'SFMono-Regular',Consolas,monospace;color:#e6edf3;
}
#vp-answer p{margin:.35rem 0;}
#vp-footer{padding:.35rem 1rem .6rem;font-size:.7rem;color:#484f58;}

{title:"string.h -- safe vs unsafe string functions",narration:"The string dot h header is the most hazardous in the standard library because several key functions write to a destination buffer with no mechanism to check whether the data fits. strcpy copies until it finds a null terminator with no regard for the destination size. strcat appends with the same problem. The gets function was removed from C11 because it is impossible to use safely. Safe alternatives are strncpy, which does not null-terminate if the source is longer than the limit, strlcpy which always null-terminates and returns the length needed, and snprintf which is the most versatile. The memory functions memcpy, memmove, memset, and memcmp operate on raw byte ranges rather than null-terminated strings and are essential for struct operations.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">string.h -- the most dangerous header: many functions have no bounds checking</text><rect x="20" y="24" width="390" height="96" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="215" y="36" text-anchor="middle" style="font-size:12px;fill:#c62828">Dangerous -- no length limit</text><rect x="26" y="46" width="378" height="68" rx="4" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="33" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">strcpy(dst,src);      // DANGER: no length limit</text><text x="33" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">strcat(dst,src);      // DANGER: overflows dst</text><text x="33" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">gets(line);           // BANNED in C11</text><text x="33" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">sprintf(buf,fmt,...); // DANGER if result > buf</text><rect x="430" y="24" width="390" height="96" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="625" y="36" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Safe -- pass a maximum length</text><rect x="436" y="46" width="378" height="68" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="443" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">strncpy(dst,src,n);   // no null-term if truncated!</text><text x="443" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">strlcpy(dst,src,n);   // null-terminates: BSD/glibc</text><text x="443" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#1a7a40">snprintf(buf,n,fmt);  // always null-terminates // SAFE</text><text x="443" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#1a7a40">fgets(buf,n,stdin);   // reads n-1 chars+NUL // SAFE</text><rect x="20" y="126" width="800" height="58" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="138" text-anchor="middle" style="font-size:12px;fill:#1040a0">Memory functions -- work on raw bytes, type-agnostic:</text><rect x="28" y="148" width="188" height="30" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="122" y="158" text-anchor="middle" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">memcpy()</text><text x="122" y="170" text-anchor="middle" style="font-size:10px;fill:#1040a0">copy n bytes (no overlap)</text><rect x="224" y="148" width="188" height="30" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="318" y="158" text-anchor="middle" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">memmove()</text><text x="318" y="170" text-anchor="middle" style="font-size:10px;fill:#1040a0">copy n bytes (overlap OK)</text><rect x="420" y="148" width="188" height="30" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="514" y="158" text-anchor="middle" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">memset()</text><text x="514" y="170" text-anchor="middle" style="font-size:10px;fill:#1040a0">fill n bytes with val</text><rect x="616" y="148" width="188" height="30" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="710" y="158" text-anchor="middle" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">memcmp()</text><text x="710" y="170" text-anchor="middle" style="font-size:10px;fill:#1040a0">compare n bytes</text><rect x="20" y="190" width="800" height="22" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="201" text-anchor="middle" style="font-size:12px;fill:#b26a00">Searching: strchr(first) | strrchr(last) | strstr(substring) | strtok(tokenize - not thread-safe)</text><rect x="20" y="218" width="800" height="30" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="420" y="230" text-anchor="middle" style="font-size:11px;fill:#555">strlen returns count EXCLUDING null terminator -- allocate strlen(s)+1 for a copy</text><text x="420" y="242" text-anchor="middle" style="font-size:11px;fill:#555">strtok uses static state -- not re-entrant. Use strtok_r (POSIX) in multi-threaded code.</text></svg>`},
{title:"stdlib.h -- memory, conversion, sort, process",narration:"The stdlib dot h header groups into four categories. Memory management: malloc allocates uninitialized bytes, calloc allocates and zeroes, realloc resizes an allocation potentially moving it, and free releases it. Always check malloc for a NULL return and always set the pointer to NULL after freeing. Number parsing: strtol and strtod are the safe functions because they set errno and provide an endpointer showing how far parsing succeeded; the atoi family silently returns zero on failure. Sort and search: qsort sorts any array given a comparator callback, bsearch performs binary search on a sorted array. Process control: exit flushes buffers and runs atexit handlers, abort triggers SIGABRT, atexit registers cleanup functions.",svg:`<svg width="100%" viewBox="0 0 840 272"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">stdlib.h -- memory management, number parsing, sorting, and process control</text><rect x="20" y="24" width="393" height="94" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="216" y="36" text-anchor="middle" style="font-size:12px;fill:#1040a0">Memory Management</text><rect x="26" y="46" width="381" height="68" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="33" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">void *malloc(size_t n);</text><text x="33" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">void *calloc(size_t n, size_t sz); // zeroed</text><text x="33" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">void *realloc(void *p, size_t n);</text><text x="33" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">void free(void *p); // p=NULL after!</text><rect x="427" y="24" width="393" height="94" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="623" y="36" text-anchor="middle" style="font-size:12px;fill:#0d6a6a">Number Parsing</text><rect x="433" y="46" width="381" height="83" rx="4" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="440" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#1a7a40">// SAFE: check errno and endptr:</text><text x="440" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">long strtol(str,&amp;end,base); // base 0=auto</text><text x="440" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">double strtod(str,&amp;end);</text><text x="440" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// AVOID: no error detection:</text><text x="440" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int atoi(str);  double atof(str); // silent fail</text><rect x="20" y="124" width="393" height="90" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="216" y="136" text-anchor="middle" style="font-size:12px;fill:#b26a00">Sort and Search</text><rect x="26" y="146" width="381" height="83" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="33" y="157" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Sort any array with compare fn:</text><text x="33" y="172" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">qsort(base,n,sizeof(*base),cmp_fn);</text><text x="33" y="187" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="33" y="202" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Binary search (array must be sorted):</text><text x="33" y="217" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">bsearch(key,base,n,sizeof(*base),cmp_fn);</text><rect x="427" y="124" width="393" height="90" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="623" y="136" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Process Control</text><rect x="433" y="146" width="381" height="83" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="440" y="157" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">exit(code);         // flush+atexit handlers+exit</text><text x="440" y="172" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">abort();            // raise SIGABRT, no cleanup</text><text x="440" y="187" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">atexit(fn);         // register cleanup fn</text><text x="440" y="202" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">char *s=getenv("HOME"); // read env variable</text><text x="440" y="217" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">srand(42); rand();  // weak PRNG -- use PCG</text><rect x="20" y="233" width="800" height="28" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="243" text-anchor="middle" style="font-size:12px;fill:#c62828">malloc returns NULL on failure -- always check! free(NULL) is safe (no-op)</text><text x="420" y="257" text-anchor="middle" style="font-size:12px;fill:#c62828">malloc does NOT zero memory -- use calloc or explicit memset if zeroing is needed</text></svg>`},
{title:"stdint.h and limits.h -- exact-width types",narration:"The stdint dot h header provides integer types with guaranteed exact widths, which are essential for portable code that processes binary formats, network protocols, or hardware registers. int8_t through int64_t cover the signed exact-width types; their unsigned counterparts prefix with u. Each has corresponding minimum and maximum constants. The stddef dot h header provides size_t for the result of sizeof, and ptrdiff_t for the signed difference between two pointers. intptr_t and uintptr_t are integer types guaranteed wide enough to hold any pointer value. intmax_t holds the widest integer the platform supports. The limits dot h header documents platform-specific limits for the basic types such as INT_MAX, LONG_MIN, and CHAR_BIT.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">stdint.h and limits.h -- exact-width integer types for portable code</text><rect x="20" y="24" width="126" height="22" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="83" y="35" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#555">Width</text><rect x="150" y="24" width="106" height="22" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="203" y="35" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#555">Signed type</text><rect x="260" y="24" width="256" height="22" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="388" y="35" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#555">Range</text><rect x="520" y="24" width="116" heigh {title:"ctype.h -- character classification",narration:"The ctype dot h header provides functions to classify characters and convert case. isalpha returns nonzero for letters, isdigit for decimal digits, isalnum for either, isspace for whitespace including space, tab, carriage return, and newline, and ispunct for punctuation marks. toupper and tolower perform case conversion. Every one of these functions takes an int argument and is defined to have undefined behavior if the argument is negative except for the special value EOF. Because the plain char type may be signed on some platforms and can therefore hold negative values when processing bytes above 127, you must always cast to unsigned char before calling any ctype function. Write isalpha of the cast of c to unsigned char, not isalpha of c directly.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">ctype.h -- character classification and case conversion</text><rect x="22" y="24" width="114" height="20" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="79" y="34" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#555">Function</text><rect x="140" y="24" width="186" height="20" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="233" y="34" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#555">Returns true for</text><rect x="330" y="24" width="196" height="20" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="428" y="34" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#555">Example chars</text><rect x="530" y="24" wi xt><rect x="530" y="187" width="282" height="19" rx="2" fill="#fff3e0" stroke="#f5b942" stroke-width="0.6"/><text x="671" y="196" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:400;fill:#b26a00">returns int not char</text><rect x="22" y="207" width="114" height="19" rx="2" fill="#fff3e0" stroke="#f5b942" stroke-width="0.6"/><text x="79" y="216" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#b26a00;font-family:monospace">tolower</text><rect x="140" y="207" width="186" height="19" rx="2" fill="#fff3e0" stroke="#f5b942" stroke-width="0.6"/><text x="233" y="216" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:400;fill:#b26a00">(converts)</text><rect x="330" y="207" width="196" height="19" rx="2" fill="#fff3e0" stroke="#f5b942" stroke-width="0.6"/><text x="428" y="216" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:400;fill:#b26a00">A-Z => a-z</text><rect x="530" y="207" width="282" height="19" rx="2" fill="#fff3e0" stroke="#f5b942" stroke-width="0.6"/><text x="671" y="216" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:400;fill:#b26a00">returns int not char</text><rect x="20" y="232" width="800" height="18" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="241" text-anchor="middle" style="font-size:12px;fill:#c62828">CRITICAL: cast to unsigned char first -- isalpha((unsigned char)c) not isalpha(c)</text><text x="420" y="249" text-anchor="middle" style="font-size:10px;fill:#c62828">char may be signed; ctype functions have UB for negative values other than EOF</text></svg>`},
{title:"errno.h -- error codes and error handling",narration:"The errno dot h header declares errno, a thread-local integer that library and system calls set when they fail. The correct pattern has five steps. First call the function. Second check its return value for the failure sentinel such as negative one, NULL, or EOF. Third and only if the function failed, inspect errno. Fourth use perror to print a human-readable error combining your prefix and the error description, or strerror to get just the string. Fifth clear errno to zero before the next operation if you want to detect its failure independently. errno is not cleared on success, so an inspection after a successful call may see a stale error from a previous call. In C11 and POSIX threaded code errno is thread-local.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">errno.h -- thread-local error codes set by failing library and system calls</text><rect x="30" y="28" width="148" height="30" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="1.2"/><text x="104" y="43" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:600;fill:#1040a0">Call function</text><text x="104" y="66" text-anchor="middle" style="font-size:10px;fill:#1040a0">FILE *f=fopen("x","r");</text><line x1="180" y1="43" x2="184" y2="43" stroke="#1040a0" stroke-width="2.2" marker-end="url(#ah)" fill="none" class="da"/><rect x="186" y="28" width="148" height="30" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="1.2"/><text x="260" y="43" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:600;fill:#b26a00">Check return</text><text x="260" y="66" text-anchor="middle" style="font-size:10px;fill:#b26a00">if (f == NULL) {</text><line x1="336" y1="43" x2="340" y2="43" stroke="#b26a00" stroke-width="2.2" marker-end="url(#ah)" fill="none" class="da"/><rect x="342" y="28" width="148" height="30" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1.2"/><text x="416" y="43" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:600;fill:#0d6a6a">Read errno</text><text x="416" y="66" text-anchor="middle" style="font-size:10px;fill:#0d6a6a">  // errno is set</text><line x1="492" y1="43" x2="496" y2="43" stroke="#0d6a6a" stroke-width="2.2" marker-end="url(#ah)" fill="none" class="da"/><rect x="498" y="28" width="148" height="30" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.2"/><text x="572" y="43" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:600;fill:#1a7a40">perror()</text><text x="572" y="66" text-anchor="middle" style="font-size:10px;fill:#1a7a40">  perror("fopen");</text><line x1="648" y1="43" x2="652" y2="43" stroke="#1a7a40" stroke-width="2.2" marker-end="url(#ah)" fill="none" class="da"/><rect x="654" y="28" width="148" height="30" rx="5" fill="#f0e8ff" stroke="#c39be8" stroke-width="1.2"/><text x="728" y="43" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:600;fill:#5c2d91">Clear + retry</text><text x="728" y="66" text-anchor="middle" style="font-size:10px;fill:#5c2d91">  errno = 0; }</text><rect x="26" y="82" width="500" height="98" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="33" y="93" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">errno == ENOENT  // No such file or directory</text><text x="33" y="108" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">errno == EACCES  // Permission denied</text><text x="33" y="123" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">errno == EINVAL  // Invalid argument</text><text x="33" y="138" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">errno == ENOMEM  // Out of memory</text><text x="33" y="153" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">errno == EAGAIN  // Resource temporarily unavailable</text><text x="33" y="168" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">errno == EEXIST  // File already exists</text><rect x="538" y="82" width="278" height="113" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="545" y="93" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Report error:</text><text x="545" y="108" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">perror("fopen");</text><text x="545" y="123" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// prints to stderr:</text><text x="545" y="138" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// "fopen: No such file..."</text><text x="545" y="153" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="545" y="168" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">strerror(errno)</text><text x="545" y="183" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// returns just the string</text><rect x="20" y="188" width="800" height="30" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="200" text-anchor="middle" style="font-size:12px;fill:#b26a00">errno is only valid IMMEDIATELY after a failed call -- a successful call may change errno</text><text x="420" y="214" text-anchor="middle" style="font-size:12px;fill:#b26a00">In multi-threaded code errno is thread-local (C11/POSIX) -- each thread has its own copy</text><rect x="20" y="224" width="800" height="24" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="236" text-anchor="middle" style="font-size:12px;fill:#c62828">Do NOT check errno after a successful call -- it may contain a stale error from a prior call</text></svg>`},
{title:"stdarg.h -- variadic functions",narration:"The stdarg dot h header provides the machinery for variadic functions that accept a variable number of arguments. You declare a va_list variable to hold the cursor into the argument stack, call va_start passing the last named parameter to initialize it, then call va_arg repeatedly with the expected type of each variadic argument to fetch and advance, and finally call va_end which is mandatory and may clear the cursor. The caller and callee must agree out-of-band on the number and types of variadic arguments, typically through a format string or an explicit count parameter. Passing the wrong type to va_arg is undefined behavior. There is no runtime type checking or reflection.",svg:`<svg width="100%" viewBox="0 0 840 330"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">stdarg.h -- variadic functions that accept a variable number of arguments</text><rect x="20" y="24" width="400" height="203" rx="4" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="27" y="35" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">#include &lt;stdarg.h&gt;</text><text x="27" y="50" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="27" y="65" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// count = number of ints that follow</text><text x="27" y="80" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int sum(int count, ...) {</text><text x="27" y="95" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    va_list ap;</text><text x="27" y="110" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    va_start(ap, count); // init: ap points past count</text><text x="27" y="125" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    int total = 0;</text><text x="27" y="140" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    for (int i = 0; i &lt; count; i++)</text><text x="27" y="155" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">        total += va_arg(ap, int); // fetch next int</text><text x="27" y="170" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    va_end(ap);  // mandatory cleanup</text><text x="27" y="185" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    return total;</text><text x="27" y="200" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">}</text><text x="27" y="215" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// sum(3, 10, 20, 30) returns 60</text><rect x="434" y="24" width="386" height="182" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="627" y="36" text-anchor="middle" style="font-size:12px;fill:#1040a0">The four macros:</text><rect x="440" y="52" width="374" height="32" rx="4" fill="#e8f4ff" stroke="#88aaf0" stroke-width="0.8"/><text x="448" y="63" text-anchor="start" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">va_list ap;</text><text x="448" y="76" text-anchor="start" style="font-size:10px;fill:#555">declares the cursor into arg stack</text><rect x="440" y="90" width="374" height="32" rx="4" fill="#e8f4ff" stroke="#88aaf0" stroke-width="0.8"/><text x="448" y="101" text-anchor="start" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">va_start(ap,last)</text><text x="448" y="114" text-anchor="start" style="font-size:10px;fill:#555">init ap; last = last named param</text><rect x="440" y="128" width="374" height="32" rx="4" fill="#e8f4ff" stroke="#88aaf0" stroke-width="0.8"/><text x="448" y="139" text-anchor="start" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">va_arg(ap,type)</text><text x="448" y="152" text-anchor="start" style="font-size:10px;fill:#555">fetch next arg; advance cursor</text><rect x="440" y="166" width="374" height="32" rx="4" fill="#e8f4ff" stroke="#88aaf0" stroke-width="0.8"/><text x="448" y="177" text-anchor="start" style="font-family:monospace;font-size:11px;font-weight:700;fill:#1040a0">va_end(ap)</text><text x="448" y="190" text-anchor="start" style="font-size:10px;fill:#555">mandatory cleanup; may clear ap</text><rect x="434" y="214" width="386" height="36" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="627" y="230" text-anchor="middle" style="font-size:11px;fill:#b26a00">You must know the type and count</text><text x="627" y="244" text-anchor="middle" style="font-size:11px;fill:#b26a00">of args -- no reflection in C.</text><rect x="20" y="235" width="400" height="74" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="220" y="247" text-anchor="middle" style="font-size:12px;fill:#0d6a6a">Key rules:</text><text x="26" y="263" text-anchor="start" style="font-size:10px;fill:#0d6a6a">- At least one named parameter required</text><text x="26" y="277" text-anchor="start" style="font-size:10px;fill:#0d6a6a">- Caller and callee must agree on types</text><text x="26" y="291" text-anchor="start" style="font-size:10px;fill:#0d6a6a">- Wrong va_arg type = undefined behavior</text><text x="26" y="304" text-anchor="start" style="font-size:10px;fill:#0d6a6a">- Always call va_end before returning</text></svg>`},
{title:"signal.h and setjmp.h",narration:"The signal dot h header provides a way to respond to asynchronous events. SIGINT comes from Ctrl-C, SIGTERM from a kill request, SIGSEGV from invalid memory access, SIGFPE from arithmetic exceptions, and SIGALRM from the alarm timer. Signal handlers run asynchronously interrupting whatever code was executing, so only async-signal-safe functions may be called inside a handler. This excludes malloc, printf, and virtually all standard library functions. The correct pattern is to set a volatile sig_atomic_t flag in the handler and check it from the main event loop. The setjmp dot h header provides non-local jumps: setjmp saves CPU register state returning zero, and a later longjmp restores that state making setjmp appear to return again with a nonzero value.",svg:`<svg width="100%" viewBox="0 0 840 305"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">signal.h and setjmp.h -- asynchronous events and non-local control flow</text><rect x="20" y="24" width="420" height="116" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="230" y="36" text-anchor="middle" style="font-size:12px;fill:#1040a0">Common signals</text><text x="28" y="48" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1040a0">SIGINT</text><text x="128" y="48" text-anchor="start" style="font-size:10px;fill:#555">Ctrl+C interrupt</text><text x="302" y="48" text-anchor="start" style="font-size:9px;fill:#888">maskable, graceful shutdown</text><text x="28" y="63" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1040a0">SIGTERM</text><text x="128" y="63" text-anchor="start" style="font-size:10px;fill:#555">termination request</text><text x="302" y="63" text-anchor="start" style="font-size:9px;fill:#888">default kill, can be caught</text><text x="28" y="78" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1040a0">SIGSEGV</text><text x="128" y="78" text-anchor="start" style="font-size:10px;fill:#555">invalid memory access</text><text x="302" y="78" text-anchor="start" style="font-size:9px;fill:#888">usually fatal</text><text x="28" y="93" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1040a0">SIGFPE</text><text x="128" y="93" text-anchor="start" style="font-size:10px;fill:#555">arithmetic exception</text><text x="302" y="93" text-anchor="start" style="font-size:9px;fill:#888">div-by-zero, overflow</text><text x="28" y="108" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1040a0">SIGALRM</text><text x="128" y="108" text-anchor="start" style="font-size:10px;fill:#555">timer expired</text><text x="302" y="108" text-anchor="start" style="font-size:9px;fill:#888">from alarm() syscall</text><text x="28" y="123" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1040a0">SIGHUP</text><text x="128" y="123" text-anchor="start" style="font-size:10px;fill:#555">hangup/parent died</text><text x="302" y="123" text-anchor="start" style="font-size:9px;fill:#888">reload-config convention</text><rect x="450" y="24" width="370" height="116" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="635" y="36" text-anchor="middle" style="font-size:12px;fill:#b26a00">setjmp / longjmp (setjmp.h)</text><rect x="456" y="46" width="358" height="143" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="463" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">jmp_buf env;</text><text x="463" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">if (setjmp(env) == 0) {</text><text x="463" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">    // setjmp: saves CPU regs, returns 0</text><text x="463" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    risky_operation();</text><text x="463" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">} else {</text><text x="463" y="132" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">    // jumped here: recovery code</text><text x="463" y="147" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">}</text><text x="463" y="162" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// In risky_operation():</text><text x="463" y="177" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">if (error) longjmp(env,1); // jump!</text><rect x="20" y="193" width="800" height="46" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="205" text-anchor="middle" style="font-size:12px;fill:#c62828">Signal handlers: only async-signal-safe functions allowed inside -- NOT malloc, printf, or most stdlib</text><text x="420" y="219" text-anchor="middle" style="font-size:12px;fill:#c62828">Pattern: set volatile sig_atomic_t flag in handler; check flag from main loop</text><text x="420" y="233" text-anchor="middle" style="font-size:12px;fill:#c62828">Use sigaction() not signal() -- more control, portable, restartable syscalls with SA_RESTART</text><rect x="20" y="245" width="800" height="50" rx="5" fill="#fffff0" stroke="#ccbb00" stroke-width="0.8"/><text x="420" y="257" text-anchor="middle" style="font-size:12px;fill:#6b5c00">setjmp/longjmp pitfalls: local variables in the jumped-from frame are indeterminate</text><text x="420" y="269" text-anchor="middle" style="font-size:12px;fill:#6b5c00">unless declared volatile. Does NOT call destructors or free resources -- use carefully.</text><text x="420" y="283" text-anchor="middle" style="font-size:12px;fill:#6b5c00">POSIX sigsetjmp/siglongjmp also save/restore the signal mask -- usually what you want.</text></svg>`},
{title:"time.h -- clocks and calendars",narration:"The time dot h header provides three representations of time. time_t is an arithmetic type holding seconds since the Unix epoch of January first 1970. clock_t measures CPU time consumed by the process in ticks; divide by CLOCKS_PER_SEC for seconds. struct tm is a broken-down calendar representation. Two critical traps: tm_mon is zero-based so January is zero and December is eleven, and tm_year counts years since 1900 so the year 2024 is represented as 124. gmtime decomposes a time_t into UTC, localtime into local time, and mktime performs the inverse conversion. strftime formats a struct tm into a string using printf-style format codes. difftime returns the signed difference between two time_t values in seconds.",svg:`<svg width="100%" viewBox="0 0 840 320"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">time.h -- wall-clock time, CPU time, and calendar formatting</text><rect x="20" y="24" width="440" height="194" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="240" y="36" text-anchor="middle" style="font-size:12px;fill:#1040a0">Time type hierarchy</text><rect x="130" y="46" width="220" height="28" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="1.2"/><text x="240" y="60" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:600;fill:#1040a0">time_t  (seconds since 1970 epoch)</text><line x1="200" y1="76" x2="170" y2="100" stroke="#1040a0" stroke-width="2.2" marker-end="url(#ah)" fill="none" class="da"/><text x="185" y="70" text-anchor="middle" style="font-size:10px;fill:#1040a0">gmtime()</text><line x1="280" y1="76" x2="308" y2="100" stroke="#1040a0" stroke-width="2.2" marker-end="url(#ah)" fill="none" class="da"/><text x="294" y="70" text-anchor="middle" style="font-size:10px;fill:#1040a0">localtime()</text><rect x="60" y="104" width="160" height="28" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1.2"/><text x="140" y="118" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:600;fill:#0d6a6a">struct tm (UTC)</text><rect x="246" y="104" width="148" height="28" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="1.2"/><text x="320" y="118" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:600;fill:#b26a00">struct tm (local)</text><line x1="155" y1="134" x2="155" y2="156" stroke="#0d6a6a" stroke-width="2.2" marker-end="url(#ah)" fill="none" class="da"/><line x1="310" y1="134" x2="310" y2="156" stroke="#b26a00" stroke-width="2.2" marker-end="url(#ah)" fill="none" class="da"/><rect x="56" y="160" width="420" height="22" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.2"/><text x="266" y="171" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:600;fill:#1a7a40">strftime(buf,sz,"%Y-%m-%d %H:%M:%S",&amp;tm)</text><text x="240" y="190" text-anchor="middle" style="font-size:10px;fill:#555">mktime(&amp;tm) =&gt; time_t  (inverse of localtime)</text><text x="240" y="204" text-anchor="middle" style="font-size:10px;fill:#555">difftime(t2,t1) =&gt; double seconds between t1 and t2</text><rect x="470" y="24" width="350" height="164" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="645" y="36" text-anchor="middle" style="font-size:12px;fill:#0d6a6a">struct tm fields</text><text x="478" y="50" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#0d6a6a">tm_sec</text><text x="560" y="50" text-anchor="start" style="font-size:9px;fill:#555">seconds 0..60 (60 = leap second)</text><text x="478" y="64" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#0d6a6a">tm_min</text><text x="560" y="64" text-anchor="start" style="font-size:9px;fill:#555">minutes 0..59</text><text x="478" y="78" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#0d6a6a">tm_hour</text><text x="560" y="78" text-anchor="start" style="font-size:9px;fill:#555">hours 0..23</text><text x="478" y="92" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#0d6a6a">tm_mday</text><text x="560" y="92" text-anchor="start" style="font-size:9px;fill:#555">day of month 1..31</text><text x="478" y="106" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#0d6a6a">tm_mon</text><text x="560" y="106" text-anchor="start" style="font-size:9px;fill:#555">month 0..11  -- 0=January!</text><text x="478" y="120" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#0d6a6a">tm_year</text><text x="560" y="120" text-anchor="start" style="font-size:9px;fill:#555">years since 1900 -- add 1900!</text><text x="478" y="134" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#0d6a6a">tm_wday</text><text x="560" y="134" text-anchor="start" style="font-size:9px;fill:#555">0=Sunday .. 6=Saturday</text><text x="478" y="148" text-anchor="start" style="font-family:monospace;font-size:10px;font-weight:700;fill:#0d6a6a">tm_yday</text><text x="560" y="148" text-anchor="start" style="font-size:9px;fill:#555">day of year 0..365</text><rect x="20" y="226" width="800" height="80" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="238" text-anchor="middle" style="font-size:12px;fill:#b26a00">CPU time measurement (process CPU ticks, not wall clock):</text><rect x="26" y="248" width="780" height="53" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="33" y="259" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">clock_t t0 = clock();</text><text x="33" y="274" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">expensive_work();</text><text x="33" y="289" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">double secs = (double)(clock()-t0)/CLOCKS_PER_SEC; // CPU time consumed, not wall time</text></svg>`},
{title:"stdatomic.h and threads.h (C11)",narration:"The stdatomic dot h header added in C11 provides atomic types and operations for lock-free concurrent programming. Declaring a variable with the underscore-Atomic qualifier makes reads and writes to it indivisible even from concurrent threads. Without atomics, concurrent access to a plain integer from two threads is a data race and undefined behavior. The atomic_fetch_add, atomic_load, and atomic_store functions accept a memory order argument. memory_order_relaxed provides no synchronization and suits simple counters. memory_order_acquire and release pair together for producer-consumer synchronization. memory_order_seq_cst, the default, provides a total sequential order visible to all threads and is the safest choice when in doubt.",svg:`<svg width="100%" viewBox="0 0 840 313"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">stdatomic.h (C11) -- lock-free ops; threads.h (C11) -- portable threading primitives</text><rect x="20" y="24" width="390" height="96" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="215" y="36" text-anchor="middle" style="font-size:12px;fill:#c62828">Data race -- undefined behavior</text><rect x="26" y="46" width="378" height="113" rx="4" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="33" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int counter = 0;           // plain int</text><text x="33" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="33" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Thread 1:     // Thread 2:</text><text x="33" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">counter++;        counter++;</text><text x="33" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// read(0)         read(0)</text><text x="33" y="132" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// write(1)        write(1)</text><text x="33" y="147" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// RESULT: counter==1  WRONG!</text><rect x="430" y="24" width="390" height="96" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="625" y="36" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Atomic -- no data race</text><rect x="436" y="46" width="378" height="113" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="443" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">_Atomic int counter = 0;   // atomic</text><text x="443" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="443" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Thread 1:</text><text x="443" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">atomic_fetch_add(&amp;counter,1);</text><text x="443" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Thread 2:</text><text x="443" y="132" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">atomic_fetch_add(&amp;counter,1);</text><text x="443" y="147" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// RESULT: counter==2  CORRECT</text><rect x="20" y="163" width="800" height="60" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="175" text-anchor="middle" style="font-size:12px;fill:#1040a0">Memory orders (weakest/fastest to strongest/slowest):</text><rect x="26" y="187" width="124" height="32" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="88" y="199" text-anchor="middle" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1040a0">relaxed</text><text x="88" y="209" text-anchor="middle" style="font-size:9px;fill:#1040a0">no sync</text><text x="88" y="218" text-anchor="middle" style="font-size:9px;fill:#1040a0">counter only</text><rect x="158" y="187" width="124" height="32" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="220" y="199" text-anchor="middle" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1040a0">consume</text><text x="220" y="209" text-anchor="middle" style="font-size:9px;fill:#1040a0">data dep</text><text x="220" y="218" text-anchor="middle" style="font-size:9px;fill:#1040a0">rarely needed</text><rect x="290" y="187" width="124" height="32" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="352" y="199" text-anchor="middle" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1040a0">acquire</text><text x="352" y="209" text-anchor="middle" style="font-size:9px;fill:#1040a0">see prior</text><text x="352" y="218" text-anchor="middle" style="font-size:9px;fill:#1040a0">releases</text><rect x="422" y="187" width="124" height="32" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="484" y="199" text-anchor="middle" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1040a0">release</text><text x="484" y="209" text-anchor="middle" style="font-size:9px;fill:#1040a0">visible to</text><text x="484" y="218" text-anchor="middle" style="font-size:9px;fill:#1040a0">acquires</text><rect x="554" y="187" width="124" height="32" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="616" y="199" text-anchor="middle" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1040a0">acq_rel</text><text x="616" y="209" text-anchor="middle" style="font-size:9px;fill:#1040a0">both</text><text x="616" y="218" text-anchor="middle" style="font-size:9px;fill:#1040a0">RMW ops</text><rect x="686" y="187" width="124" height="32" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="748" y="199" text-anchor="middle" style="font-family:monospace;font-size:10px;font-weight:700;fill:#1040a0">seq_cst</text><text x="748" y="209" text-anchor="middle" style="font-size:9px;fill:#1040a0">total order</text><text x="748" y="218" text-anchor="middle" style="font-size:9px;fill:#1040a0">default/safe</text><rect x="20" y="229" width="800" height="26" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="420" y="242" text-anchor="middle" style="font-size:12px;fill:#0d6a6a">threads.h: thrd_create | thrd_join | mtx_lock | mtx_unlock | cnd_wait | cnd_signal</text><rect x="20" y="261" width="800" height="24" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="273" text-anchor="middle" style="font-size:12px;fill:#b26a00">Prefer pthreads (POSIX) for production -- C11 threads.h rarely fully implemented</text><rect x="20" y="289" width="800" height="14" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="299" text-anchor="middle" style="font-size:12px;fill:#1a7a40">atomic_flag + ATOMIC_FLAG_INIT = only guaranteed lock-free type; use for spinlocks</text></svg>`},

// ── Text-to-Speech (Web Speech API) ──────────────────────────────────────────
let ttsOn = false, ttsUtter = null, ttsVoice = null;

function ttsPickVoice() {
  const vs = speechSynthesis.getVoices();
  if (!vs.length) return null;
  // Prefer a natural en-US/en-GB voice; fall back to any English, then first
  return vs.find(v => /en[-_](US|GB)/i.test(v.lang) && /natural|neural|premium/i.test(v.name))
      || vs.find(v => /en[-_](US|GB)/i.test(v.lang))
      || vs.find(v => v.lang.startsWith('en'))
      || vs[0];
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => { ttsVoice = ttsPickVoice(); };
  ttsVoice = ttsPickVoice();
}

function ttsSpeak(text, onEnd) {
  if (!ttsOn || !('speechSynthesis' in window)) { if (onEnd) onEnd(); return; }
  speechSynthesis.cancel();
  // Clean text for speech: strip code-ish punctuation that reads badly
  const clean = text
    .replace(/->/g, ' arrow ')
    .replace(/&/g, ' ampersand ')
    .replace(/\*p\b/g, 'star p')
    .replace(/`/g, '')
    .replace(/\s+/g, ' ').trim();
  ttsUtter = new SpeechSynthesisUtterance(clean);
  if (ttsVoice) ttsUtter.voice = ttsVoice;
  ttsUtter.rate = 0.95;
  ttsUtter.pitch = 1.0;
  if (onEnd) ttsUtter.onend = onEnd;
  speechSynthesis.speak(ttsUtter);
}

function ttsStop() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
}

function ttsToggle() {
  ttsOn = !ttsOn;
  const b = document.getElementById('ttsbtn');
  if (ttsOn) {
    b.textContent = '🔊 Voice On';
    b.style.background = '#e6f4ee';
    b.style.borderColor = '#4caf79';
    // Speak the current slide immediately so the user gets feedback
    ttsSpeak(SLIDES[vi].title + '. ' + SLIDES[vi].narration, null);
  } else {
    b.textContent = '🔇 Voice Off';
    b.style.background = '';
    b.style.borderColor = '';
    ttsStop();
  }
}
window.addEventListener('beforeunload', ttsStop);

let vi=0,playing=false,ticker=null,ctick=null;
function updateNav(){
  const prevBtn=document.getElementById('prevbtn'),nextBtn=document.getElementById('nextbtn');
  prevBtn.disabled=(vi===0);prevBtn.setAttribute('aria-disabled',String(vi===0));
  nextBtn.disabled=(vi===SLIDES.length-1);nextBtn.setAttribute('aria-disabled',String(vi===SLIDES.length-1));
}
function gt(n){
  vi=Math.max(0,Math.min(n,SLIDES.length-1));
  const s=SLIDES[vi];
  document.getElementById('st').textContent=s.title;
  document.getElementById('sc').textContent=(vi+1)+' / '+SLIDES.length;
  const d=document.getElementById('diag');
  d.style.opacity='0';d.innerHTML=s.svg;
  const svgEl=d.querySelector('svg');
  if(svgEl){svgEl.setAttribute('role','img');svgEl.setAttribute('aria-label',s.title+' diagram');}
  setTimeout(()=>d.style.opacity='1',30);
  document.getElementById('pf').style.width=(vi/(SLIDES.length-1)*100)+'%';
  const bar=document.getElementById('pbar');
  bar.setAttribute('aria-valuemax',String(SLIDES.length));
  bar.setAttribute('aria-valuenow',String(vi+1));
  bar.setAttribute('aria-valuetext',(vi+1)+' of '+SLIDES.length+': '+s.title);
  updateNav();
  document.getElementById('live-announce').textContent=s.title;
  clearInterval(ctick);let pos=0,full=s.narration;
  document.getElementById('narr').textContent='';
  ctick=setInterval(()=>{if(pos<full.length)document.getElementById('narr').textContent=full.slice(0,++pos);else clearInterval(ctick);},18);
  ttsStop();
  if(ttsOn){
    ttsSpeak(s.title+'. '+full,()=>{if(playing){clearTimeout(ticker);ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},1200);}});
    if(playing)clearTimeout(ticker);
  } else if(playing){clearTimeout(ticker);ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},Math.max(9000,full.length*56));}
}
function play(){playing=true;document.getElementById('pb2').textContent='⏸ Pause';
  if(ttsOn){ttsSpeak(SLIDES[vi].title+'. '+SLIDES[vi].narration,()=>{if(playing)ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},1200);});}
  else{ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},Math.max(9000,SLIDES[vi].narration.length*56));}}
function pause(){playing=false;clearTimeout(ticker);ttsStop();document.getElementById('pb2').textContent='▶ Play';}
function tg(){playing?pause():play();}
function gn(){if(vi>=SLIDES.length-1)return;clearTimeout(ticker);gt(vi+1);if(playing)play();}
function gp(){if(vi<=0)return;clearTimeout(ticker);gt(vi-1);if(playing)play();}
function pgc(e){const r=document.getElementById('pbar').getBoundingClientRect();clearTimeout(ticker);gt(Math.round((e.clientX-r.left)/r.width*(SLIDES.length-1)));if(playing)play();}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&document.getElementById('voice-panel').classList.contains('aai-open')){_vpClose();return;}
  if(['INPUT','TEXTAREA'].includes(e.target.tagName))return;
  if(e.key===' '){e.preventDefault();tg();}
  else if(e.key==='ArrowRight')gn();
  else if(e.key==='ArrowLeft')gp();
  else if(e.key==='v'||e.key==='V')ttsToggle();
});
gt(0);
</script>

<div id="voice-panel" role="region" aria-labelledby="vp-title">

</div>
<script>
/* ── AssemblyAI Voice Input + Q&A ────────────────────────────────────────── */
/* Set by the deploy step in README.md ("find-replace REPLACE_WITH_VERCEL_URL"). */
const _AAI='https://the-c.vercel.app';
const _aaiConfigured=()=>!!_AAI&&_AAI.indexOf('REPLACE_WITH')===-1;
const _TERMS=['pointer','malloc','undefined behaviour','mutex','deadlock','epoll',
  'mmap','fork','syscall','struct','volatile','restrict','pthread','semaphore',
  'spinlock','realloc','calloc','free list','stack frame','heap internals'];
/* AudioWorklet: capture Float32 mic audio → Int16 PCM at 16 kHz */
const _WL=`class P extends AudioWorkletProcessor{process(i){const c=i[0]?.[0];if(c){const b=new Int16Array(c.length);for(let j=0;j<c.length;j++){const s=Math.max(-1,Math.min(1,c[j]));b[j]=s<0?s*0x8000:s*0x7FFF;}this.port.postMessage(b.buffer,[b.buffer]);}return true;}}registerProcessor('aai-pcm',P);`;

let _ws=null,_ctx=null,_mic=null,_node=null,_buf=[],_on=false,_connecting=false,_asking=false;

const _$=id=>document.getElementById(id);
const _status=(t,live)=>{const e=_$('vp-status');if(e){e.textContent=t;e.className=live?'aai-live':'';}};
const _tx=t=>{const e=_$('vp-transcript');if(!e)return;e.textContent=t;e.className=t?'':'aai-empty';};
const _ans=h=>{const e=_$('vp-answer');if(!e)return;e.innerHTML=h;e.className=h?'aai-show':'';};
const _open=()=>_$('voice-panel')?.classList.add('aai-open');
function _vpClose(){_$('voice-panel')?.classList.remove('aai-open');if(_on)_stop();_$('micbtn')?.focus();}

function _micSupported(){
  return !!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia&&window.AudioContext&&window.AudioWorklet&&window.WebSocket);
}

async function _start(){
  if(_on||_connecting)return;
  if(!_aaiConfigured()){
    _open();_status('Backend not configured — see README setup guide');return;
  }
  if(!_micSupported()){
    _open();_status('Voice input isn’t supported in this browser — try typing a question instead');return;
  }
  if(location.protocol!=='https:'&&location.hostname!=='localhost'&&location.hostname!=='127.0.0.1'){
    _open();_status('Voice input requires HTTPS — try typing a question instead');return;
  }
  _connecting=true;
  _open();_status('Connecting\u2026');_tx('');_ans('');
  try{
    /* 1. Mint short-lived token (API key stays on server) */
    const tokCtl=new AbortController();
    const tokTimer=setTimeout(()=>tokCtl.abort(),10000);
    const tr=await fetch(_AAI+'/api/token',{signal:tokCtl.signal});
    clearTimeout(tokTimer);
    if(!tr.ok)throw new Error('Token failed ('+tr.status+')');
    const{token}=await tr.json();
    /* 2. Open WebSocket using token — no API key in browser */
    const p=new URLSearchParams({sample_rate:'16000',speech_model:'universal-3-5-pro',mode:'balanced',token});
    _TERMS.forEach(t=>p.append('keyterms_prompt',t));
    _ws=new WebSocket('wss://streaming.assemblyai.com/v3/ws?'+p);
    await new Promise((ok,fail)=>{
      _ws.onopen=ok;
      _ws.onerror=()=>fail(new Error('WebSocket failed'));
      setTimeout(()=>fail(new Error('Connection timed out')),10000);
    });
    _ws.onmessage=e=>{
      const m=JSON.parse(e.data);
      if(m.type!=='Turn')return;
      _tx(m.transcript);
      /* Auto-trigger Q&A when turn finalizes and ends with ? */
      if(m.end_of_turn&&m.transcript.trim().endsWith('?'))_ask(m.transcript.trim());
    };
    _ws.onclose=()=>{_on=false;_btn();_status('Disconnected');};
    /* 3. Capture mic → PCM16 via AudioWorklet → stream to AssemblyAI */
    _mic=await navigator.mediaDevices.getUserMedia({audio:{channelCount:1,echoCancellation:true,noiseSuppression:true}});
    _ctx=new AudioContext({sampleRate:16000});
    const bu=URL.createObjectURL(new Blob([_WL],{type:'application/javascript'}));
    await _ctx.audioWorklet.addModule(bu);URL.revokeObjectURL(bu);
    _node=new AudioWorkletNode(_ctx,'aai-pcm');
    _node.port.onmessage=ev=>{
      _buf.push(...new Int16Array(ev.data));
      /* Send ~200 ms chunks (3200 samples @ 16 kHz) — within AssemblyAI 50–1000 ms window */
      if(_buf.length>=3200&&_ws?.readyState===1)
        _ws.send(new Int16Array(_buf.splice(0,3200)).buffer);
    };
    _ctx.createMediaStreamSource(_mic).connect(_node);
    _on=true;_connecting=false;_btn();_status('Listening',true);
  }catch(err){
    _connecting=false;
    const msg=err.name==='AbortError'?'Token request timed out':err.name==='NotAllowedError'?'Microphone permission denied':err.message;
    _status('Error: '+msg);_clean();
  }
}

function _stop(){
  /* Always send Terminate — abandoned sessions stay billable until 3-hour cap */
  if(_ws?.readyState===1){_ws.send(JSON.stringify({type:'Terminate'}));_ws.close();}
  _clean();_status('Stopped');
}
function _clean(){_mic?.getTracks().forEach(t=>t.stop());_ctx?.close();_ws=_ctx=_mic=_node=null;_buf=[];_on=false;_connecting=false;_btn();}
function _btn(){const b=_$('micbtn');if(!b)return;b.textContent=_on?'\u23F9 Stop':'\uD83C\uDF99 Ask';b.className=_on?'aai-live':'';}
function _micToggle(){if(_connecting)return;_on?_stop():_start();}
window.addEventListener('beforeunload',()=>{if(_ws?.readyState===1)_ws.send(JSON.stringify({type:'Terminate'}));});

async function _ask(q){
  if(_asking)return;
  if(!_aaiConfigured()){
    _open();_status('Backend not configured \u2014 see README setup guide');return;
  }
  _asking=true;
  _open();_status('Answering\u2026');_ans('<em style="color:#8b949e">Thinking\u2026</em>');
  const ctl=new AbortController();
  const timer=setTimeout(()=>ctl.abort(),20000);
  try{
    const r=await fetch(_AAI+'/api/qa',{
      method:'POST',
      headers:{'content-type':'application/json'},
      body:JSON.stringify({question:q,volume:document.title}),
      signal:ctl.signal,
    });
    if(!r.ok)throw new Error('Q&A failed ('+r.status+')');
    const{answer}=await r.json();
    /* Minimal markdown: fenced code blocks + inline code. Escaped first, so this cannot inject HTML. */
    const h=answer
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```[\w]*\n?([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
    _ans('<p>'+h+'</p><p style="color:#8b949e;font-size:.75em">AI-generated \u2014 verify compiler/platform-specific details.</p>');
    _status(_on?'Listening':'Ready',_on);
  }catch(err){
    const msg=err.name==='AbortError'?'Request timed out \u2014 try again':err.message;
    _ans('<em style="color:#f85149">'+msg+'</em>');
    _status(_on?'Listening':'Ready',_on);
  }finally{
    clearTimeout(timer);_asking=false;
  }
}
document.getElementById('vp-form')?.addEventListener('submit',e=>{
  e.preventDefault();
  const input=document.getElementById('vp-input');
  const v=input.value.trim();
  if(!v)return;
  input.value='';
  _ask(v);
});

</script>
