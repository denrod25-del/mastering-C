<script>
const MK='<defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>';
const bx=(x,y,w,h,t,fc,tc,ec)=>`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4" fill="${fc}" stroke="${ec||fc}" stroke-width="0.8"/><text class="th" x="${x+w/2}" y="${y+h/2}" text-anchor="middle" dominant-baseline="central" fill="${tc}">${t}</text>`;
const tx=(x,y,t,a,c,sz)=>`<text class="${sz||'ts'}" x="${x}" y="${y}" text-anchor="${a||'middle'}" fill="${c||'#666'}">${t}</text>`;
const ar=(x1,y1,x2,y2,c)=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${c||'#888'}" stroke-width="1.8" marker-end="url(#ah)" fill="none" class="da"/>`;
const cd=(x,y,w,h,t)=>`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="5" fill="#f0f0ec" stroke="#ccc" stroke-width="0.5"/><text x="${x+w/2}" y="${y+h/2}" text-anchor="middle" dominant-baseline="central" style="font-family:monospace;font-size:12px;fill:#222">${t}</text>`;

const SLIDES=[
{title:"The virtual address space",
 narration:"Every process believes it owns the entire memory map. On 64-bit Linux that is 128 terabytes — but your program uses only a few megabytes. The kernel lives in the top half, invisible from user space. Below it: the stack growing downward, shared libraries mapped in the middle, the heap growing upward, your globals, your compiled code, and at address zero the NULL zone the OS never maps. Touch unmapped space and you get a segmentation fault immediately.",
 svg:`<svg width="100%" viewBox="0 0 820 270">${MK}
${tx(410,14,'64-bit Linux: 128 TB virtual address space — most of it unmapped')}
${bx(220,22,220,34,'kernel space','#e8e0ff','#5533bb','#9977ee')}
${bx(220,59,220,40,'stack','#fff3e0','#b26a00','#f5b942')}
${ar(374,66,374,93,'#c08000')}${tx(374,104,'↓ grows down','middle','#b26a00')}
${bx(220,106,220,22,'mmap / shared libs','#e8e8e8','#555','#bbb')}
<rect x="220" y="131" width="220" height="14" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="5 4"/>
${tx(330,142,'· · · unmapped · · ·','middle','#ccc')}
${bx(220,148,220,38,'heap','#e6f4ee','#1a7a40','#4caf79')}
${ar(374,182,374,156,'#1a7a40')}${tx(374,147,'↑ grows up','middle','#1a7a40')}
${bx(220,189,220,20,'.data / .bss','#e0f4f4','#0d6a6a','#4db3b3')}
${bx(220,212,220,20,'.text  (code)','#e0eeff','#1040a0','#5588ee')}
<rect x="220" y="235" width="220" height="10" rx="2" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/>
${tx(330,240,'NULL — never mapped','middle','#c62828')}
${tx(215,39,'0xFFFF…','end','#888')}${tx(215,142,'···','end','#bbb')}${tx(215,222,'0x0040…','end','#888')}${tx(215,240,'0x0000','end','#888')}
${tx(452,39,'kernel — never accessible from user code','start','#666')}
${tx(452,79,'grows down ↓ — default limit 8 MB','start','#666')}
${tx(452,117,'libc, libpthread, your .so files','start','#666')}
${tx(452,167,'grows up ↑ — malloc works here','start','#666')}
${tx(452,199,'initialized globals, BSS zeros','start','#666')}
${tx(452,222,'your compiled functions','start','#666')}
${tx(452,240,'dereference → SIGSEGV crash','start','#c62828')}
</svg>`},

{title:"Stack frames — how function calls build the stack",
 narration:"Every function call builds a stack frame by decrementing the stack pointer. The CPU saves the return address and the caller's saved base pointer, then allocates space for local variables between rbp and rsp. When g calls h, h's frame is pushed on top of g's toward lower addresses. On return, rbp is restored from its saved value, rsp is reset, and execution jumps to the saved return address. The stack pointer rsp always holds the lowest valid byte of the current frame.",
 svg:`<svg width="100%" viewBox="0 0 820 260">${MK}
${tx(410,14,'Stack grows toward lower addresses — most recent call is at top')}
${ar(76,26,76,244,'#888')}${tx(70,20,'high','end','#888')}${tx(70,250,'low','end','#888')}
${bx(104,26,496,20,'main()   args | locals | saved regs','#ebebeb','#555','#ccc')}
<line x1="104" y1="46" x2="600" y2="46" stroke="#aaa" stroke-width="1.2"/>
${tx(100,46,'rbp_main →','end','#666')}
${bx(104,46,496,20,'f()   saved rbp  |  return address','#d8f0f0','#0d6a6a','#4db3b3')}
${bx(104,66,496,38,'f()   local variables  — int x, char buf[16], ...','#deeeff','#1040a0','#88aaf0')}
<line x1="104" y1="104" x2="600" y2="104" stroke="#aaa" stroke-width="1.2"/>
${tx(100,104,'rbp_f →','end','#666')}
${bx(104,104,496,20,'g()   saved rbp  |  return address','#d8f0f0','#0d6a6a','#4db3b3')}
${bx(104,124,496,38,'g()   local variables  — double d, int n','#deeeff','#1040a0','#88aaf0')}
<line x1="104" y1="162" x2="600" y2="162" stroke="#aaa" stroke-width="1.2"/>
${tx(100,162,'rbp_g →','end','#666')}
${bx(104,162,496,20,'h()   saved rbp  |  return address','#d8f0f0','#0d6a6a','#4db3b3')}
${bx(104,182,496,22,'h()   locals','#deeeff','#1040a0','#88aaf0')}
${ar(92,218,92,196,'#888')}${tx(92,228,'rsp','middle','#555')}
${tx(614,36,'saved rbp = restore frame on return','start','#666')}
${tx(614,58,'return addr = where to jump back','start','#666')}
${tx(614,85,'locals here — no malloc needed','start','#666')}
${tx(614,225,'rsp = lowest valid stack byte','start','#666')}
</svg>`},

{title:"The spiral rule — reading complex declarations",
 narration:"Start at the identifier and spiral outward: move right first, then left, then step out. For 'int star open-paren star fp close-paren open-paren int star close-paren': fp is the name. Move right — hit a paren, stop. Move left — star, so fp is a pointer to something. Step out — parens mean it is callable. Move right — parameters: takes int-star. Move left — return type: int-star. In full: fp is a pointer to a function that takes an int-pointer and returns an int-pointer.",
 svg:`<svg width="100%" viewBox="0 0 820 244">${MK}
${tx(410,14,'Start at the identifier. Spiral: right first, then left, then step out.')}
<text class="th" x="410" y="64" text-anchor="middle" style="font-family:monospace;font-size:22px;fill:#222">int  *  (  *fp  )  (  int *  )</text>
<rect x="184" y="50" width="452" height="28" rx="4" fill="none" stroke="#ccc" stroke-width="0.8"/>
${[[1,'fp','start here — the identifier','#1565C0'],
   [2,'*fp','* on the left → pointer to something','#b26a00'],
   [3,'(*fp)','( ) around it → that something is callable','#1a7a40'],
   [4,'(*fp)(int*)','(int*) to the right → the function takes int*','#c62828'],
   [5,'int* (*fp)(int*)','int* on the far left → it returns int*','#333'],
].map(([n,expr,desc,col],i)=>{
  const y=96+i*28;
  return tx(62,y,n+'.','end',col)+
    `<text x="68" y="${y}" text-anchor="start" style="font-family:monospace;font-size:12px;fill:${col}">${expr}</text>`+
    tx(370,y,desc,'start');
}).join('')}
<rect x="48" y="228" width="724" height="14" rx="4" fill="#e0eeff" stroke="#88aaf0" stroke-width="0.8"/>
${tx(410,235,'fp  =  pointer  →  function(int*)  →  int*','middle','#1040a0')}
</svg>`},

{title:"Pointer arithmetic — scaled by the type's size",
 narration:"Adding 1 to a pointer never adds 1 byte. It adds sizeof of the pointed-to type. An int-star advances 4 bytes per step; a double-star advances 8. The exact formula is: new address equals old address plus n times sizeof of star-p. This is why arr-bracket-i and star-open-paren-arr-plus-i-close-paren produce identical machine code — the compiler generates the same multiplication automatically. The arithmetic is valid only within an array or one element past its end.",
 svg:`<svg width="100%" viewBox="0 0 820 212">${MK}
${tx(410,14,'int arr[5] — each element is 4 bytes — p = arr (an int*)')}
${[0,1,2,3,4].map(i=>{const x=60+i*136,w=132;return bx(x,24,w,46,`${[10,20,30,40,50][i]}`,i===0?'#fff3e0':'#e0eeff',i===0?'#b26a00':'#1040a0',i===0?'#f5b942':'#88aaf0')+tx(x+66,78,'arr['+i+']','middle')+tx(x+66,96,'0x'+`${(0x1000+i*4).toString(16).toUpperCase()}`,'middle','#888')}).join('')}
${ar(60,110,740,110,'#999')}
${tx(410,125,'each +1 on int* advances 4 bytes — scaled by sizeof(*p) = sizeof(int) = 4')}
${[['p + 0','== 0x1000  →  arr[0]  →  10'],
   ['p + 1','== 0x1004  →  arr[1]  →  20   (+4 bytes)'],
   ['p + 3','== 0x100C  →  arr[3]  →  40   (+12 bytes)'],
   ['*(p+4)','== 0x1010  →  arr[4]  →  50   same as arr[4]'],
].map(([expr,result],i)=>cd(52,138+i*16,170,14,expr)+tx(228,150+i*16,'= '+result,'start','#555')).join('')}
</svg>`},

{title:"Strict aliasing — why type-punning breaks compilers",
 narration:"The strict aliasing rule: a value may only be read through a pointer of a compatible type — with one exception, char pointers can alias anything. The compiler exploits this: if it sees a float written and then an int read at the same address via incompatible pointer types, it assumes they are separate objects, may cache the float's bits, and returns the wrong value. The two legal escapes are memcpy and a union. Compile with -fno-strict-aliasing to disable this optimization.",
 svg:`<svg width="100%" viewBox="0 0 820 256">${MK}
${tx(410,14,'Compiler assumes float* and int* never point to the same location')}
<rect x="36" y="22" width="330" height="80" rx="5" fill="none" stroke="#e08888" stroke-width="1.5"/>
${['float f = 1.0f;','int *ip = (int*)&f;   // ILLEGAL','f = 2.0f;','return *ip;           // ??'].map((t,i)=>cd(40,26+i*18,322,16,t)).join('')}
${tx(200,110,'strict aliasing violation','middle','#c62828')}
${ar(372,62,436,62,'#888')}${tx(404,54,'at -O2','middle','#888')}
<rect x="440" y="22" width="344" height="80" rx="5" fill="#f9f9f7" stroke="#ccc" stroke-width="0.8"/>
${['// compiler reasons:','// ip and &f cannot overlap','// f=2.0f has NO effect on *ip','// return original 1.0f bits (WRONG)'].map((t,i)=>`<text x="448" y="${38+i*18}" text-anchor="start" style="font-family:monospace;font-size:12px;fill:#666">${t}</text>`).join('')}
<rect x="440" y="106" width="344" height="18" rx="4" fill="#fff8e0" stroke="#f0c060" stroke-width="0.8"/>
${tx(612,115,'wrong value returned to the caller!','middle','#a07010')}
${tx(410,136,'Legal escape routes from strict aliasing:')}
${cd(44,146,350,20,'memcpy(&i, &f, sizeof f);   // always safe')}
${cd(408,146,368,20,'union{float f;int i;}u={.f=f};  // C11 OK')}
<rect x="44" y="174" width="732" height="18" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/>
${tx(410,183,'char* is the universal exception — it is always allowed to alias any type','middle','#1a7a40')}
${cd(44,198,350,18,'-fno-strict-aliasing  disables this (costs performance)')}
${cd(408,198,368,18,'-fsanitize=undefined  catches it at runtime')}
</svg>`},

{title:"System V AMD64 calling convention",
 narration:"The first six integer or pointer arguments go into registers in this exact order: rdi, rsi, rdx, rcx, r8, r9. The return value goes in rax. Arguments beyond the sixth go on the stack in reverse order. Caller-saved registers — those the callee may freely overwrite — are rax through r11. Callee-saved registers — which must be restored before returning — are rbp, rbx, and r12 through r15. This same convention governs every C function on Linux and macOS, and the Linux kernel's syscall interface mirrors the first six registers.",
 svg:`<svg width="100%" viewBox="0 0 820 238">${MK}
${tx(410,14,'System V AMD64 ABI — first 6 integer/pointer arguments go in registers')}
${tx(194,32,'argument','middle')}${tx(360,32,'register','middle')}${tx(618,32,'callee-saved — must restore before ret','middle')}
${[['arg 1','rdi'],['arg 2','rsi'],['arg 3','rdx'],['arg 4','rcx'],['arg 5','r8'],['arg 6','r9']].map(([arg,reg],i)=>{
  const y=44+i*27;
  return tx(194,y+13,arg,'middle')+
    bx(280,y,160,22,reg,'#deeeff','#1040a0','#88aaf0');
}).join('')}
${[['rbp','frame pointer'],['rbx','general purpose'],['r12','general purpose'],['r13','general purpose'],['r14','general purpose'],['r15','general purpose']].map(([reg,desc],i)=>{
  const y=44+i*27;
  return bx(490,y,90,22,reg,'#e6f4ee','#1a7a40','#4caf79')+
    tx(592,y+13,desc,'start','#666');
}).join('')}
<line x1="476" y1="40" x2="476" y2="218" stroke="#ddd" stroke-width="0.8" stroke-dasharray="4 3"/>
<rect x="44" y="210" width="732" height="22" rx="5" fill="#e0eeff" stroke="#88aaf0" stroke-width="0.8"/>
${tx(410,221,'return value → rax   |   args 7+ pushed to stack (reverse order)   |   syscall uses same first 6','middle','#1040a0')}
</svg>`},

{title:"Alignment and padding — why structs are bigger than you think",
 narration:"Every type has an alignment requirement: the set of valid addresses where it is allowed to live. A char needs no alignment, an int needs 4-byte alignment, a double needs 8. When you put a char followed by an int in a struct the compiler silently inserts 3 bytes of padding between them. The total struct size must also be a multiple of the strictest member's alignment. Reordering members from largest to smallest minimizes padding — which matters enormously in large arrays of structs.",
 svg:`<svg width="100%" viewBox="0 0 820 218">${MK}
${tx(410,14,'struct { char c; int i; double d; }  —  sizeof = 16 bytes, not 13')}
${[{x:46,w:26,fc:'#deeeff',tc:'#1040a0',l:'c',s:'1B'},
   {x:72,w:78,fc:'#f0f0ec',tc:'#666',l:'padding',s:'3B'},
   {x:150,w:104,fc:'#fff3e0',tc:'#b26a00',l:'i',s:'4B'},
   {x:254,w:208,fc:'#d8f0f0',tc:'#0d6a6a',l:'d',s:'8B'},
].map(p=>`<rect x="${p.x}" y="24" width="${p.w}" height="44" rx="4" fill="${p.fc}" stroke="${p.fc}" stroke-width="0.8"/>`+
  `<text class="${p.w<60?'ts':'th'}" x="${p.x+p.w/2}" y="46" text-anchor="middle" dominant-baseline="central" fill="${p.tc}">${p.l}</text>`+
  tx(p.x+p.w/2,76,p.s,'middle')).join('')}
${[[46,'0'],[72,'1'],[150,'4'],[254,'8'],[462,'16']].map(([x,off])=>tx(x,88,''+off,'start','#888')).join('')}
${tx(410,100,'alignment:  char = 1  |  int = 4  |  double = 8  |  pointer = 8  |  struct total = multiple of largest')}
${tx(410,116,'total size must be a multiple of 8 (double alignment) — so 13 bytes rounds up to 16')}
${tx(410,132,'reorder largest-first to push padding to the trailing end:')}
${[{x:46,w:208,fc:'#d8f0f0',tc:'#0d6a6a',l:'d (8B)'},
   {x:254,w:104,fc:'#fff3e0',tc:'#b26a00',l:'i (4B)'},
   {x:358,w:26,fc:'#deeeff',tc:'#1040a0',l:'c'},
   {x:384,w:78,fc:'#f0f0ec',tc:'#666',l:'3B pad'},
].map(p=>`<rect x="${p.x}" y="141" width="${p.w}" height="30" rx="4" fill="${p.fc}" stroke="${p.fc}" stroke-width="0.8"/>`+
  `<text class="${p.w<50?'ts':'th'}" x="${p.x+p.w/2}" y="156" text-anchor="middle" dominant-baseline="central" fill="${p.tc}">${p.l}</text>`).join('')}
${tx(410,186,'still 16 bytes total — but now only trailing padding (compiler can sometimes omit it)')}
${cd(44,194,732,20,'__attribute__((packed)) removes all padding — causes misaligned memory faults on ARM')}
</svg>`},

{title:"UB as an optimization license",
 narration:"Undefined behavior is not merely unpredictable — it is a formal optimization contract. When the compiler sees a pointer dereference followed by a null check, it reasons: if the pointer were null, the dereference would be UB; correct programs contain no UB; therefore the pointer is not null; therefore the null check is always false; therefore the check can be deleted. At -O2 your safety guard disappears entirely. This is why UB is a security vulnerability, not merely a correctness bug.",
 svg:`<svg width="100%" viewBox="0 0 820 250">${MK}
${tx(410,14,'At -O2 the compiler deletes the null check — the dereference already proved p is not null')}

// ── Text-to-Speech (Web Speech API) ──────────────────────────────────────────
let ttsOn = false, ttsUtter = null, ttsVoice = null;

function ttsPickVoice() {
  const vs = speechSynthesis.getVoices();
  if (!vs.length) return null;
  return vs.find(v => /en[-_](US|GB)/i.test(v.lang) && /natural|neural|premium/i.test(v.name))
      || vs.find(v => /en[-_](US|GB)/i.test(v.lang))
      || vs.find(v => v.lang.startsWith('en'))
      || vs[0];
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => { ttsVoice = ttsPickVoice(); };
  ttsVoice = ttsPickVoice();
}

function ttsSpeak(text, onEnd) {
  if (!ttsOn || !('speechSynthesis' in window)) { if (onEnd) onEnd(); return; }
  speechSynthesis.cancel();
  const clean = text
    .replace(/->/g, ' arrow ')
    .replace(/&/g, ' ampersand ')
    .replace(/\*p\b/g, 'star p')
    .replace(/`/g, '')
    .replace(/\s+/g, ' ').trim();
  ttsUtter = new SpeechSynthesisUtterance(clean);
  if (ttsVoice) ttsUtter.voice = ttsVoice;
  ttsUtter.rate = 0.95;
  ttsUtter.pitch = 1.0;
  if (onEnd) ttsUtter.onend = onEnd;
  speechSynthesis.speak(ttsUtter);
}

function ttsStop() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
}

function ttsToggle() {
  ttsOn = !ttsOn;
  const b = document.getElementById('ttsbtn');
  if (ttsOn) {
    b.textContent = '🔊 Voice On';
    b.style.background = '#e6f4ee';
    b.style.borderColor = '#4caf79';
    ttsSpeak(SLIDES[vi].title + '. ' + SLIDES[vi].narration, null);
  } else {
    b.textContent = '🔇 Voice Off';
    b.style.background = '';
    b.style.borderColor = '';
    ttsStop();
  }
}
window.addEventListener('beforeunload', ttsStop);

let vi=0,playing=false,ticker=null,ctick=null;

function goTo(n){
  vi=Math.max(0,Math.min(n,SLIDES.length-1));
  const s=SLIDES[vi];
  document.getElementById('stitle').textContent=s.title;
  document.getElementById('scount').textContent=(vi+1)+' / '+SLIDES.length;
  const d=document.getElementById('diag');
  d.style.opacity='0';
  d.innerHTML=s.svg;
  setTimeout(()=>d.style.opacity='1',30);
  document.getElementById('pfill').style.width=(vi/(SLIDES.length-1)*100)+'%';
  clearInterval(ctick);
  let pos=0,full=s.narration;
  document.getElementById('narr').textContent='';
  ctick=setInterval(()=>{
    if(pos<full.length) document.getElementById('narr').textContent=full.slice(0,++pos);
    else clearInterval(ctick);
  },18);
  ttsStop();
  if(ttsOn){
    ttsSpeak(s.title+'. '+full,()=>{if(playing){clearTimeout(ticker);ticker=setTimeout(()=>{vi<SLIDES.length-1?goTo(vi+1):pause();},1200);}});
    if(playing)clearTimeout(ticker);
  } else if(playing){clearTimeout(ticker);ticker=setTimeout(()=>{vi<SLIDES.length-1?goTo(vi+1):pause();},Math.max(9000,full.length*56));}
}

function play(){playing=true;document.getElementById('playbtn').textContent='⏸ Pause';
  if(ttsOn){ttsSpeak(SLIDES[vi].title+'. '+SLIDES[vi].narration,()=>{if(playing)ticker=setTimeout(()=>{vi<SLIDES.length-1?goTo(vi+1):pause();},1200);});}
  else{ticker=setTimeout(()=>{vi<SLIDES.length-1?goTo(vi+1):pause();},Math.max(9000,SLIDES[vi].narration.length*56));}}
function pause(){playing=false;clearTimeout(ticker);ttsStop();document.getElementById('playbtn').textContent='▶ Play';}
function toggle(){playing?pause():play();}
function goNext(){clearTimeout(ticker);goTo(vi+1);if(playing)play();}
function goPrev(){clearTimeout(ticker);goTo(vi-1);if(playing)play();}
function pgClick(e){const r=document.getElementById('pbar').getBoundingClientRect();clearTimeout(ticker);goTo(Math.round((e.clientX-r.left)/r.width*(SLIDES.length-1)));if(playing)play();}

document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(e.target.tagName))return;
  if(e.key===' '){e.preventDefault();toggle();}
  else if(e.key==='ArrowRight')goNext();
  else if(e.key==='ArrowLeft')goPrev();
  else if(e.key==='v'||e.key==='V')ttsToggle();
});

goTo(0);
</script>

<div id="voice-panel">
  <div id="vp-bar">
    <span id="vp-status">Ready</span>
    <button id="vp-close" onclick="_vpClose()" aria-label="Close">&#x2715;</button>
  </div>
  <div id="vp-transcript" class="aai-empty"></div>
  <div id="vp-answer"></div>
  <div id="vp-footer">Powered by AssemblyAI &middot; universal-3-5-pro</div>
</div>
<script>
/* ── AssemblyAI Voice Input + Q&A ────────────────────────────────────────── */
const _AAI='https://the-c.vercel.app';
const _TERMS=['pointer','malloc','undefined behaviour','mutex','deadlock','epoll',
  'mmap','fork','syscall','struct','volatile','restrict','pthread','semaphore',
  'spinlock','realloc','calloc','free list','stack frame','heap internals'];
/* AudioWorklet: capture Float32 mic audio → Int16 PCM at 16 kHz */
const _WL=`class P extends AudioWorkletProcessor{process(i){const c=i[0]?.[0];if(c){const b=new Int16Array(c.length);for(let j=0;j<c.length;j++){const s=Math.max(-1,Math.min(1,c[j]));b[j]=s<0?s*0x8000:s*0x7FFF;}this.port.postMessage(b.buffer,[b.buffer]);}return true;}}registerProcessor('aai-pcm',P);`;

let _ws=null,_ctx=null,_mic=null,_node=null,_buf=[],_on=false;

const _$=id=>document.getElementById(id);
const _status=(t,live)=>{const e=_$('vp-status');if(e){e.textContent=t;e.className=live?'aai-live':'';}};
const _tx=t=>{const e=_$('vp-transcript');if(!e)return;e.textContent=t;e.className=t?'':'aai-empty';};
const _ans=h=>{const e=_$('vp-answer');if(!e)return;e.innerHTML=h;e.className=h?'aai-show':'';};
const _open=()=>_$('voice-panel')?.classList.add('aai-open');
function _vpClose(){_$('voice-panel')?.classList.remove('aai-open');if(_on)_stop();}

async function _start(){
  if(_on)return;
  if(_AAI==='https://the-c.vercel.app'){
    _open();_status('Backend not configured — see setup guide');return;
  }
  _open();_status('Connecting\u2026');_tx('');_ans('');
  try{
    /* 1. Mint short-lived token (API key stays on server) */
    const tr=await fetch(_AAI+'/api/token');
    if(!tr.ok)throw new Error('Token failed ('+tr.status+')');
    const{token}=await tr.json();
    /* 2. Open WebSocket using token — no API key in browser */
    const p=new URLSearchParams({sample_rate:'16000',speech_model:'universal-3-5-pro',mode:'balanced',token});
    _TERMS.forEach(t=>p.append('keyterms_prompt',t));
    _ws=new WebSocket('wss://streaming.assemblyai.com/v3/ws?'+p);
    await new Promise((ok,fail)=>{
      _ws.onopen=ok;
      _ws.onerror=()=>fail(new Error('WebSocket failed'));
      setTimeout(()=>fail(new Error('Connection timed out')),10000);
    });
    _ws.onmessage=e=>{
      const m=JSON.parse(e.data);
      if(m.type!=='Turn')return;
      _tx(m.transcript);
      /* Auto-trigger Q&A when turn finalizes and ends with ? */
      if(m.end_of_turn&&m.transcript.trim().endsWith('?'))_ask(m.transcript.trim());
    };
    _ws.onclose=()=>{_on=false;_btn();_status('Disconnected');};
    /* 3. Capture mic → PCM16 via AudioWorklet → stream to AssemblyAI */
    _mic=await navigator.mediaDevices.getUserMedia({audio:{channelCount:1,echoCancellation:true,noiseSuppression:true}});
    _ctx=new AudioContext({sampleRate:16000});
    const bu=URL.createObjectURL(new Blob([_WL],{type:'application/javascript'}));
    await _ctx.audioWorklet.addModule(bu);URL.revokeObjectURL(bu);
    _node=new AudioWorkletNode(_ctx,'aai-pcm');
    _node.port.onmessage=ev=>{
      _buf.push(...new Int16Array(ev.data));
      /* Send ~200 ms chunks (3200 samples @ 16 kHz) — within AssemblyAI 50–1000 ms window */
      if(_buf.length>=3200&&_ws?.readyState===1)
        _ws.send(new Int16Array(_buf.splice(0,3200)).buffer);
    };
    _ctx.createMediaStreamSource(_mic).connect(_node);
    _on=true;_btn();_status('Listening',true);
  }catch(err){_status('Error: '+err.message);_clean();}
}

function _stop(){
  /* Always send Terminate — abandoned sessions stay billable until 3-hour cap */
  if(_ws?.readyState===1){_ws.send(JSON.stringify({type:'Terminate'}));_ws.close();}
  _clean();_status('Stopped');
}
function _clean(){_mic?.getTracks().forEach(t=>t.stop());_ctx?.close();_ws=_ctx=_mic=_node=null;_buf=[];_on=false;_btn();}
function _btn(){const b=_$('micbtn');if(!b)return;b.textContent=_on?'\u23F9 Stop':'\uD83C\uDF99 Ask';b.className=_on?'aai-live':'';}
function _micToggle(){_on?_stop():_start();}
window.addEventListener('beforeunload',()=>{if(_ws?.readyState===1)_ws.send(JSON.stringify({type:'Terminate'}));});

async function _ask(q){
  _status('Answering\u2026');_ans('<em style="color:#8b949e">Thinking\u2026</em>');
  try{
    const r=await fetch(_AAI+'/api/qa',{
      method:'POST',
      headers:{'content-type':'application/json'},
      body:JSON.stringify({question:q,volume:document.title}),
    });
    if(!r.ok)throw new Error('Q&A failed ('+r.status+')');
    const{answer}=await r.json();
    /* Minimal markdown: fenced code blocks + inline code */
    const h=answer
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```[\w]*\n?([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
    _ans('<p>'+h+'</p>');
    _status(_on?'Listening':'Ready',_on);
  }catch(err){
    _ans('<em style="color:#f85149">'+err.message+'</em>');
    _status(_on?'Listening':'Ready',_on);
  }
}

</script>
</body>
</html>
