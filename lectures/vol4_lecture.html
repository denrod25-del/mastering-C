{title:"The four phases of compilation",narration:"Your C source does not go directly to machine code in one step. Four separate programs run in sequence. The C preprocessor expands macros, processes hash-include directives, and evaluates hash-ifdef conditions, producing a single large C file with no preprocessor directives. The compiler then parses that file, type-checks it, optimizes it, and emits assembly text. The assembler translates mnemonics to opcodes and produces a relocatable object file. Finally the linker resolves all symbolic references between object files, fixes up addresses, and produces the executable.",svg:`<svg width="100%" viewBox="0 0 840 248"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Four separate programs transform your .c source into a runnable executable</text><rect x="14" y="36" width="76" height="44" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.3"/><text x="52" y="58" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:500;fill:#555;font-family:monospace">file.c</text><line x1="91" y1="58" x2="102" y2="58" stroke="#aaa" stroke-width="2" marker-end="url(#ah)"/><rect x="104" y="36" width="82" height="44" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="1.3"/><text x="145" y="58" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:700;fill:#1040a0">cpp</text><line x1="187" y1="58" x2="198" y2="58" stroke="#aaa" stroke-width="2" marker-end="url(#ah)"/><rect x="200" y="36" width="76" height="44" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.3"/><text x="238" y="58" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:500;fill:#555;font-family:monospace">file.i</text><line x1="277" y1="58" x2="288" y2="58" stroke="#aaa" stroke-width="2" marker-end="url(#ah)"/><rect x="290" y="36" width="82" height="44" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="1.3"/><text x="331" y="58" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:700;fill:#0d6a6a">cc¹</text><line x1="373" y1="58" x2="384" y2="58" stroke="#aaa" stroke-width="2" marker-end="url(#ah)"/><rect x="386" y="36" width="76" height="44" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.3"/><text x="424" y="58" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:500;fill:#555;font-family:monospace">file.s</text><line x1="463" y1="58" x2="474" y2="58" stroke="#aaa" stroke-width="2" marker-end="url(#ah)"/><rect x="476" y="36" width="82" height="44" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="1.3"/><text x="517" y="58" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:700;fill:#b26a00">as</text><line x1="559" y1="58" x2="570" y2="58" stroke="#aaa" stroke-width="2" marker-end="url(#ah)"/><rect x="572" y="36" width="76" height="44" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.3"/><text x="610" y="58" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:500;fill:#555;font-family:monospace">file.o</text><line x1="649" y1="58" x2="660" y2="58" stroke="#aaa" stroke-width="2" marker-end="url(#ah)"/><rect x="662" y="36" width="82" height="44" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.3"/><text x="703" y="58" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:700;fill:#1a7a40">ld</text><line x1="745" y1="58" x2="756" y2="58" stroke="#aaa" stroke-width="2" marker-end="url(#ah)"/><rect x="758" y="36" width="82" height="44" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.3"/><text x="799" y="58" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:500;fill:#555;font-family:monospace">a.out</text><text x="52" y="108" text-anchor="middle" style="font-size:10px;fill:#888">your source text</text><text x="134" y="108" text-anchor="middle" style="font-size:10px;fill:#888">expand #include</text><text x="134" y="122" text-anchor="middle" style="font-size:10px;fill:#888">substitute #define</text><text x="134" y="136" text-anchor="middle" style="font-size:10px;fill:#888">evaluate #ifdef</text><text x="235" y="108" text-anchor="middle" style="font-size:10px;fill:#888">pure C, no directives</text><text x="314" y="108" text-anchor="middle" style="font-size:10px;fill:#888">parse → AST</text><text x="314" y="122" text-anchor="middle" style="font-size:10px;fill:#888">type-check</text><text x="314" y="136" text-anchor="middle" style="font-size:10px;fill:#888">optimize → .s</text><text x="416" y="108" text-anchor="middle" style="font-size:10px;fill:#888">x86-64 assembly text</text><text x="496" y="108" text-anchor="middle" style="font-size:10px;fill:#888">mnemonics → opcodes</text><text x="496" y="122" text-anchor="middle" style="font-size:10px;fill:#888">build symbol table</text><text x="496" y="136" text-anchor="middle" style="font-size:10px;fill:#888">relocatable binary</text><text x="590" y="108" text-anchor="middle" style="font-size:10px;fill:#888">ELF object: code+data</text><text x="590" y="122" text-anchor="middle" style="font-size:10px;fill:#888">+ relocation records</text><text x="680" y="108" text-anchor="middle" style="font-size:10px;fill:#888">resolve symbols</text><text x="680" y="122" text-anchor="middle" style="font-size:10px;fill:#888">fix addresses</text><text x="680" y="136" text-anchor="middle" style="font-size:10px;fill:#888">combine all .o</text><text x="764" y="108" text-anchor="middle" style="font-size:10px;fill:#888">executable</text><text x="764" y="122" text-anchor="middle" style="font-size:10px;fill:#888">ELF binary</text><rect x="20" y="148" width="800" height="22" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="159" text-anchor="middle" style="font-size:12px;fill:#1040a0">cpp: gcc -E | cc1: gcc -S | as: gcc -c | ld: gcc (final link) — gcc is just a driver calling these programs</text><rect x="20" y="176" width="800" height="22" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="187" text-anchor="middle" style="font-size:12px;fill:#b26a00">Each phase has its own input/output format: .c → .i → .s → .o → executable (ELF on Linux, Mach-O on macOS)</text><rect x="20" y="204" width="800" height="36" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="218" text-anchor="middle" style="font-size:12px;fill:#1a7a40">gcc -save-temps main.c  —  saves all intermediate files so you can inspect each phase</text><text x="420" y="232" text-anchor="middle" style="font-size:12px;fill:#1a7a40">gcc -E file.c  —  stop after preprocessing  ·  gcc -S file.c  —  stop after compilation</text></svg>`},
{title:"The C preprocessor \u2014 textual transformation only",narration:"The preprocessor runs before the compiler and operates purely at the textual level \u2014 it has no knowledge of types, scope, or semantics. Hash-include physically inserts the named file at that point. Hash-define creates a text substitution rule. Hash-ifdef conditionally includes or excludes blocks of text based on whether a macro is defined. The output is a single stream of C text with all directives replaced. Because it is purely textual, the preprocessor can produce nonsensical C that the compiler will then reject with confusing error messages tracing back into headers.",svg:`<svg width="100%" viewBox="0 0 840 250"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">The preprocessor runs before the compiler — it only does text substitution and inclusion</text><text x="110" y="30" text-anchor="middle" style="font-size:12px;fill:#444">Source (before cpp)</text><text x="570" y="30" text-anchor="middle" style="font-size:12px;fill:#444">After preprocessing</text><text x="22" y="42" text-anchor="start" style="font-family:monospace;font-size:11px;fill:#c62828">#include &lt;stdio.h&gt;</text><text x="440" y="42" text-anchor="start" style="font-family:monospace;font-size:11px;fill:#888">/* ... 800 lines of stdio.h ... */</text><text x="22" y="59" text-anchor="start" style="font-family:monospace;font-size:11px;fill:#c62828">#define MAX 100</text><text x="440" y="59" text-anchor="start" style="font-family:monospace;font-size:11px;fill:#888">/* MAX removed → text replaced */</text><text x="22" y="76" text-anchor="start" style="font-family:monospace;font-size:11px;fill:#c62828">#define SQ(x) ((x)*(x))</text><text x="440" y="76" text-anchor="start" style="font-family:monospace;font-size:11px;fill:#888">/* SQ removed → text replaced */</text><text x="22" y="93" text-anchor="start" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="440" y="93" text-anchor="start" style="font-family:monospace;font-size:11px;fill:#1040a0"></text><text x="22" y="110" text-anchor="start" style="font-family:monospace;font-size:11px;fill:#c62828">#ifdef DEBUG</text><text x="440" y="110" text-anchor="start" style="font-family:monospace;font-size:11px;fill:#888">/* block absent (DEBUG not defined) */</text><text x="22" y="127" text-anchor="start" style="font-family:monospace;font-size:11px;fill:#222">  puts("debug mode");</text><text x="440" y="127" text-anchor="start" style="font-family:monospace;font-size:11px;fill:#1040a0"></text><text x="22" y="144" text-anchor="start" style="font-family:monospace;font-size:11px;fill:#c62828">#endif</text><text x="440" y="144" text-anchor="start" style="font-family:monospace;font-size:11px;fill:#1040a0"></text><text x="22" y="161" text-anchor="start" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="440" y="161" text-anchor="start" style="font-family:monospace;font-size:11px;fill:#1040a0"></text><text x="22" y="178" text-anchor="start" style="font-family:monospace;font-size:11px;fill:#222">int arr[MAX];</text><text x="440" y="178" text-anchor="start" style="font-family:monospace;font-size:11px;fill:#888">int arr[100];          /* MAX → 100 */</text><text x="22" y="195" text-anchor="start" style="font-family:monospace;font-size:11px;fill:#222">int v = SQ(3+1);</text><text x="440" y="195" text-anchor="start" style="font-family:monospace;font-size:11px;fill:#1a7a40">int v = ((3+1)*(3+1)); /* SQ expansion */</text><rect x="14" y="34" width="400" height="178" rx="4" fill="none" stroke="#e08888" stroke-width="1.2"/><rect x="428" y="34" width="400" height="178" rx="4" fill="none" stroke="#4caf79" stroke-width="1.2"/><line x1="416" y1="122" x2="428" y2="122" stroke="#888" stroke-width="2.2" marker-end="url(#ah)" fill="none" class="da"/><text x="422" y="114" text-anchor="middle" style="font-size:10px;fill:#888">cpp</text><rect x="20" y="220" width="800" height="26" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="233" text-anchor="middle" style="font-size:12px;fill:#b26a00">The preprocessor has no type system — it is purely textual. It cannot see types or scopes. This is why macros are dangerous.</text></svg>`},
{title:"Macros \u2014 the dangers of text substitution",narration:"Function-like macros look like function calls but expand as raw text before the compiler sees the code. This creates two classic traps. First, missing parentheses: if you write hash-define SQUARE of x as x times x, then SQUARE of one-plus-two expands to one-plus-two times one-plus-two which equals five, not nine. Always wrap both the argument and the whole result in parentheses. Second, double evaluation: if a macro argument has a side effect like increment, and the argument appears twice in the expansion, the side effect runs twice. Prefer static inline functions for anything beyond simple constants.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Macros are text substitution — they expand before the compiler sees them</text><rect x="20" y="24" width="800" height="88" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="36" text-anchor="middle" style="font-size:12px;fill:#c62828">Trap 1: missing parentheses around arguments and result</text><rect x="26" y="46" width="780" height="90" rx="4" fill="#ffe0e0" stroke="#fcc" stroke-width="0.8"/><text x="34" y="59" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">#define SQUARE(x)  x*x                 // WRONG: no parens</text><text x="34" y="75" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int a = SQUARE(1+2);                   // expands to: 1+2*1+2 = 5  (not 9!)</text><text x="34" y="91" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="34" y="107" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">#define SQUARE(x)  ((x)*(x))           // CORRECT: parens around x and whole result</text><text x="34" y="123" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int b = SQUARE(1+2);                   // expands to: ((1+2)*(1+2)) = 9  ✓</text><rect x="20" y="120" width="800" height="68" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="132" text-anchor="middle" style="font-size:12px;fill:#b26a00">Trap 2: double evaluation — side effects run twice</text><rect x="26" y="142" width="780" height="74" rx="4" fill="#fff3e0" stroke="#e8c878" stroke-width="0.8"/><text x="34" y="155" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">#define MAX(a,b)  ((a)>(b)?(a):(b))    // looks fine — but:</text><text x="34" y="171" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int x = 3, y = 5;</text><text x="34" y="187" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int m = MAX(x++, y++);                 // expands to: ((x++)>(y++)?(x++):(y++))</text><text x="34" y="203" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">                                       // x or y incremented TWICE!  use inline instead</text><rect x="20" y="196" width="800" height="54" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="208" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Prefer inline functions over function-like macros: same speed, full type safety</text><rect x="26" y="218" width="780" height="26" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="34" y="231" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">static inline int max(int a, int b) { return a > b ? a : b; }  // typed, no double-eval</text></svg>`},
{title:"Header guards and #pragma once",narration:"A header file can be included more than once in the same translation unit if multiple other headers also include it. Without protection, every struct declaration, every typedef, and every inline function definition in that header would appear twice, causing redeclaration errors. The traditional fix is a header guard: wrap the entire header body in hash-ifndef and hash-define using a unique macro name derived from the filename, ending with hash-endif. The modern alternative is hash-pragma-once, a single line at the top of the header that tells the preprocessor to never process this file more than once. All major compilers support it.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Header guards prevent a header from being processed more than once per translation unit</text><rect x="20" y="24" width="800" height="82" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="36" text-anchor="middle" style="font-size:12px;fill:#c62828">Without guards — double inclusion causes redeclaration errors</text><text x="130" y="52" text-anchor="middle" style="font-size:11px;fill:#444">main.c</text><rect x="26" y="60" width="218" height="42" rx="4" fill="#ffe0e0" stroke="#fcc" stroke-width="0.8"/><text x="34" y="73" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">#include "point.h"</text><text x="34" y="89" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">#include "canvas.h"</text><text x="360" y="68" text-anchor="middle" style="font-size:10px;fill:#888">canvas.h also
#includes point.h</text><text x="570" y="52" text-anchor="middle" style="font-size:11px;fill:#c62828">point.h (included twice)</text><rect x="432" y="60" width="376" height="42" rx="4" fill="#ffe0e0" stroke="#fcc" stroke-width="0.8"/><text x="440" y="73" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">struct Point { int x,y; };  // 1st time OK</text><text x="440" y="89" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">struct Point { int x,y; };  // ERROR: redecl!</text><rect x="20" y="114" width="800" height="82" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="126" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Solution 1: header guard macro pattern</text><rect x="26" y="134" width="378" height="74" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="34" y="147" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">#ifndef POINT_H           // if not yet defined...</text><text x="34" y="163" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">#define POINT_H           // ...define the guard...</text><text x="34" y="179" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">struct Point { int x,y; };</text><text x="34" y="195" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">#endif  // POINT_H        // ...and close it</text><rect x="432" y="134" width="378" height="90" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="440" y="147" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">// Solution 2: #pragma once (non-standard, but</text><text x="440" y="163" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">// supported by all major compilers since 2000)</text><text x="440" y="179" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="440" y="195" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">#pragma once</text><text x="440" y="211" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">struct Point { int x,y; };</text><rect x="20" y="204" width="800" height="22" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="215" text-anchor="middle" style="font-size:12px;fill:#1040a0">On second #include: #ifndef POINT_H is false — the entire header body is skipped</text><rect x="20" y="232" width="800" height="16" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="240" text-anchor="middle" style="font-size:12px;fill:#b26a00">#pragma once is simpler and avoids guard name collisions, but header guards are in the C standard</text></svg>`},
{title:"X-macros \u2014 DRY code generation from a single source of truth",narration:"An X-macro is a pattern where you define a list of data as a macro that takes a placeholder macro X as its argument, and then expand the list differently by redefining X each time. You define your data exactly once and use it to generate an enum, a string table, a switch statement, a dispatch table, or any combination thereof. Adding a new entry to the list automatically updates every generated artifact. This eliminates the error-prone task of keeping parallel lists in sync. X-macros are widely used in embedded systems, error handling frameworks, and protocol implementations where data and code must stay synchronized.",svg:`<svg width="100%" viewBox="0 0 840 306"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">X-macros: define data exactly once, generate multiple related artifacts from it</text><rect x="20" y="24" width="800" height="60" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="36" text-anchor="middle" style="font-size:12px;fill:#1040a0">Step 1 — define your data table once, using a macro X() as a placeholder</text><rect x="26" y="44" width="780" height="74" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="34" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">#define ERROR_LIST(X)  \\</text><text x="34" y="73" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    X(OK,       0, "success")  \\</text><text x="34" y="89" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    X(ENOFILE,  1, "file not found")  \\</text><text x="34" y="105" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    X(EPERM,    2, "permission denied")</text><rect x="20" y="122" width="395" height="90" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="218" y="134" text-anchor="middle" style="font-size:12px;fill:#0d6a6a">Step 2a — generate enum</text><rect x="26" y="142" width="383" height="90" rx="4" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="34" y="155" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">#define X(name,code,msg)  name = code,</text><text x="34" y="171" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">enum ErrCode {</text><text x="34" y="187" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    ERROR_LIST(X)</text><text x="34" y="203" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">};</text><text x="34" y="219" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">#undef X</text><rect x="425" y="122" width="395" height="90" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="622" y="134" text-anchor="middle" style="font-size:12px;fill:#b26a00">Step 2b — generate string table</text><rect x="431" y="142" width="383" height="90" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="439" y="155" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">#define X(name,code,msg)  [name] = msg,</text><text x="439" y="171" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">static const char *msgs[] = {</text><text x="439" y="187" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    ERROR_LIST(X)</text><text x="439" y="203" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">};</text><text x="439" y="219" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">#undef X</text><rect x="20" y="236" width="800" height="58" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="248" text-anchor="middle" style="font-size:12px;fill:#1a7a40">The payoff: add a new error code to ONE place (the ERROR_LIST macro)</text><text x="420" y="262" text-anchor="middle" style="font-size:11px;fill:#1a7a40">and the enum, string table, switch cases, and documentation all update automatically</text><rect x="26" y="270" width="780" height="26" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="34" y="283" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">// Other uses: generate switch-case handlers, function dispatch tables, serialization code, documentation</text></svg>`},
{title:"Translation units, linkage, and the static keyword",narration:"A translation unit is one .c file after all its includes have been expanded \u2014 it is the unit of independent compilation. Every global variable and function in a translation unit has a linkage attribute. External linkage means the symbol is visible to the linker and can be referenced from other translation units. Internal linkage, created by the static keyword on a global, means the symbol is private to this translation unit \u2014 the linker never sees it. Two translation units can both have a static function with the same name without conflict. Static is the most important encapsulation mechanism in C: use it on every global and function that does not need to be public.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">A translation unit is one .c file after preprocessing — each gets compiled independently</text><rect x="20" y="26" width="390" height="110" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="215" y="38" text-anchor="middle" style="font-size:12px;fill:#1040a0">file_a.c  (Translation Unit A)</text><rect x="26" y="48" width="378" height="90" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="34" y="61" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">static int counter = 0;  // internal linkage</text><text x="34" y="77" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">                         // invisible outside TU A</text><text x="34" y="93" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int shared = 42;         // external linkage</text><text x="34" y="109" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">                         // visible to all TUs</text><text x="34" y="125" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">void helper(void) {}     // external (default)</text><rect x="430" y="26" width="390" height="110" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="625" y="38" text-anchor="middle" style="font-size:12px;fill:#1a7a40">file_b.c  (Translation Unit B)</text><rect x="436" y="48" width="378" height="90" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="444" y="61" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">static int counter = 0;  // internal linkage</text><text x="444" y="77" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">                         // DIFFERENT counter! no conflict</text><text x="444" y="93" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">extern int shared;       // references TU A's shared</text><text x="444" y="109" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">                         // linker resolves this</text><text x="444" y="125" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">extern void helper(void); // also from TU A</text><rect x="20" y="142" width="800" height="44" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="156" text-anchor="middle" style="font-size:12px;fill:#c62828">Linkage controls visibility across translation units:</text><text x="420" y="170" text-anchor="middle" style="font-size:10px;fill:#c62828">external (default for globals/functions) — visible to linker  ·  internal (static) — private to this .c file  ·  none (locals) — no linkage</text><rect x="20" y="192" width="800" height="24" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="204" text-anchor="middle" style="font-size:12px;fill:#b26a00">static on a global/function limits it to the file — the most important access-control tool in C</text><rect x="20" y="222" width="800" height="24" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="420" y="234" text-anchor="middle" style="font-size:12px;fill:#0d6a6a">extern on a declaration says: this is defined elsewhere — linker will find it. Missing def = linker error.</text></svg>`},
{title:"The linker \u2014 symbol resolution and errors",narration:"The linker receives a set of object files and library archives. Each object file has a symbol table containing defined symbols (things this file provides) and undefined symbols (things this file needs from elsewhere). The linker walks through all the object files and resolves each undefined symbol by finding its definition in another object or in a library archive. Two classes of errors can occur: an undefined symbol error means no object or library provided a definition; a multiple definition error means two strong definitions of the same symbol exist across different objects. Weak symbols, declared with GCC attribute weak, can be overridden by strong definitions.",svg:`<svg width="100%" viewBox="0 0 840 280"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">The linker matches UNDEFINED symbols in one object file with DEFINED symbols in another</text><rect x="20" y="26" width="240" height="80" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="140" y="38" text-anchor="middle" style="font-size:12px;fill:#1040a0">main.o</text><rect x="26" y="48" width="228" height="42" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="34" y="61" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">DEFINED:  main</text><text x="34" y="77" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">UNDEFINED: add, printf</text><rect x="280" y="26" width="240" height="80" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="400" y="38" text-anchor="middle" style="font-size:12px;fill:#0d6a6a">math.o</text><rect x="286" y="48" width="228" height="42" rx="4" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="294" y="61" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">DEFINED:  add, subtract</text><text x="294" y="77" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">UNDEFINED: (none)</text><rect x="540" y="26" width="240" height="80" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="660" y="38" text-anchor="middle" style="font-size:12px;fill:#1a7a40">libc.a</text><rect x="546" y="48" width="228" height="42" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="554" y="61" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">DEFINED:  printf, malloc, ...</text><text x="554" y="77" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">UNDEFINED: (none)</text><rect x="320" y="120" width="200" height="52" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.3"/><text x="420" y="146" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:700;fill:#555">ld
(linker)</text><line x1="140" y1="106" x2="370" y2="120" stroke="#1040a0" stroke-width="2.2" marker-end="url(#ah)" fill="none" class="da"/><text x="255" y="100" text-anchor="middle" style="font-size:10px;fill:#1040a0">needs add</text><line x1="400" y1="106" x2="420" y2="120" stroke="#0d6a6a" stroke-width="2.2" marker-end="url(#ah)" fill="none" class="da"/><text x="410" y="100" text-anchor="middle" style="font-size:10px;fill:#0d6a6a">provides add</text><line x1="660" y1="106" x2="480" y2="120" stroke="#1a7a40" stroke-width="2.2" marker-end="url(#ah)" fill="none" class="da"/><text x="570" y="100" text-anchor="middle" style="font-size:10px;fill:#1a7a40">provides printf</text><line x1="420" y1="172" x2="420" y2="196" stroke="#555" stroke-width="2.2" marker-end="url(#ah)" fill="none" class="da"/><rect x="320" y="196" width="200" height="42" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.3"/><text x="420" y="217" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:600;fill:#1a7a40">executable</text><rect x="20" y="242" width="800" height="28" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="256" text-anchor="middle" style="font-size:12px;fill:#b26a00">Two linker errors: undefined symbol (no definition found) and multiple definition (two strong definitions)</text></svg>`},
{title:"Static vs dynamic libraries",narration:"A static library is an archive of object files, created with the ar tool. When you link against it, the linker copies only the object files it actually needs into your executable. The executable is self-contained and has no runtime dependency on the library. A dynamic or shared library is compiled with position-independent code and linked separately. At link time only a stub is added to the executable; the actual code is loaded at process startup by the dynamic linker. Multiple processes can share one physical copy of a dynamic library in memory. The tradeoff is that your program depends on the library being present at runtime in the right version.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Static library (.a): code copied in at link time. Dynamic library (.so/.dylib): loaded at runtime.</text><rect x="20" y="26" width="390" height="110" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="215" y="38" text-anchor="middle" style="font-size:12px;fill:#0d6a6a">Static library (.a archive)</text><rect x="26" y="48" width="378" height="90" rx="4" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="34" y="61" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"># Build a static lib</text><text x="34" y="77" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">gcc -c foo.c -o foo.o</text><text x="34" y="93" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">ar rcs libfoo.a foo.o   # pack .o files</text><text x="34" y="109" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">gcc main.c -L. -lfoo -o app</text><text x="34" y="125" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"># All of libfoo.a is COPIED into app</text><rect x="430" y="26" width="390" height="110" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="625" y="38" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Dynamic/shared library (.so)</text><rect x="436" y="48" width="378" height="90" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="444" y="61" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"># Build a shared lib</text><text x="444" y="77" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">gcc -fPIC -c foo.c -o foo.o</text><text x="444" y="93" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">gcc -shared -o libfoo.so foo.o</text><text x="444" y="109" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">gcc main.c -L. -lfoo -o app</text><text x="444" y="125" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"># app stores a reference; loads at startup</text><rect x="20" y="144" width="800" height="52" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="158" text-anchor="middle" style="font-size:11px;fill:#1040a0">Static pros: single self-contained binary, no runtime dep, faster call (no PLT indirection)</text><text x="420" y="172" text-anchor="middle" style="font-size:11px;fill:#1040a0">Static cons: larger binary, cannot share code across processes, must relink to update library</text><rect x="20" y="202" width="800" height="44" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="216" text-anchor="middle" style="font-size:11px;fill:#b26a00">Dynamic pros: one copy shared in RAM across all processes, update library without relinking app</text><text x="420" y="230" text-anchor="middle" style="font-size:11px;fill:#b26a00">Dynamic cons: needs .so at runtime (LD_LIBRARY_PATH), PLT indirection per call, version hell (DLL hell)</text></svg>`},
{title:"dlopen \u2014 loading libraries at runtime",narration:"While normal dynamic libraries are loaded automatically at process startup, dlopen lets you load a shared library explicitly at any point during execution. You call dlopen with the path and flags, receiving a handle. You then call dlsym with the handle and a symbol name to get a function or data pointer. You cast that pointer to the correct type and call through it. When finished, dlclose decrements the library reference count. This enables plugin architectures where you discover and load plugins by scanning a directory, hot-reloading where you replace a library without restarting the process, and optional hardware acceleration that falls back gracefully when a library is absent.",svg:`<svg width="100%" viewBox="0 0 840 250"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">dlopen lets you load a shared library at runtime — plugins, hot-reloading, optional features</text><rect x="20" y="26" width="800" height="168" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="38" text-anchor="middle" style="font-size:12px;fill:#1040a0">The four-step dlopen workflow</text><text x="150" y="52" text-anchor="middle" style="font-size:11px;fill:#1040a0">Step 1 — open the library</text><rect x="26" y="62" width="234" height="58" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="34" y="75" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">void *handle = dlopen("./libfoo.so", RTLD_LAZY);</text><text x="34" y="91" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">if (!handle) { fprintf(stderr, "%s\\n", dlerror()); exit(1); }</text><text x="34" y="107" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">// RTLD_LAZY: resolve symbols on first call   RTLD_NOW: resolve all at load time</text><text x="360" y="52" text-anchor="middle" style="font-size:11px;fill:#1040a0">Step 2 — look up a symbol</text><rect x="236" y="62" width="234" height="58" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="244" y="75" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int (*compute)(int, int);</text><text x="244" y="91" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">*(void **)&amp;compute = dlsym(handle, "compute");</text><text x="244" y="107" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">if (!compute) { fprintf(stderr, "%s\\n", dlerror()); }</text><text x="570" y="52" text-anchor="middle" style="font-size:11px;fill:#1040a0">Step 3+4 — use and close</text><rect x="446" y="62" width="234" height="58" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="454" y="75" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int result = compute(40, 2);  // call it!</text><text x="454" y="91" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="454" y="107" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">dlclose(handle);  // decrement refcount</text><rect x="20" y="202" width="800" height="22" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="213" text-anchor="middle" style="font-size:12px;fill:#c62828">Always call dlerror() to clear the error state before dlsym — NULL return is not always an error (symbol could be NULL)</text><rect x="20" y="230" width="800" height="18" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="239" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Use cases: plugin systems, hot-reload in games/dev tools, optional hardware acceleration, JIT code loading</text></svg>`},
{title:"Make \u2014 dependency-driven incremental builds",narration:"Make reads a Makefile containing rules of the form target-colon-prerequisites followed by a recipe on a tab-indented line. A rule says: to build target, first ensure prerequisites are up-to-date, then run the recipe if any prerequisite is newer than the target. This creates a dependency graph. Make traverses the graph, rebuilding only the nodes that are stale. Automatic variables shorten recipes: dollar-at is the target, dollar-less-than is the first prerequisite, dollar-caret is all prerequisites. Pattern rules like percent-dot-o colon percent-dot-c match any .c to .o compilation. The minus-j flag runs independent jobs in parallel, dramatically speeding up large builds.",svg:`<svg width="100%" viewBox="0 0 840 300"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Make rebuilds only the targets whose prerequisites are newer — dependency-driven incremental builds</text><rect x="20" y="26" width="400" height="160" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="220" y="38" text-anchor="middle" style="font-size:12px;fill:#1040a0">Makefile</text><rect x="26" y="48" width="388" height="186" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="34" y="61" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">CC     = gcc</text><text x="34" y="77" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">CFLAGS = -O2 -Wall -Wextra</text><text x="34" y="93" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="34" y="109" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">app: main.o util.o          # target: prerequisites</text><text x="34" y="125" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">	$(CC) -o $@ $^           # $@ = target  $^ = all prereqs</text><text x="34" y="141" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="34" y="157" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">%.o: %.c                    # pattern rule</text><text x="34" y="173" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">	$(CC) $(CFLAGS) -c -o $@ $&lt;   # $&lt; = first prereq</text><text x="34" y="189" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="34" y="205" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">clean:</text><text x="34" y="221" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">	rm -f *.o app</text><rect x="440" y="26" width="380" height="160" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="630" y="38" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Dependency graph</text><rect x="580" y="50" width="100" height="28" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.3"/><text x="630" y="64" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:600;fill:#1a7a40">app</text><line x1="580" y1="64" x2="530" y2="82" stroke="#1a7a40" stroke-width="2.2" marker-end="url(#ah)" fill="none" class="da"/><line x1="680" y1="64" x2="730" y2="82" stroke="#1a7a40" stroke-width="2.2" marker-end="url(#ah)" fill="none" class="da"/><rect x="480" y="86" width="100" height="28" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="1.3"/><text x="530" y="100" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:600;fill:#1040a0">main.o</text><rect x="680" y="86" width="100" height="28" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="1.3"/><text x="730" y="100" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:600;fill:#1040a0">util.o</text><line x1="505" y1="114" x2="485" y2="132" stroke="#1040a0" stroke-width="2.2" marker-end="url(#ah)" fill="none" class="da"/><line x1="545" y1="114" x2="530" y2="132" stroke="#1040a0" stroke-width="2.2" marker-end="url(#ah)" fill="none" class="da"/><line x1="705" y1="114" x2="685" y2="132" stroke="#1040a0" stroke-width="2.2" marker-end="url(#ah)" fill="none" class="da"/><line x1="745" y1="114" x2="770" y2="132" stroke="#1040a0" stroke-width="2.2" marker-end="url(#ah)" fill="none" class="da"/><rect x="448" y="136" width="80" height="24" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.3"/><text x="488" y="148" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:600;fill:#555">main.c</text><rect x="540" y="136" width="80" height="24" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.3"/><text x="580" y="148" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:600;fill:#555">defs.h</text><rect x="648" y="136" width="80" height="24" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.3"/><text x="688" y="148" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:600;fill:#555">util.c</text><rect x="740" y="136" width="80" height="24" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.3"/><text x="780" y="148" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:600;fill:#555">defs.h</text><text x="630" y="178" text-anchor="middle" style="font-size:10px;fill:#1a7a40">Make checks mtimes: if util.c
newer than util.o → recompile</text><rect x="20" y="238" width="800" height="22" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="249" text-anchor="middle" style="font-size:12px;fill:#b26a00">Automatic variables: $@ = target  $&lt; = first prerequisite  $^ = all prerequisites  $* = stem</text><rect x="20" y="264" width="800" height="26" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="420" y="274" text-anchor="middle" style="font-size:12px;fill:#0d6a6a">make -j8 runs 8 jobs in parallel  ·  make -n shows what would be done without running it</text><text x="420" y="286" text-anchor="middle" style="font-size:12px;fill:#0d6a6a">For larger projects: CMake, Meson, Bazel generate Makefiles/Ninja files for you</text></svg>`},

// ── Text-to-Speech (Web Speech API) ──────────────────────────────────────────
let ttsOn = false, ttsUtter = null, ttsVoice = null;

function ttsPickVoice() {
  const vs = speechSynthesis.getVoices();
  if (!vs.length) return null;
  // Prefer a natural en-US/en-GB voice; fall back to any English, then first
  return vs.find(v => /en[-_](US|GB)/i.test(v.lang) && /natural|neural|premium/i.test(v.name))
      || vs.find(v => /en[-_](US|GB)/i.test(v.lang))
      || vs.find(v => v.lang.startsWith('en'))
      || vs[0];
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => { ttsVoice = ttsPickVoice(); };
  ttsVoice = ttsPickVoice();
}

function ttsSpeak(text, onEnd) {
  if (!ttsOn || !('speechSynthesis' in window)) { if (onEnd) onEnd(); return; }
  speechSynthesis.cancel();
  // Clean text for speech: strip code-ish punctuation that reads badly
  const clean = text
    .replace(/->/g, ' arrow ')
    .replace(/&/g, ' ampersand ')
    .replace(/\*p\b/g, 'star p')
    .replace(/`/g, '')
    .replace(/\s+/g, ' ').trim();
  ttsUtter = new SpeechSynthesisUtterance(clean);
  if (ttsVoice) ttsUtter.voice = ttsVoice;
  ttsUtter.rate = 0.95;
  ttsUtter.pitch = 1.0;
  if (onEnd) ttsUtter.onend = onEnd;
  speechSynthesis.speak(ttsUtter);
}

function ttsStop() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
}

function ttsToggle() {
  ttsOn = !ttsOn;
  const b = document.getElementById('ttsbtn');
  if (ttsOn) {
    b.textContent = '🔊 Voice On';
    b.style.background = '#e6f4ee';
    b.style.borderColor = '#4caf79';
    // Speak the current slide immediately so the user gets feedback
    ttsSpeak(SLIDES[vi].title + '. ' + SLIDES[vi].narration, null);
  } else {
    b.textContent = '🔇 Voice Off';
    b.style.background = '';
    b.style.borderColor = '';
    ttsStop();
  }
}
window.addEventListener('beforeunload', ttsStop);

let vi=0,playing=false,ticker=null,ctick=null;
function updateNav(){
  const prevBtn=document.getElementById('prevbtn'),nextBtn=document.getElementById('nextbtn');
  prevBtn.disabled=(vi===0);prevBtn.setAttribute('aria-disabled',String(vi===0));
  nextBtn.disabled=(vi===SLIDES.length-1);nextBtn.setAttribute('aria-disabled',String(vi===SLIDES.length-1));
}
function gt(n){
  vi=Math.max(0,Math.min(n,SLIDES.length-1));
  const s=SLIDES[vi];
  document.getElementById('st').textContent=s.title;
  document.getElementById('sc').textContent=(vi+1)+' / '+SLIDES.length;
  const d=document.getElementById('diag');
  d.style.opacity='0';d.innerHTML=s.svg;
  const svgEl=d.querySelector('svg');
  if(svgEl){svgEl.setAttribute('role','img');svgEl.setAttribute('aria-label',s.title+' diagram');}
  setTimeout(()=>d.style.opacity='1',30);
  document.getElementById('pf').style.width=(vi/(SLIDES.length-1)*100)+'%';
  const bar=document.getElementById('pbar');
  bar.setAttribute('aria-valuemax',String(SLIDES.length));
  bar.setAttribute('aria-valuenow',String(vi+1));
  bar.setAttribute('aria-valuetext',(vi+1)+' of '+SLIDES.length+': '+s.title);
  updateNav();
  document.getElementById('live-announce').textContent=s.title;
  clearInterval(ctick);
  let pos=0,full=s.narration;
  document.getElementById('narr').textContent='';
  ctick=setInterval(()=>{if(pos<full.length)document.getElementById('narr').textContent=full.slice(0,++pos);else clearInterval(ctick);},18);
  ttsStop();
  if(ttsOn){
    ttsSpeak(s.title+'. '+full,()=>{if(playing){clearTimeout(ticker);ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},1200);}});
    if(playing)clearTimeout(ticker);
  } else if(playing){clearTimeout(ticker);ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},Math.max(9000,full.length*56));}
}
function play(){playing=true;document.getElementById('pb2').textContent='⏸ Pause';
  if(ttsOn){ttsSpeak(SLIDES[vi].title+'. '+SLIDES[vi].narration,()=>{if(playing)ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},1200);});}
  else{ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},Math.max(9000,SLIDES[vi].narration.length*56));}}
function pause(){playing=false;clearTimeout(ticker);ttsStop();document.getElementById('pb2').textContent='▶ Play';}
function tg(){playing?pause():play();}
function gn(){if(vi>=SLIDES.length-1)return;clearTimeout(ticker);gt(vi+1);if(playing)play();}
function gp(){if(vi<=0)return;clearTimeout(ticker);gt(vi-1);if(playing)play();}
function pgc(e){const r=document.getElementById('pbar').getBoundingClientRect();clearTimeout(ticker);gt(Math.round((e.clientX-r.left)/r.width*(SLIDES.length-1)));if(playing)play();}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&document.getElementById('voice-panel').classList.contains('aai-open')){_vpClose();return;}
  if(['INPUT','TEXTAREA'].includes(e.target.tagName))return;
  if(e.key===' '){e.preventDefault();tg();}
  else if(e.key==='ArrowRight')gn();
  else if(e.key==='ArrowLeft')gp();
  else if(e.key==='v'||e.key==='V')ttsToggle();
});
gt(0);
</script>

<div id="voice-panel" role="region" aria-labelledby="vp-title">
  <div id="vp-bar">
    <span id="vp-title" class="sr-only">Voice input and Q&amp;A</span>
    <span id="vp-status" aria-live="polite">Ready</span>
    <button id="vp-close" onclick="_vpClose()" aria-label="Close voice panel">&#x2715;</button>
  </div>
  <form id="vp-form">
    <label for="vp-input" class="sr-only">Type a question about this lecture</label>
    <input id="vp-input" type="text" placeholder="Or type a question and press Enter…" autocomplete="off">
    <button type="submit">Ask</button>
  </form>
  <div id="vp-transcript" class="aai-empty" aria-live="polite"></div>
  <div id="vp-answer" aria-live="polite"></div>
  <div id="vp-footer">Mic audio streams live to AssemblyAI only while this panel is open, for transcription and Q&amp;A &middot; universal-3-5-pro</div>
</div>
<script>
/* ── AssemblyAI Voice Input + Q&A ────────────────────────────────────────── */
/* Set by the deploy step in README.md ("find-replace REPLACE_WITH_VERCEL_URL"). */
const _AAI='https://the-c.vercel.app';
const _aaiConfigured=()=>!!_AAI&&_AAI.indexOf('REPLACE_WITH')===-1;
const _TERMS=['pointer','malloc','undefined behaviour','mutex','deadlock','epoll',
  'mmap','fork','syscall','struct','volatile','restrict','pthread','semaphore',
  'spinlock','realloc','calloc','free list','stack frame','heap internals'];
/* AudioWorklet: capture Float32 mic audio → Int16 PCM at 16 kHz */
const _WL=`class P extends AudioWorkletProcessor{process(i){const c=i[0]?.[0];if(c){const b=new Int16Array(c.length);for(let j=0;j<c.length;j++){const s=Math.max(-1,Math.min(1,c[j]));b[j]=s<0?s*0x8000:s*0x7FFF;}this.port.postMessage(b.buffer,[b.buffer]);}return true;}}registerProcessor('aai-pcm',P);`;

let _ws=null,_ctx=null,_mic=null,_node=null,_buf=[],_on=false,_connecting=false,_asking=false;

const _$=id=>document.getElementById(id);
const _status=(t,live)=>{const e=_$('vp-status');if(e){e.textContent=t;e.className=live?'aai-live':'';}};
const _tx=t=>{const e=_$('vp-transcript');if(!e)return;e.textContent=t;e.className=t?'':'aai-empty';};
const _ans=h=>{const e=_$('vp-answer');if(!e)return;e.innerHTML=h;e.className=h?'aai-show':'';};
const _open=()=>_$('voice-panel')?.classList.add('aai-open');
function _vpClose(){_$('voice-panel')?.classList.remove('aai-open');if(_on)_stop();_$('micbtn')?.focus();}

function _micSupported(){
  return !!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia&&window.AudioContext&&window.AudioWorklet&&window.WebSocket);
}

async function _start(){
  if(_on||_connecting)return;
  if(!_aaiConfigured()){
    _open();_status('Backend not configured — see README setup guide');return;
  }
  if(!_micSupported()){
    _open();_status('Voice input isn’t supported in this browser — try typing a question instead');return;
  }
  if(location.protocol!=='https:'&&location.hostname!=='localhost'&&location.hostname!=='127.0.0.1'){
    _open();_status('Voice input requires HTTPS — try typing a question instead');return;
  }
  _connecting=true;
  _open();_status('Connecting…');_tx('');_ans('');
  try{
    /* 1. Mint short-lived token (API key stays on server) */
    const tokCtl=new AbortController();
    const tokTimer=setTimeout(()=>tokCtl.abort(),10000);
    const tr=await fetch(_AAI+'/api/token',{signal:tokCtl.signal});
    clearTimeout(tokTimer);
    if(!tr.ok)throw new Error('Token failed ('+tr.status+')');
    const{token}=await tr.json();
    /* 2. Open WebSocket using token — no API key in browser */
    const p=new URLSearchParams({sample_rate:'16000',speech_model:'universal-3-5-pro',mode:'balanced',token});
    _TERMS.forEach(t=>p.append('keyterms_prompt',t));
    _ws=new WebSocket('wss://streaming.assemblyai.com/v3/ws?'+p);
    await new Promise((ok,fail)=>{
      _ws.onopen=ok;
      _ws.onerror=()=>fail(new Error('WebSocket failed'));
      setTimeout(()=>fail(new Error('Connection timed out')),10000);
    });
    _ws.onmessage=e=>{
      const m=JSON.parse(e.data);
      if(m.type!=='Turn')return;
      _tx(m.transcript);
      /* Auto-trigger Q&A when turn finalizes and ends with ? */
      if(m.end_of_turn&&m.transcript.trim().endsWith('?'))_ask(m.transcript.trim());
    };
    _ws.onclose=()=>{_on=false;_btn();_status('Disconnected');};
    /* 3. Capture mic → PCM16 via AudioWorklet → stream to AssemblyAI */
    _mic=await navigator.mediaDevices.getUserMedia({audio:{channelCount:1,echoCancellation:true,noiseSuppression:true}});
    _ctx=new AudioContext({sampleRate:16000});
    const bu=URL.createObjectURL(new Blob([_WL],{type:'application/javascript'}));
    await _ctx.audioWorklet.addModule(bu);URL.revokeObjectURL(bu);
    _node=new AudioWorkletNode(_ctx,'aai-pcm');
    _node.port.onmessage=ev=>{
      _buf.push(...new Int16Array(ev.data));
      /* Send ~200 ms chunks (3200 samples @ 16 kHz) — within AssemblyAI 50–1000 ms window */
      if(_buf.length>=3200&&_ws?.readyState===1)
        _ws.send(new Int16Array(_buf.splice(0,3200)).buffer);
    };
    _ctx.createMediaStreamSource(_mic).connect(_node);
    _on=true;_connecting=false;_btn();_status('Listening',true);
  }catch(err){
    _connecting=false;
    const msg=err.name==='AbortError'?'Token request timed out':err.name==='NotAllowedError'?'Microphone permission denied':err.message;
    _status('Error: '+msg);_clean();
  }
}

function _stop(){
  /* Always send Terminate — abandoned sessions stay billable until 3-hour cap */
  if(_ws?.readyState===1){_ws.send(JSON.stringify({type:'Terminate'}));_ws.close();}
  _clean();_status('Stopped');
}
function _clean(){_mic?.getTracks().forEach(t=>t.stop());_ctx?.close();_ws=_ctx=_mic=_node=null;_buf=[];_on=false;_connecting=false;_btn();}
function _btn(){const b=_$('micbtn');if(!b)return;b.textContent=_on?'⏹ Stop':'🎙 Ask';b.className=_on?'aai-live':'';}
function _micToggle(){if(_connecting)return;_on?_stop():_start();}
window.addEventListener('beforeunload',()=>{if(_ws?.readyState===1)_ws.send(JSON.stringify({type:'Terminate'}));});

async function _ask(q){
  if(_asking)return;
  if(!_aaiConfigured()){
    _open();_status('Backend not configured — see README setup guide');return;
  }
  _asking=true;
  _open();_status('Answering…');_ans('<em style="color:#8b949e">Thinking…</em>');
  const ctl=new AbortController();
  const timer=setTimeout(()=>ctl.abort(),20000);
  try{
    const r=await fetch(_AAI+'/api/qa',{
      method:'POST',
      headers:{'content-type':'application/json'},
      body:JSON.stringify({question:q,volume:document.title}),
      signal:ctl.signal,
    });
    if(!r.ok)throw new Error('Q&A failed ('+r.status+')');
    const{answer}=await r.json();
    /* Minimal markdown: fenced code blocks + inline code. Escaped first, so this cannot inject HTML. */
    const h=answer
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```[\w]*\n?([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
    _ans('<p>'+h+'</p><p style="color:#8b949e;font-size:.75em">AI-generated — verify compiler/platform-specific details.</p>');
    _status(_on?'Listening':'Ready',_on);
  }catch(err){
    const msg=err.name==='AbortError'?'Request timed out — try again':err.message;
    _ans('<em style="color:#f85149">'+msg+'</em>');
    _status(_on?'Listening':'Ready',_on);
  }finally{
    clearTimeout(timer);_asking=false;
  }
}
document.getElementById('vp-form')?.addEventListener('submit',e=>{
  e.preventDefault();
  const input=document.getElementById('vp-input');
  const v=input.value.trim();
  if(!v)return;
  input.value='';
  _ask(v);
});

</script>
</body>
</html>
