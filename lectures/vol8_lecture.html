{title:"Data races at the hardware level",narration:"A data race occurs when two threads access the same memory location concurrently, at least one access is a write, and there is no synchronization between them. At the hardware level, each CPU core has its own cache, and an increment operation is not atomic: it decomposes into a load from memory into a register, an add in the register, and a store back to memory. If two threads each read the value zero, both compute one, and both write one back, the result is one rather than two. One increment is lost. The C11 standard goes further: it declares data races on non-atomic types to be undefined behavior, which means the compiler is free to optimize based on the assumption that no race occurs.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Data races: two threads modify shared memory without synchronization -- undefined behavior</text><rect x="20" y="26" width="235" height="110" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="137" y="38" text-anchor="middle" style="font-size:12px;fill:#1040a0">CPU 0  /  Thread 1</text><rect x="28" y="50" width="219" height="53" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="35" y="61" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">1. reg = counter   // read: 0</text><text x="35" y="76" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">2. reg = reg + 1   // add</text><text x="35" y="91" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">3. counter = reg   // write: 1</text><text x="137" y="112" text-anchor="middle" style="font-size:10px;fill:#1040a0">L1 cache: counter=0</text><rect x="270" y="26" width="235" height="110" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="387" y="38" text-anchor="middle" style="font-size:12px;fill:#0d6a6a">CPU 1  /  Thread 2</text><rect x="278" y="50" width="219" height="53" rx="4" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="285" y="61" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">1. reg = counter   // read: 0</text><text x="285" y="76" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">2. reg = reg + 1   // add</text><text x="285" y="91" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">3. counter = reg   // write: 1</text><text x="387" y="112" text-anchor="middle" style="font-size:10px;fill:#0d6a6a">L1 cache: counter=0</text><rect x="150" y="144" width="250" height="36" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="275" y="162" text-anchor="middle" style="font-size:12px;fill:#555">Shared RAM:  counter = 0</text><rect x="540" y="26" width="280" height="228" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="680" y="40" text-anchor="middle" style="font-size:12px;fill:#c62828">What went wrong:</text><rect x="548" y="52" width="264" height="158" rx="4" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="555" y="63" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Both threads read counter=0</text><text x="555" y="78" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Both compute 0+1=1</text><text x="555" y="93" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Both write 1 back</text><text x="555" y="108" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#c62828">// counter == 1  not 2!  // RACE</text><text x="555" y="123" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="555" y="138" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Lost update -- one increment gone</text><text x="555" y="153" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// EVEN WORSE: C11 says data race</text><text x="555" y="168" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// on non-atomic types is UB:</text><text x="555" y="183" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// compiler can assume it never</text><text x="555" y="198" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// happens and "optimize" wildly</text><rect x="20" y="196" width="505" height="52" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="262" y="210" text-anchor="middle" style="font-size:12px;fill:#b26a00">Fix: use a mutex or _Atomic</text><rect x="28" y="220" width="497" height="36" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="35" y="231" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">pthread_mutex_lock(&m); counter++; pthread_mutex_unlock(&m);</text><text x="35" y="245" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">_Atomic int counter; atomic_fetch_add(&counter, 1); // lock-free</text></svg>`},
{title:"Mutexes -- mutual exclusion and memory visibility",narration:"A mutex provides two guarantees simultaneously: mutual exclusion and memory visibility. Mutual exclusion means only one thread holds the lock at a time. Memory visibility means all writes made before pthread_mutex_unlock are fully visible to any thread that subsequently acquires the same mutex. This visibility guarantee comes from the happens-before relationship: unlock of a mutex happens-before the next lock of the same mutex. Without this guarantee, a thread might see stale cached values even after acquiring a lock. A mutex is therefore not just a traffic gate but also a memory synchronization point that flushes all pending writes to a state where other threads can observe them.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Mutexes guarantee mutual exclusion AND memory visibility across threads</text><text x="160" y="30" text-anchor="middle" style="font-size:12px;fill:#1040a0">Thread 1</text><text x="600" y="30" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Thread 2</text><line x1="420" y1="28" x2="420" y2="200" stroke="#eee" stroke-width="2" stroke-dasharray="5 4"/><rect x="30" y="46" width="372" height="22" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="38" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;font-weight:600;fill:#1040a0">pthread_mutex_lock(&m)</text><rect x="30" y="74" width="372" height="22" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="38" y="85" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;font-weight:600;fill:#0d6a6a">x = 42;  y = "hello";</text><rect x="30" y="102" width="372" height="22" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="38" y="113" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;font-weight:600;fill:#1a7a40">pthread_mutex_unlock(&m)</text><rect x="434" y="46" width="386" height="22" rx="3" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="442" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;font-weight:600;fill:#c62828">pthread_mutex_lock(&m)  [blocked]</text><rect x="434" y="130" width="386" height="22" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="442" y="141" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;font-weight:600;fill:#1a7a40">pthread_mutex_lock(&m)  [acquired]</text><rect x="434" y="158" width="386" height="22" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="442" y="169" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;font-weight:600;fill:#1a7a40">assert(x==42);  // ALWAYS TRUE</text><rect x="434" y="186" width="386" height="22" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="442" y="197" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:10px;font-weight:600;fill:#1a7a40">pthread_mutex_unlock(&m)</text><line x1="402" y1="113" x2="434" y2="130" stroke="#1a7a40" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><text x="418" y="107" text-anchor="middle" style="font-size:10px;fill:#1a7a40">happens-before</text><rect x="20" y="204" width="800" height="44" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="216" text-anchor="middle" style="font-size:12px;fill:#b26a00">Unlock happens-before the next lock on the same mutex -- all writes before unlock() are visible after lock()</text><text x="420" y="232" text-anchor="middle" style="font-size:12px;fill:#b26a00">This is the fundamental memory visibility guarantee: mutexes are not just mutual exclusion</text></svg>`},
{title:"Condition variables -- the while-loop rule",narration:"A condition variable lets a thread sleep until some predicate becomes true, releasing the mutex while sleeping to allow other threads to modify the shared state. The fundamental rule is to always use a while loop to recheck the condition after waking up, never an if statement. There are two reasons. First, POSIX allows spurious wakeups: pthread_cond_wait may return even when no signal was sent, for implementation reasons. Second, even a genuine signal does not guarantee the condition is still true when the waiter re-acquires the lock: another thread may have consumed the data in the window between the signal and the lock acquisition. The mutex must protect both the shared data and the condition check, and they must be checked atomically while holding the lock.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Condition variables -- sleep until a condition is true, without busy-waiting</text><rect x="20" y="24" width="390" height="110" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="215" y="36" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Consumer (waiter) -- ALWAYS use while:</text><rect x="26" y="46" width="378" height="143" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="33" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">pthread_mutex_lock(&m);</text><text x="33" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">while (!data_ready) {     // WHILE not if!</text><text x="33" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    pthread_cond_wait(&c, &m);</text><text x="33" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">    // atomically: unlock m, sleep</text><text x="33" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">    // on wakeup: re-lock m</text><text x="33" y="132" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">    // then re-check condition!</text><text x="33" y="147" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">}</text><text x="33" y="162" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">consume(data);</text><text x="33" y="177" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">pthread_mutex_unlock(&m);</text><rect x="430" y="24" width="390" height="110" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="625" y="36" text-anchor="middle" style="font-size:12px;fill:#1040a0">Producer (signaler):</text><rect x="436" y="46" width="378" height="113" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="443" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">pthread_mutex_lock(&m);</text><text x="443" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">produce(data);</text><text x="443" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">data_ready = 1;</text><text x="443" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">pthread_cond_signal(&c);  // wake one</text><text x="443" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// OR: pthread_cond_broadcast(&c)</text><text x="443" y="132" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">//     wakes ALL waiters</text><text x="443" y="147" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">pthread_mutex_unlock(&m);</text><rect x="20" y="140" width="800" height="50" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="152" text-anchor="middle" style="font-size:12px;fill:#c62828">Why WHILE and not IF?  Two reasons:</text><text x="420" y="166" text-anchor="middle" style="font-size:12px;fill:#c62828">1. Spurious wakeups: pthread_cond_wait may return even when no signal was sent -- required by POSIX</text><text x="420" y="180" text-anchor="middle" style="font-size:12px;fill:#c62828">2. Lost wakeup race: between signal and re-lock, another thread may consume the data</text><rect x="20" y="196" width="800" height="52" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="210" text-anchor="middle" style="font-size:12px;fill:#b26a00">pthread_cond_timedwait(cond, mutex, &abstime) -- adds a deadline, returns ETIMEDOUT</text><text x="420" y="226" text-anchor="middle" style="font-size:12px;fill:#b26a00">Never call cond_signal without holding the mutex that protects the condition variable</text><text x="420" y="240" text-anchor="middle" style="font-size:12px;fill:#b26a00">Pattern: mutex protects both the shared data AND the condition check -- they must be atomic together</text></svg>`},
{title:"Semaphores and rwlocks",narration:"A semaphore is a non-negative integer counter with two atomic operations: wait, which decrements the counter and blocks if it would go negative, and post, which increments and wakes a blocked waiter. A semaphore with initial count N allows up to N concurrent users, which makes it natural for throttling resource access. A binary semaphore with count 0 or 1 can be used for signaling between threads. Unlike a mutex, a semaphore has no ownership concept: one thread can post what another thread waited, which makes semaphores useful for producer-consumer signaling. An rwlock allows multiple simultaneous readers or exactly one writer, which is beneficial only when reads are much more frequent than writes and the critical section is long enough to justify the overhead.",svg:`<svg width="100%" viewBox="0 0 840 288"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Semaphores and rwlocks -- counting permits and reader-writer access control</text><rect x="20" y="24" width="400" height="120" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="220" y="36" text-anchor="middle" style="font-size:12px;fill:#0d6a6a">Semaphore -- counting permit</text><rect x="34" y="50" width="40" height="30" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="1"/><text x="54" y="65" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:700;fill:#1a7a40">1</text><rect x="80" y="50" width="40" height="30" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="1"/><text x="100" y="65" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:700;fill:#1a7a40">2</text><rect x="126" y="50" width="40" height="30" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="1"/><text x="146" y="65" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:700;fill:#1a7a40">3</text><rect x="172" y="50" width="40" height="30" rx="4" fill="#ffe0e0" stroke="#e08888" stroke-width="1"/><text x="192" y="65" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:700;fill:#c62828"></text><rect x="218" y="50" width="40" height="30" rx="4" fill="#ffe0e0" stroke="#e08888" stroke-width="1"/><text x="238" y="65" text-anchor="middle" dominant-baseline="central" style="font-size:13px;font-weight:700;fill:#c62828"></text><text x="220" y="92" text-anchor="middle" style="font-size:10px;fill:#0d6a6a">Initial count = 3  (3 simultaneous permits)</text><rect x="28" y="102" width="384" height="53" rx="4" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="35" y="113" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">sem_wait(&s);  // count-- ; blocks if count==0</text><text x="35" y="128" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">sem_post(&s);  // count++ ; wakes blocked waiter</text><text x="35" y="143" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">sem_init(&s, 0, N); // N = initial count</text><rect x="430" y="24" width="390" height="120" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="625" y="36" text-anchor="middle" style="font-size:12px;fill:#b26a00">pthread_rwlock -- shared reads, exclusive writes</text><rect x="436" y="50" width="180" height="20" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="1.2"/><text x="526" y="60" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:600;fill:#1a7a40">UNLOCKED</text><text x="624" y="60" text-anchor="start" style="font-size:10px;fill:#555">any thread may enter</text><rect x="436" y="74" width="180" height="20" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="1.2"/><text x="526" y="84" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:600;fill:#1040a0">READ LOCKED</text><text x="624" y="84" text-anchor="start" style="font-size:10px;fill:#555">N readers simultaneously</text><rect x="436" y="98" width="180" height="20" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="1.2"/><text x="526" y="108" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:600;fill:#c62828">WRITE LOCKED</text><text x="624" y="108" text-anchor="start" style="font-size:10px;fill:#555">exactly 1 writer, no readers</text><rect x="436" y="124" width="378" height="53" rx="4" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="443" y="135" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">pthread_rwlock_rdlock(&rw);  // many readers OK</text><text x="443" y="150" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">pthread_rwlock_wrlock(&rw);  // exclusive</text><text x="443" y="165" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">pthread_rwlock_unlock(&rw);  // both use same unlock</text><rect x="20" y="180" width="800" height="48" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="192" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Mutex vs Binary Semaphore: mutex has ownership (only locker can unlock), semaphore does not</text><text x="420" y="208" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Use semaphore for signaling (producer/consumer count), mutex for mutual exclusion</text><rect x="20" y="234" width="800" height="44" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="246" text-anchor="middle" style="font-size:12px;fill:#1040a0">rwlock caveat: writer starvation -- if readers keep arriving, writer may never get the lock</text><text x="420" y="262" text-anchor="middle" style="font-size:12px;fill:#1040a0">Real usage: rwlocks only beat mutexes when reads are much more frequent AND hold time is long</text></svg>`},
{title:"The C11 memory model and happens-before",narration:"The C11 memory model defines precisely what values a thread is allowed to see when reading shared variables. The model is built from two primitive relations. Sequenced-before orders operations within a single thread by program order. Synchronizes-with connects a release operation in one thread with an acquire operation on the same atomic object in another thread. Happens-before is the transitive closure of both relations: if A happens-before B, then B must observe all writes performed by A. If no happens-before relationship exists between a write and a read in different threads, the program has a data race and the behavior is undefined. The memory model applies to both atomics and mutex-protected accesses.",svg:`<svg width="100%" viewBox="0 0 840 288"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">C11 memory model: happens-before defines what values a read is allowed to see</text><rect x="20" y="24" width="380" height="110" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="210" y="36" text-anchor="middle" style="font-size:12px;fill:#1040a0">Building blocks:</text><rect x="26" y="46" width="368" height="113" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="33" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">Sequenced-before (SB):</text><text x="33" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  operations within one thread are</text><text x="33" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  totally ordered by program order</text><text x="33" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="33" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">Synchronizes-with (SW):</text><text x="33" y="132" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  atomic release "sync with" matching acquire</text><text x="33" y="147" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  mutex unlock sync with next lock</text><rect x="20" y="140" width="380" height="135" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="210" y="152" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Happens-before (HB) = transitive closure:</text><rect x="26" y="162" width="368" height="113" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="33" y="173" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">A HB C  if:</text><text x="33" y="188" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  A SB C   (same thread, earlier)</text><text x="33" y="203" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  A SW C   (release/acquire pair)</text><text x="33" y="218" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  A HB B  AND  B HB C  (transitivity)</text><text x="33" y="233" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"></text><text x="33" y="248" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">If  A HB B,  then B sees all writes in A</text><text x="33" y="263" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">If NO HB relation: data race = UB</text><rect x="416" y="24" width="404" height="224" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="618" y="36" text-anchor="middle" style="font-size:12px;fill:#0d6a6a">Happens-before graph:</text><rect x="424" y="54" width="130" height="22" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="1"/><text x="489" y="65" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#1040a0">T1: write x=1</text><line x1="489" y1="76" x2="489" y2="88" stroke="#1040a0" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><text x="489" y="70" text-anchor="middle" style="font-size:10px;fill:#1040a0">SB</text><rect x="424" y="90" width="130" height="22" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="1"/><text x="489" y="101" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#1040a0">T1: unlock(m)</text><rect x="574" y="90" width="240" height="22" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="1"/><text x="694" y="101" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#1a7a40">T2: lock(m)</text><line x1="694" y1="112" x2="694" y2="134" stroke="#1a7a40" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><text x="694" y="106" text-anchor="middle" style="font-size:10px;fill:#1a7a40">SB</text><rect x="574" y="130" width="240" height="22" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="1"/><text x="694" y="141" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#1a7a40">T2: read x -- sees 1</text><line x1="694" y1="152" x2="694" y2="174" stroke="#1a7a40" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><text x="694" y="146" text-anchor="middle" style="font-size:10px;fill:#1a7a40">SB</text><rect x="574" y="166" width="240" height="22" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="1"/><text x="694" y="177" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#1a7a40">T2: unlock(m)</text><line x1="554" y1="101" x2="574" y2="101" stroke="#fff3e0" stroke-width="2" marker-end="url(#ah)" fill="none" class="da"/><text x="564" y="95" text-anchor="middle" style="font-size:10px;fill:#fff3e0">SW</text><text x="618" y="205" text-anchor="middle" style="font-size:10px;fill:#0d6a6a">Unlock(m) SW Lock(m)</text><text x="618" y="218" text-anchor="middle" style="font-size:10px;fill:#0d6a6a">write x=1 HB read x</text><text x="618" y="232" text-anchor="middle" style="font-size:11px;fill:#1a7a40">=> read sees x=1 guaranteed</text></svg>`},
{title:"The six memory orderings",narration:"C11 provides six memory orderings that trade synchronization strength for performance. Relaxed provides only the indivisibility of the operation itself with no ordering guarantees relative to other memory operations. Consume provides ordering for loads that data-depend on the atomic value, but is difficult to use correctly. Acquire prevents any subsequent memory operation from being reordered before this load. Release prevents any preceding memory operation from being reordered after this store. Acquire-release provides both guarantees simultaneously and is used on read-modify-write operations like compare-exchange and fetch-add. Sequential consistency, the default, establishes a total global order across all sequentially consistent operations in all threads, which is the most intuitive but the most expensive.",svg:`<svg width="100%" viewBox="0 0 840 254"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Six memory orderings -- from fastest/weakest to safest/strongest</text><rect x="20" y="24" width="150" height="22" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="95" y="35" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#555">Order</text><rect x="174" y="24" width="116" height="22" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="232" y="35" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#555">Prevents reorder</text><rect x="294" y="24" width="232" height="22" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="410" y="35" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#555">What it provides</text><rect x="530" y="24" width="288" height="22" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="1.2"/><text x="674" y="35" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#555">Use case</text><rect x="20" y="48" width="150" height="28" rx="3" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="95" y="62" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#555;font-family:monospace">memory_order_relaxed</text><rect x="174" y="48" width="116" height="28" rx="3" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="232" y="62" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#555">nothing</text><rect x="294" y="48" width="232" height="28" rx="3" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="410" y="62" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:400;fill:#555">no sync guarantee -- only atomicity</text><rect x="530" y="48" width="288" height="28" rx="3" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="674" y="62" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#555">counters, stats</text><rect x="20" y="78" width="150" height="28" rx="3" fill="#fffff0" stroke="#ccbb00" stroke-width="0.8"/><text x="95" y="92" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#6b5c00;font-family:monospace">memory_order_consume</text><rect x="174" y="78" width="116" height="28" rx="3" fill="#fffff0" stroke="#ccbb00" stroke-width="0.8"/><text x="232" y="92" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#6b5c00">data dep. loads</text><rect x="294" y="78" width="232" height="28" rx="3" fill="#fffff0" stroke="#ccbb00" stroke-width="0.8"/><text x="410" y="92" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:400;fill:#6b5c00">carry data dependency (rarely needed)</text><rect x="530" y="78" width="288" height="28" rx="3" fill="#fffff0" stroke="#ccbb00" stroke-width="0.8"/><text x="674" y="92" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#6b5c00">hazard pointers</text><rect x="20" y="108" width="150" height="28" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="95" y="122" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#1a7a40;font-family:monospace">memory_order_acquire</text><rect x="174" y="108" width="116" height="28" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="232" y="122" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#1a7a40">loads after barrier</text><rect x="294" y="108" width="232" height="28" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="410" y="122" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:400;fill:#1a7a40">see all releases before this load</text><rect x="530" y="108" width="288" height="28" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="674" y="122" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#1a7a40">lock acquire</text><rect x="20" y="138" width="150" height="28" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="95" y="152" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#1a7a40;font-family:monospace">memory_order_release</text><rect x="174" y="138" width="116" height="28" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="232" y="152" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:400;fill:#1a7a40">stores before barrier</text><rect x="294" y="138" width="232" height="28" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="410" y="152" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:400;fill:#1a7a40">make all prior stores visible to acquires</text><rect x="530" y="138" width="288" height="28" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="674" y="152" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#1a7a40">lock release</text><rect x="20" y="168" width="150" height="28" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="95" y="182" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#1040a0;font-family:monospace">memory_order_acq_rel</text><rect x="174" y="168" width="116" height="28" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="232" y="182" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#1040a0">loads AND stores</text><rect x="294" y="168" width="232" height="28" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="410" y="182" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:400;fill:#1040a0">both acquire + release semantics</text><rect x="530" y="168" width="288" height="28" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="674" y="182" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#1040a0">CAS, fetch_add</text><rect x="20" y="198" width="150" height="28" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="95" y="212" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:700;fill:#0d6a6a;font-family:monospace">memory_order_seq_cst</text><rect x="174" y="198" width="116" height="28" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="232" y="212" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#0d6a6a">everything</text><rect x="294" y="198" width="232" height="28" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="410" y="212" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:400;fill:#0d6a6a">total sequential order across all threads</text><rect x="530" y="198" width="288" height="28" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="674" y="212" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:400;fill:#0d6a6a">default, safest</text><rect x="20" y="232" width="800" height="20" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="242" text-anchor="middle" style="font-size:12px;fill:#c62828">memory_order_seq_cst is the default for all atomic operations -- change only after profiling proves a bottleneck</text></svg>`},
{title:"CAS and lock-free patterns",narration:"Compare-and-swap, or CAS, is the fundamental building block of lock-free algorithms. It atomically checks whether a memory location contains an expected value, and only if it does, replaces it with a desired value, returning whether the exchange occurred. This is implemented as a single hardware instruction on x86. Lock-free algorithms use a retry loop: read the current value, compute the new value, attempt CAS, and if CAS fails because another thread changed the value first, retry with the freshly observed value. This guarantees that at least one thread makes progress on every attempt, which is the lock-free progress guarantee. The weak form of CAS may spuriously fail on architectures using load-linked/store-conditional instructions and should be used in a retry loop.",svg:`<svg width="100%" viewBox="0 0 840 360"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Compare-and-swap (CAS) -- the foundation of all lock-free algorithms</text><rect x="20" y="24" width="800" height="52" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="36" text-anchor="middle" style="font-size:12px;fill:#1040a0">CAS atomically: if (*ptr == expected) { *ptr = desired; return true; } else { return false; }</text><text x="420" y="50" text-anchor="middle" style="font-size:12px;fill:#1040a0">Executes as a single indivisible hardware instruction (CMPXCHG on x86) -- cannot be interrupted</text><rect x="20" y="80" width="390" height="86" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="215" y="92" text-anchor="middle" style="font-size:12px;fill:#1a7a40">Lock-free atomic counter:</text><rect x="26" y="102" width="378" height="173" rx="4" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="33" y="113" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">_Atomic int counter = 0;</text><text x="33" y="128" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Simple: just use fetch_add</text><text x="33" y="143" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">atomic_fetch_add(&counter, 1);</text><text x="33" y="158" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Explicit CAS loop (for illustration):</text><text x="33" y="173" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">int old, desired;</text><text x="33" y="188" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">do { old = atomic_load_explicit(&counter,</text><text x="33" y="203" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">       memory_order_relaxed);</text><text x="33" y="218" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">     desired = old + 1;</text><text x="33" y="233" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">} while (!atomic_compare_exchange_weak_explicit(</text><text x="33" y="248" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">         &counter, &old, desired,</text><text x="33" y="263" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">         memory_order_release, memory_order_relaxed));</text><rect x="430" y="80" width="390" height="86" rx="5" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="625" y="92" text-anchor="middle" style="font-size:12px;fill:#0d6a6a">Lock-free stack push:</text><rect x="436" y="102" width="378" height="158" rx="4" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="443" y="113" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">typedef struct Node { int val; struct Node *next; } Node;</text><text x="443" y="128" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">_Atomic(Node*) head = NULL;</text><text x="443" y="143" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">void push(Node *n) {</text><text x="443" y="158" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    Node *old;</text><text x="443" y="173" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    do {</text><text x="443" y="188" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">        old = atomic_load(&head);</text><text x="443" y="203" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">        n->next = old;</text><text x="443" y="218" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    } while (!atomic_compare_exchange_weak(</text><text x="443" y="233" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">             &head, &old, n));</text><text x="443" y="248" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">}</text><rect x="20" y="273" width="800" height="26" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="284" text-anchor="middle" style="font-size:11px;fill:#b26a00">atomic_compare_exchange_weak vs strong: weak may spuriously fail (faster on LL/SC architectures like ARM)</text><text x="420" y="298" text-anchor="middle" style="font-size:12px;fill:#b26a00">Use weak in a loop (it will eventually succeed); use strong for single-try compare</text><rect x="20" y="305" width="800" height="44" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="319" text-anchor="middle" style="font-size:11px;fill:#c62828">Lock-free != wait-free: lock-free guarantees system-wide progress, not per-thread bounded time</text><text x="420" y="333" text-anchor="middle" style="font-size:11px;fill:#c62828">ABA problem lurks in linked-structure CAS -- see next slide</text></svg>`},
{title:"The ABA problem",narration:"The ABA problem is a subtle correctness bug in CAS-based algorithms. Suppose thread one reads a pointer value A from the top of a lock-free stack, then gets preempted. Thread two pops A and B from the stack and pushes a new node that happens to be allocated at the same address as A. When thread one resumes and executes CAS expecting A, the comparison succeeds because the address matches, but the semantic meaning has changed: the old B node, which was supposed to become the new top, has already been freed. The program now has a dangling pointer. The three standard solutions are tagged pointers which include a version counter that increments on every CAS preventing false matches, hazard pointers which defer reclamation until no thread is accessing a node, and epoch-based reclamation which batches frees per epoch.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">The ABA problem -- CAS succeeds wrongly because a pointer looks the same but the world changed</text><rect x="20" y="24" width="800" height="22" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="420" y="35" text-anchor="middle" style="font-size:11px;fill:#555">Stack: top -> [A] -> [B] -> [C]   |  Thread 1 reads top=A  |  Thread 1 preempted</text><rect x="20" y="50" width="800" height="22" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="420" y="61" text-anchor="middle" style="font-size:11px;fill:#1040a0">Thread 2 runs: pop A (frees A), pop B (frees B), push A-prime (new node reusing address of A)</text><rect x="20" y="76" width="800" height="22" rx="5" fill="#f2f2ee" stroke="#ccc" stroke-width="0.8"/><text x="420" y="87" text-anchor="middle" style="font-size:11px;fill:#555">Stack: top -> [A-prime] -> [C]   |  Thread 1 resumes</text><rect x="20" y="102" width="800" height="22" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="113" text-anchor="middle" style="font-size:12px;fill:#c62828">Thread 1: CAS(top, A, B) SUCCEEDS -- A-prime has same address as A! But B is already freed!</text><rect x="20" y="128" width="800" height="22" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="420" y="139" text-anchor="middle" style="font-size:12px;fill:#c62828">Result: top now points to freed memory B -- use-after-free, heap corruption, crash</text><rect x="20" y="154" width="800" height="94" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="420" y="166" text-anchor="middle" style="font-size:13px;fill:#1a7a40">Three solutions:</text><rect x="26" y="172" width="110" height="20" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="81" y="182" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#1a7a40">Tagged pointer</text><text x="150" y="182" text-anchor="start" style="font-size:10px;fill:#555">Add a version counter in unused high bits: CAS(top, {A,v}, {B,v+1}) -- address AND version must match</text><rect x="26" y="196" width="110" height="20" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="81" y="206" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#1040a0">Hazard pointers</text><text x="150" y="206" text-anchor="start" style="font-size:10px;fill:#555">Before accessing a node, publish its address in a thread-local slot -- deferral prevents reclamation</text><rect x="26" y="220" width="110" height="20" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="81" y="230" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#0d6a6a">Epoch-based reclaim</text><text x="150" y="230" text-anchor="start" style="font-size:10px;fill:#555">Group operations into epochs; only free nodes when no threads are in older epochs (used by RCU)</text></svg>`},
{title:"Deadlock prevention",narration:"Deadlock requires all four Coffman conditions to hold simultaneously: mutual exclusion, hold-and-wait, no preemption, and circular wait. The simplest prevention strategy is to establish a total order on lock acquisition: whenever code needs multiple locks, always acquire them in the same global order. If every thread locks mutex A before mutex B, no cycle can form. A second strategy is trylock with backoff: attempt to acquire without blocking, and if it fails, release all held locks and retry after a delay. The third strategy is a lock hierarchy where each lock is assigned a level and threads may only acquire locks at decreasing levels. Related problems include livelock where threads keep retrying but make no progress, starvation where one thread never gets scheduled, and priority inversion where a high-priority thread waits indefinitely for a low-priority one.",svg:`<svg width="100%" viewBox="0 0 840 252"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">Deadlock -- circular lock dependencies that freeze all involved threads forever</text><rect x="20" y="24" width="390" height="66" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="215" y="36" text-anchor="middle" style="font-size:11px;fill:#c62828">Coffman conditions (ALL four needed for deadlock):</text><text x="28" y="50" text-anchor="start" style="font-size:9px;fill:#c62828">1. Mutual exclusion  -- resource held exclusively</text><text x="28" y="60" text-anchor="start" style="font-size:9px;fill:#c62828">2. Hold and wait  -- hold one lock, wait for another</text><text x="28" y="70" text-anchor="start" style="font-size:9px;fill:#c62828">3. No preemption  -- lock cannot be forcibly taken</text><text x="28" y="80" text-anchor="start" style="font-size:9px;fill:#c62828">4. Circular wait  -- T1 waits for T2, T2 waits for T1</text><rect x="20" y="96" width="390" height="80" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="215" y="108" text-anchor="middle" style="font-size:12px;fill:#c62828">Classic deadlock:</text><rect x="26" y="118" width="378" height="68" rx="4" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="33" y="129" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Thread 1:             // Thread 2:</text><text x="33" y="144" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">lock(mutex_A);          lock(mutex_B);   // holds B</text><text x="33" y="159" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">lock(mutex_B); // waits lock(mutex_A);   // waits</text><text x="33" y="174" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">...                     ...              // DEADLOCK!</text><rect x="430" y="24" width="390" height="152" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="625" y="36" text-anchor="middle" style="font-size:13px;fill:#1a7a40">Prevention strategies:</text><rect x="436" y="50" width="118" height="26" rx="3" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="495" y="63" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#1a7a40">Lock ordering</text><text x="564" y="63" text-anchor="start" style="font-size:10px;fill:#555">Always acquire in same total order: A before B everywhere</text><rect x="436" y="82" width="118" height="26" rx="3" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="495" y="95" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#1040a0">trylock + backoff</text><text x="564" y="95" text-anchor="start" style="font-size:10px;fill:#555">pthread_mutex_trylock -- if fails, release all and retry</text><rect x="436" y="114" width="118" height="26" rx="3" fill="#e0f4f4" stroke="#4db3b3" stroke-width="0.8"/><text x="495" y="127" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#0d6a6a">Lock hierarchy</text><text x="564" y="127" text-anchor="start" style="font-size:10px;fill:#555">Assign a level to each lock; only lock higher->lower</text><rect x="436" y="146" width="118" height="26" rx="3" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="495" y="159" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;fill:#b26a00">Single lock</text><text x="564" y="159" text-anchor="start" style="font-size:10px;fill:#555">Coarse-grained: one mutex for all shared state</text><rect x="430" y="182" width="390" height="42" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="625" y="194" text-anchor="middle" style="font-size:11px;fill:#1040a0">Fixed example:</text><rect x="436" y="204" width="378" height="53" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="443" y="215" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// BOTH threads do this order:</text><text x="443" y="230" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">lock(mutex_A); lock(mutex_B);</text><text x="443" y="245" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#1a7a40">// No cycle possible -- no deadlock // OK</text><rect x="20" y="182" width="405" height="66" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="222" y="196" text-anchor="middle" style="font-size:11px;fill:#b26a00">livelock: threads keep retrying but never progress</text><text x="222" y="210" text-anchor="middle" style="font-size:11px;fill:#b26a00">starvation: a thread never gets the lock</text><text x="222" y="224" text-anchor="middle" style="font-size:11px;fill:#b26a00">priority inversion: high-prio waits for low-prio</text><text x="222" y="238" text-anchor="middle" style="font-size:10px;fill:#b26a00">solution: priority inheritance mutexes (PTHREAD_PRIO_INHERIT)</text></svg>`},
{title:"TSan, thread-local storage, and pthreads",narration:"ThreadSanitizer instruments the binary at compile time and monitors every memory access at runtime, flagging any pair of accesses from different threads without an intervening synchronization event. It runs at five to fifteen times normal speed and uses about eight times more memory. Compile with -fsanitize=thread and run your test suite to see races with full stack traces. Thread-local storage gives each thread its own private copy of a variable with static storage duration. Declare with underscore-underscore-thread for GCC compatibility or underscore-Thread_local from C11. Each thread's copy is zero-initialized independently and has the lifetime of the thread. The pthreads API and C11 threads dot h provide analogous primitives: create and join for thread lifecycle, mutex functions for exclusion, condition variable functions for signaling, and once-flag for one-time initialization.",svg:`<svg width="100%" viewBox="0 0 840 320"><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs><text x="420" y="14" text-anchor="middle" style="font-size:12px;fill:#777">TSan catches data races at runtime | TLS gives per-thread storage | pthreads quick reference</text><rect x="20" y="24" width="360" height="90" rx="5" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="200" y="36" text-anchor="middle" style="font-size:12px;fill:#c62828">ThreadSanitizer (TSan)</text><rect x="26" y="46" width="348" height="98" rx="4" fill="#ffe0e0" stroke="#e08888" stroke-width="0.8"/><text x="33" y="57" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"># Compile with TSan:</text><text x="33" y="72" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">gcc -fsanitize=thread -g -O1 prog.c</text><text x="33" y="87" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222"># Run normally -- TSan detects races:</text><text x="33" y="102" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">FATAL: ThreadSanitizer: data race</text><text x="33" y="117" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">  Write of size 4 at 0x... by T2:</text><text x="33" y="132" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">    #0 increment prog.c:12</text><rect x="20" y="148" width="360" height="68" rx="5" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="200" y="160" text-anchor="middle" style="font-size:12px;fill:#1040a0">Thread-Local Storage (TLS)</text><rect x="26" y="170" width="348" height="83" rx="4" fill="#deeeff" stroke="#88aaf0" stroke-width="0.8"/><text x="33" y="181" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Each thread gets its OWN copy:</text><text x="33" y="196" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">__thread int tls_errno;          // GCC extension</text><text x="33" y="211" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#222">_Thread_local int tls_counter;  // C11 standard</text><text x="33" y="226" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// C11: thread_local int buf[256]; // alias</text><text x="33" y="241" text-anchor="start" dominant-baseline="central" style="font-family:monospace;font-size:11px;fill:#888">// Zero-initialized; static storage duration</text><rect x="396" y="24" width="424" height="164" rx="5" fill="#e6f4ee" stroke="#4caf79" stroke-width="0.8"/><text x="608" y="36" text-anchor="middle" style="font-size:12px;fill:#1a7a40">pthreads quick reference:</text><text x="404" y="50" text-anchor="start" style="font-family:monospace;font-size:9px;font-weight:700;fill:#1a7a40">thrd_create / join</text><text x="612" y="50" text-anchor="start" style="font-size:9px;fill:#555">pthread_create / join</text><text x="404" y="67" text-anchor="start" style="font-family:monospace;font-size:9px;font-weight:700;fill:#1a7a40">mtx_lock / unlock</text><text x="612" y="67" text-anchor="start" style="font-size:9px;fill:#555">pthread_mutex_lock/unlock</text><text x="404" y="84" text-anchor="start" style="font-family:monospace;font-size:9px;font-weight:700;fill:#1a7a40">mtx_trylock</text><text x="612" y="84" text-anchor="start" style="font-size:9px;fill:#555">pthread_mutex_trylock</text><text x="404" y="101" text-anchor="start" style="font-family:monospace;font-size:9px;font-weight:700;fill:#1a7a40">cnd_wait / signal</text><text x="612" y="101" text-anchor="start" style="font-size:9px;fill:#555">pthread_cond_wait/signal</text><text x="404" y="118" text-anchor="start" style="font-family:monospace;font-size:9px;font-weight:700;fill:#1a7a40">cnd_broadcast</text><text x="612" y="118" text-anchor="start" style="font-size:9px;fill:#555">pthread_cond_broadcast</text><text x="404" y="135" text-anchor="start" style="font-family:monospace;font-size:9px;font-weight:700;fill:#1a7a40">once_flag + call_once</text><text x="612" y="135" text-anchor="start" style="font-size:9px;fill:#555">pthread_once</text><text x="404" y="152" text-anchor="start" style="font-family:monospace;font-size:9px;font-weight:700;fill:#1a7a40">tss_create / get / set</text><text x="612" y="152" text-anchor="start" style="font-size:9px;fill:#555">pthread_key_create/get/set</text><text x="608" y="176" text-anchor="middle" style="font-size:10px;fill:#1a7a40">C11 threads.h maps to pthreads</text><text x="608" y="188" text-anchor="middle" style="font-size:10px;fill:#1a7a40">(use pthreads in production)</text><rect x="20" y="257" width="800" height="52" rx="5" fill="#fff3e0" stroke="#f5b942" stroke-width="0.8"/><text x="420" y="271" text-anchor="middle" style="font-size:12px;fill:#b26a00">TSan overhead: 5-15x slowdown, 8x memory -- run in CI on every pull request with a thread-heavy test suite</text><text x="420" y="287" text-anchor="middle" style="font-size:12px;fill:#b26a00">TSan can miss races not covered by the test workload -- also use code review and lock disciplines</text><text x="420" y="303" text-anchor="middle" style="font-size:12px;fill:#b26a00">Helgrind (Valgrind) is an alternative with more detailed error reports but higher overhead</text></svg>`},

// ── Text-to-Speech (Web Speech API) ──────────────────────────────────────────
let ttsOn = false, ttsUtter = null, ttsVoice = null;

function ttsPickVoice() {
  const vs = speechSynthesis.getVoices();
  if (!vs.length) return null;
  // Prefer a natural en-US/en-GB voice; fall back to any English, then first
  return vs.find(v => /en[-_](US|GB)/i.test(v.lang) && /natural|neural|premium/i.test(v.name))
      || vs.find(v => /en[-_](US|GB)/i.test(v.lang))
      || vs.find(v => v.lang.startsWith('en'))
      || vs[0];
}
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => { ttsVoice = ttsPickVoice(); };
  ttsVoice = ttsPickVoice();
}

function ttsSpeak(text, onEnd) {
  if (!ttsOn || !('speechSynthesis' in window)) { if (onEnd) onEnd(); return; }
  speechSynthesis.cancel();
  // Clean text for speech: strip code-ish punctuation that reads badly
  const clean = text
    .replace(/->/g, ' arrow ')
    .replace(/&/g, ' ampersand ')
    .replace(/\*p\b/g, 'star p')
    .replace(/`/g, '')
    .replace(/\s+/g, ' ').trim();
  ttsUtter = new SpeechSynthesisUtterance(clean);
  if (ttsVoice) ttsUtter.voice = ttsVoice;
  ttsUtter.rate = 0.95;
  ttsUtter.pitch = 1.0;
  if (onEnd) ttsUtter.onend = onEnd;
  speechSynthesis.speak(ttsUtter);
}

function ttsStop() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
}

function ttsToggle() {
  ttsOn = !ttsOn;
  const b = document.getElementById('ttsbtn');
  if (ttsOn) {
    b.textContent = '🔊 Voice On';
    b.style.background = '#e6f4ee';
    b.style.borderColor = '#4caf79';
    // Speak the current slide immediately so the user gets feedback
    ttsSpeak(SLIDES[vi].title + '. ' + SLIDES[vi].narration, null);
  } else {
    b.textContent = '🔇 Voice Off';
    b.style.background = '';
    b.style.borderColor = '';
    ttsStop();
  }
}
window.addEventListener('beforeunload', ttsStop);

let vi=0,playing=false,ticker=null,ctick=null;
function updateNav(){
  const prevBtn=document.getElementById('prevbtn'),nextBtn=document.getElementById('nextbtn');
  prevBtn.disabled=(vi===0);prevBtn.setAttribute('aria-disabled',String(vi===0));
  nextBtn.disabled=(vi===SLIDES.length-1);nextBtn.setAttribute('aria-disabled',String(vi===SLIDES.length-1));
}
function gt(n){
  vi=Math.max(0,Math.min(n,SLIDES.length-1));
  const s=SLIDES[vi];
  document.getElementById('st').textContent=s.title;
  document.getElementById('sc').textContent=(vi+1)+' / '+SLIDES.length;
  const d=document.getElementById('diag');
  d.style.opacity='0';d.innerHTML=s.svg;
  const svgEl=d.querySelector('svg');
  if(svgEl){svgEl.setAttribute('role','img');svgEl.setAttribute('aria-label',s.title+' diagram');}
  setTimeout(()=>d.style.opacity='1',30);
  document.getElementById('pf').style.width=(vi/(SLIDES.length-1)*100)+'%';
  const bar=document.getElementById('pbar');
  bar.setAttribute('aria-valuemax',String(SLIDES.length));
  bar.setAttribute('aria-valuenow',String(vi+1));
  bar.setAttribute('aria-valuetext',(vi+1)+' of '+SLIDES.length+': '+s.title);
  updateNav();
  document.getElementById('live-announce').textContent=s.title;
  clearInterval(ctick);let pos=0,full=s.narration;
  document.getElementById('narr').textContent='';
  ctick=setInterval(()=>{if(pos<full.length)document.getElementById('narr').textContent=full.slice(0,++pos);else clearInterval(ctick);},18);
  ttsStop();
  if(ttsOn){
    ttsSpeak(s.title+'. '+full,()=>{if(playing){clearTimeout(ticker);ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},1200);}});
    if(playing)clearTimeout(ticker);
  } else if(playing){clearTimeout(ticker);ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},Math.max(9000,full.length*56));}
}
function play(){playing=true;document.getElementById('pb2').textContent='⏸ Pause';
  if(ttsOn){ttsSpeak(SLIDES[vi].title+'. '+SLIDES[vi].narration,()=>{if(playing)ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},1200);});}
  else{ticker=setTimeout(()=>{vi<SLIDES.length-1?gt(vi+1):pause();},Math.max(9000,SLIDES[vi].narration.length*56));}}
function pause(){playing=false;clearTimeout(ticker);ttsStop();document.getElementById('pb2').textContent='▶ Play';}
function tg(){playing?pause():play();}
function gn(){if(vi>=SLIDES.length-1)return;clearTimeout(ticker);gt(vi+1);if(playing)play();}
function gp(){if(vi<=0)return;clearTimeout(ticker);gt(vi-1);if(playing)play();}
function pgc(e){const r=document.getElementById('pbar').getBoundingClientRect();clearTimeout(ticker);gt(Math.round((e.clientX-r.left)/r.width*(SLIDES.length-1)));if(playing)play();}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&document.getElementById('voice-panel').classList.contains('aai-open')){_vpClose();return;}
  if(['INPUT','TEXTAREA'].includes(e.target.tagName))return;
  if(e.key===' '){e.preventDefault();tg();}
  else if(e.key==='ArrowRight')gn();
  else if(e.key==='ArrowLeft')gp();
  else if(e.key==='v'||e.key==='V')ttsToggle();
});
gt(0);
</script>

<div id="voice-panel" role="region" aria-labelledby="vp-title">
  <div id="vp-bar">
    <span id="vp-title" class="sr-only">Voice input and Q&amp;A</span>
    <span id="vp-status" aria-live="polite">Ready</span>
    <button id="vp-close" onclick="_vpClose()" aria-label="Close voice panel">&#x2715;</button>
  </div>
  <form id="vp-form">
    <label for="vp-input" class="sr-only">Type a question about this lecture</label>
    <input id="vp-input" type="text" placeholder="Or type a question and press Enter…" autocomplete="off">
    <button type="submit">Ask</button>
  </form>
  <div id="vp-transcript" class="aai-empty" aria-live="polite"></div>
  <div id="vp-answer" aria-live="polite"></div>
  <div id="vp-footer">Mic audio streams live to AssemblyAI only while this panel is open, for transcription and Q&amp;A &middot; universal-3-5-pro</div>
</div>
<script>
/* ── AssemblyAI Voice Input + Q&A ────────────────────────────────────────── */
/* Set by the deploy step in README.md ("find-replace REPLACE_WITH_VERCEL_URL"). */
const _AAI='https://the-c.vercel.app';
const _aaiConfigured=()=>!!_AAI&&_AAI.indexOf('REPLACE_WITH')===-1;
const _TERMS=['pointer','malloc','undefined behaviour','mutex','deadlock','epoll',
  'mmap','fork','syscall','struct','volatile','restrict','pthread','semaphore',
  'spinlock','realloc','calloc','free list','stack frame','heap internals'];
/* AudioWorklet: capture Float32 mic audio → Int16 PCM at 16 kHz */
const _WL=`class P extends AudioWorkletProcessor{process(i){const c=i[0]?.[0];if(c){const b=new Int16Array(c.length);for(let j=0;j<c.length;j++){const s=Math.max(-1,Math.min(1,c[j]));b[j]=s<0?s*0x8000:s*0x7FFF;}this.port.postMessage(b.buffer,[b.buffer]);}return true;}}registerProcessor('aai-pcm',P);`;

let _ws=null,_ctx=null,_mic=null,_node=null,_buf=[],_on=false,_connecting=false,_asking=false;

const _$=id=>document.getElementById(id);
const _status=(t,live)=>{const e=_$('vp-status');if(e){e.textContent=t;e.className=live?'aai-live':'';}};
const _tx=t=>{const e=_$('vp-transcript');if(!e)return;e.textContent=t;e.className=t?'':'aai-empty';};
const _ans=h=>{const e=_$('vp-answer');if(!e)return;e.innerHTML=h;e.className=h?'aai-show':'';};
const _open=()=>_$('voice-panel')?.classList.add('aai-open');
function _vpClose(){_$('voice-panel')?.classList.remove('aai-open');if(_on)_stop();_$('micbtn')?.focus();}

function _micSupported(){
  return !!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia&&window.AudioContext&&window.AudioWorklet&&window.WebSocket);
}

async function _start(){
  if(_on||_connecting)return;
  if(!_aaiConfigured()){
    _open();_status('Backend not configured — see README setup guide');return;
  }
  if(!_micSupported()){
    _open();_status('Voice input isn’t supported in this browser — try typing a question instead');return;
  }
  if(location.protocol!=='https:'&&location.hostname!=='localhost'&&location.hostname!=='127.0.0.1'){
    _open();_status('Voice input requires HTTPS — try typing a question instead');return;
  }
  _connecting=true;
  _open();_status('Connecting\u2026');_tx('');_ans('');
  try{
    /* 1. Mint short-lived token (API key stays on server) */
    const tokCtl=new AbortController();
    const tokTimer=setTimeout(()=>tokCtl.abort(),10000);
    const tr=await fetch(_AAI+'/api/token',{signal:tokCtl.signal});
    clearTimeout(tokTimer);
    if(!tr.ok)throw new Error('Token failed ('+tr.status+')');
    const{token}=await tr.json();
    /* 2. Open WebSocket using token — no API key in browser */
    const p=new URLSearchParams({sample_rate:'16000',speech_model:'universal-3-5-pro',mode:'balanced',token});
    _TERMS.forEach(t=>p.append('keyterms_prompt',t));
    _ws=new WebSocket('wss://streaming.assemblyai.com/v3/ws?'+p);
    await new Promise((ok,fail)=>{
      _ws.onopen=ok;
      _ws.onerror=()=>fail(new Error('WebSocket failed'));
      setTimeout(()=>fail(new Error('Connection timed out')),10000);
    });
    _ws.onmessage=e=>{
      const m=JSON.parse(e.data);
      if(m.type!=='Turn')return;
      _tx(m.transcript);
      /* Auto-trigger Q&A when turn finalizes and ends with ? */
      if(m.end_of_turn&&m.transcript.trim().endsWith('?'))_ask(m.transcript.trim());
    };
    _ws.onclose=()=>{_on=false;_btn();_status('Disconnected');};
    /* 3. Capture mic → PCM16 via AudioWorklet → stream to AssemblyAI */
    _mic=await navigator.mediaDevices.getUserMedia({audio:{channelCount:1,echoCancellation:true,noiseSuppression:true}});
    _ctx=new AudioContext({sampleRate:16000});
    const bu=URL.createObjectURL(new Blob([_WL],{type:'application/javascript'}));
    await _ctx.audioWorklet.addModule(bu);URL.revokeObjectURL(bu);
    _node=new AudioWorkletNode(_ctx,'aai-pcm');
    _node.port.onmessage=ev=>{
      _buf.push(...new Int16Array(ev.data));
      /* Send ~200 ms chunks (3200 samples @ 16 kHz) — within AssemblyAI 50–1000 ms window */
      if(_buf.length>=3200&&_ws?.readyState===1)
        _ws.send(new Int16Array(_buf.splice(0,3200)).buffer);
    };
    _ctx.createMediaStreamSource(_mic).connect(_node);
    _on=true;_connecting=false;_btn();_status('Listening',true);
  }catch(err){
    _connecting=false;
    const msg=err.name==='AbortError'?'Token request timed out':err.name==='NotAllowedError'?'Microphone permission denied':err.message;
    _status('Error: '+msg);_clean();
  }
}

function _stop(){
  /* Always send Terminate — abandoned sessions stay billable until 3-hour cap */
  if(_ws?.readyState===1){_ws.send(JSON.stringify({type:'Terminate'}));_ws.close();}
  _clean();_status('Stopped');
}
function _clean(){_mic?.getTracks().forEach(t=>t.stop());_ctx?.close();_ws=_ctx=_mic=_node=null;_buf=[];_on=false;_connecting=false;_btn();}
function _btn(){const b=_$('micbtn');if(!b)return;b.textContent=_on?'\u23F9 Stop':'\uD83C\uDF99 Ask';b.className=_on?'aai-live':'';}
function _micToggle(){if(_connecting)return;_on?_stop():_start();}
window.addEventListener('beforeunload',()=>{if(_ws?.readyState===1)_ws.send(JSON.stringify({type:'Terminate'}));});

async function _ask(q){
  if(_asking)return;
  if(!_aaiConfigured()){
    _open();_status('Backend not configured — see README setup guide');return;
  }
  _asking=true;
  _open();_status('Answering\u2026');_ans('<em style="color:#8b949e">Thinking\u2026</em>');
  const ctl=new AbortController();
  const timer=setTimeout(()=>ctl.abort(),20000);
  try{
    const r=await fetch(_AAI+'/api/qa',{
      method:'POST',
      headers:{'content-type':'application/json'},
      body:JSON.stringify({question:q,volume:document.title}),
      signal:ctl.signal,
    });
    if(!r.ok)throw new Error('Q&A failed ('+r.status+')');
    const{answer}=await r.json();
    /* Minimal markdown: fenced code blocks + inline code. Escaped first, so this cannot inject HTML. */
    const h=answer
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/```[\w]*\n?([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
      .replace(/`([^`]+)`/g,'<code>$1</code>')
      .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
    _ans('<p>'+h+'</p><p style="color:#8b949e;font-size:.75em">AI-generated \u2014 verify compiler/platform-specific details.</p>');
    _status(_on?'Listening':'Ready',_on);
  }catch(err){
    const msg=err.name==='AbortError'?'Request timed out \u2014 try again':err.message;
    _ans('<em style="color:#f85149">'+msg+'</em>');
    _status(_on?'Listening':'Ready',_on);
  }finally{
    clearTimeout(timer);_asking=false;
  }
}
document.getElementById('vp-form')?.addEventListener('submit',e=>{
  e.preventDefault();
  const input=document.getElementById('vp-input');
  const v=input.value.trim();
  if(!v)return;
  input.value='';
  _ask(v);
});

</script>
